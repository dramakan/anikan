<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donation Manager - AnyKan OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <style>
        :root { 
            --bg-base: #050505; 
            --bg-surface: rgba(24, 24, 27, 0.6); 
            --primary: #9D4EDD; 
            --primary-glow: rgba(157, 78, 221, 0.5); 
            --heart: #ff4757;
            --heart-glow: rgba(255, 71, 87, 0.4);
            --text-main: #F8FAFC; 
            --text-muted: #94A3B8; 
            --border-subtle: rgba(255, 255, 255, 0.08); 
            --success: #10B981; 
            --glass-blur: blur(20px) saturate(160%);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg-base); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }

        /* Nav */
        .admin-nav { padding: 16px 5%; background: rgba(5, 5, 5, 0.85); backdrop-filter: var(--glass-blur); border-bottom: 1px solid var(--border-subtle); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .admin-brand { font-size: 1.4rem; font-weight: 700; color: #fff; text-decoration: none; }
        .admin-brand span { color: var(--heart); }
        .btn-action { background: rgba(255,255,255,0.04); color: var(--text-main); border: 1px solid var(--border-subtle); padding: 8px 16px; border-radius: 12px; cursor: pointer; transition: 0.3s; text-decoration: none; font-size: 0.9rem; }
        .btn-action:hover { background: rgba(255,255,255,0.1); }

        .admin-container { max-width: 1400px; margin: 30px auto; padding: 0 4%; }

        /* Login Screen */
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .login-box { background: var(--bg-surface); padding: 50px 40px; border-radius: 24px; border: 1px solid var(--border-subtle); width: 100%; max-width: 400px; text-align: center; }
        .admin-input { width: 100%; padding: 14px; background: rgba(0,0,0,0.4); border: 1px solid var(--border-subtle); color: #fff; border-radius: 12px; margin-bottom: 15px; font-family: inherit; }
        .admin-input:focus { outline: none; border-color: var(--primary); }
        .btn-primary { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--heart), #ff6b81); color: #fff; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; }

        #dashboard-screen { display: none; }

        /* Stats */
        .analytics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .analytic-card { background: var(--bg-surface); border: 1px solid var(--border-subtle); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .analytic-value { font-size: 2.5rem; font-weight: 700; color: #fff; margin-bottom: 5px; }

        /* Layout Grid */
        .dashboard-layout { display: grid; grid-template-columns: 1fr 2fr; gap: 30px; align-items: start;}

        /* Forms & Tables */
        .cms-card { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: 20px; padding: 30px; }
        .cms-card h2 { margin-top: 0; margin-bottom: 20px; font-size: 1.3rem; border-bottom: 1px solid var(--border-subtle); padding-bottom: 15px; }
        label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 8px; }
        
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; }
        
        .badge { padding: 5px 12px; border-radius: 50px; font-size: 0.75rem; font-weight: 600; }
        .bg-pending { background: rgba(245, 158, 11, 0.15); color: #FCD34D; border: 1px solid rgba(245, 158, 11, 0.3); }
        .bg-success { background: rgba(16, 185, 129, 0.15); color: #6EE7B7; border: 1px solid rgba(16, 185, 129, 0.3); }

        .btn-verify { background: rgba(16, 185, 129, 0.15); color: #10B981; border: 1px solid rgba(16, 185, 129, 0.3); padding: 6px 12px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .btn-verify:hover:not(:disabled) { background: #10B981; color: #fff; }
        .btn-verify:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-delete { background: transparent; color: #EF4444; border: 1px solid rgba(239, 68, 68, 0.3); padding: 6px 12px; border-radius: 8px; cursor: pointer; }

        @media (max-width: 900px) { .dashboard-layout { grid-template-columns: 1fr; } .analytics-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <i class="fas fa-hand-holding-heart" style="font-size: 3rem; color: var(--heart); margin-bottom: 20px;"></i>
            <h2 style="margin-bottom: 20px;">Donation Manager</h2>
            <input type="email" id="admin-email" class="admin-input" placeholder="Admin Email">
            <input type="password" id="admin-password" class="admin-input" placeholder="Password">
            <button class="btn-primary" id="login-btn">Secure Login</button>
        </div>
    </div>

    <div id="dashboard-screen">
        <nav class="admin-nav">
            <a href="#" class="admin-brand"><i class="fas fa-hand-holding-heart"></i> Any<span>Kan</span> Funds</a>
            <div style="display: flex; gap: 10px;">
                <a href="donation.html" target="_blank" class="btn-action">Live Page</a>
                <button class="btn-action" id="logout-btn" style="color: #EF4444; border-color: rgba(239, 68, 68, 0.3);">Logout</button>
            </div>
        </nav>

        <div class="admin-container">
            <div class="analytics-grid">
                <div class="analytic-card">
                    <div style="color: #aaa; font-size: 0.9rem; margin-bottom: 10px;">Total Funds Verified</div>
                    <div class="analytic-value" id="stat-raised">₹0</div>
                </div>
                <div class="analytic-card">
                    <div style="color: #aaa; font-size: 0.9rem; margin-bottom: 10px;">Monthly Goal</div>
                    <div class="analytic-value" id="stat-goal" style="color: #9ca3af;">₹0</div>
                </div>
                <div class="analytic-card">
                    <div style="color: #aaa; font-size: 0.9rem; margin-bottom: 10px;">Goal Progress</div>
                    <div class="analytic-value" id="stat-percent" style="color: var(--success);">0%</div>
                </div>
            </div>

            <div class="dashboard-layout">
                <div class="cms-card">
                    <h2><i class="fas fa-sliders-h"></i> Page Settings</h2>
                    
                    <div style="margin-bottom: 15px;">
                        <label>Monthly Goal Target (₹)</label>
                        <input type="number" id="setGoal" class="admin-input">
                    </div>
                    <div style="margin-bottom: 15px;">
                        <label>Current Amount Raised (₹) <br><small style="color:#777;">(Auto-updates when you verify donations below)</small></label>
                        <input type="number" id="setCurrent" class="admin-input">
                    </div>

                    <h3 style="margin: 30px 0 15px 0; font-size: 1.1rem; border-bottom: 1px solid #333; padding-bottom: 10px;">Custom Banner</h3>
                    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px;">
                        <input type="checkbox" id="bannerActive" style="width: 20px; height: 20px;">
                        <label style="margin: 0;">Enable Top Banner</label>
                    </div>
                    <div style="margin-bottom: 20px;">
                        <label>Banner Message</label>
                        <input type="text" id="bannerMsg" class="admin-input" placeholder="e.g., Thank you for helping us hit 50% of our goal!">
                    </div>

                    <button class="btn-primary" id="saveSettingsBtn" style="background: linear-gradient(135deg, var(--primary), #6a1b9a);"><i class="fas fa-save"></i> Save Page Settings</button>
                    <div id="settingsStatus" style="margin-top: 10px; text-align: center; font-size: 0.85rem;"></div>
                </div>

                <div class="cms-card">
                    <h2><i class="fas fa-list-alt"></i> Donation Ledger</h2>
                    <div style="overflow-x: auto;">
                        <table id="donationsTable">
                            <thead>
                                <tr>
                                    <th>Donor</th>
                                    <th>Amount</th>
                                    <th>UTR / Ref</th>
                                    <th>Message</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="donationsBody">
                                <tr><td colspan="6" style="text-align:center; color:#777;">Loading ledger...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, query, orderBy, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyB7i67_T7fs87BHIY2Pxs6KRAknhXrowIA", authDomain: "dramakan007.firebaseapp.com", projectId: "dramakan007" };
        const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);

        const OWNER_EMAIL = "zabaazcreations@gmail.com";
        const settingsRef = doc(db, "donation_settings", "main");

        // Auth
        onAuthStateChanged(auth, (user) => {
            if (user && user.email.toLowerCase() === OWNER_EMAIL.toLowerCase()) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard-screen').style.display = 'block';
                initDashboard();
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('dashboard-screen').style.display = 'none';
                if(user) signOut(auth);
            }
        });

        document.getElementById('login-btn').addEventListener('click', async () => {
            const email = document.getElementById('admin-email').value;
            const pass = document.getElementById('admin-password').value;
            try { await signInWithEmailAndPassword(auth, email, pass); } 
            catch (e) { alert("Login failed: " + e.message); }
        });

        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

        // Init
        function initDashboard() {
            // 1. Listen to Settings
            onSnapshot(settingsRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    const raised = data.currentAmount || 0;
                    const goal = data.goalAmount || 5000;
                    const pct = Math.min(((raised / goal) * 100), 100).toFixed(1);

                    document.getElementById('stat-raised').innerText = `₹${raised.toLocaleString()}`;
                    document.getElementById('stat-goal').innerText = `₹${goal.toLocaleString()}`;
                    document.getElementById('stat-percent').innerText = `${pct}%`;

                    // Only update inputs if they aren't currently being typed in
                    if(document.activeElement.id !== 'setGoal') document.getElementById('setGoal').value = goal;
                    if(document.activeElement.id !== 'setCurrent') document.getElementById('setCurrent').value = raised;
                    if(document.activeElement.id !== 'bannerActive') document.getElementById('bannerActive').checked = data.bannerActive || false;
                    if(document.activeElement.id !== 'bannerMsg') document.getElementById('bannerMsg').value = data.bannerMessage || "";
                }
            });

            // 2. Listen to Ledger
            const q = query(collection(db, "donations"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snapshot) => {
                const tbody = document.getElementById('donationsBody');
                if (snapshot.empty) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:#777;">No donations recorded yet.</td></tr>';
                    return;
                }

                let html = '';
                snapshot.forEach(docSnap => {
                    const d = docSnap.data();
                    const isVerified = d.status === "Verified";
                    const badgeClass = isVerified ? "bg-success" : "bg-pending";
                    const msg = d.message ? `"${d.message}"` : `<span style="color:#777;">No message</span>`;

                    html += `
                        <tr>
                            <td><strong>${d.donorName || 'Anonymous'}</strong></td>
                            <td style="color: var(--heart); font-weight: 600;">₹${d.amount}</td>
                            <td style="font-family: monospace; color: #aaa;">${d.transactionId || 'N/A'}</td>
                            <td style="font-size: 0.8rem; font-style: italic; max-width: 200px;">${msg}</td>
                            <td><span class="badge ${badgeClass}">${d.status}</span></td>
                            <td style="display: flex; gap: 8px;">
                                <button class="btn-verify" onclick="verifyDonation('${docSnap.id}', ${d.amount})" ${isVerified ? 'disabled' : ''}>
                                    ${isVerified ? '<i class="fas fa-check"></i> Verified' : 'Verify'}
                                </button>
                                <button class="btn-delete" onclick="deleteDonation('${docSnap.id}')"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                    `;
                });
                tbody.innerHTML = html;
            });
        }

        // Save Settings
        document.getElementById('saveSettingsBtn').addEventListener('click', async () => {
            const btn = document.getElementById('saveSettingsBtn');
            const status = document.getElementById('settingsStatus');
            btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Saving...";
            
            try {
                await setDoc(settingsRef, {
                    goalAmount: parseInt(document.getElementById('setGoal').value) || 5000,
                    currentAmount: parseInt(document.getElementById('setCurrent').value) || 0,
                    bannerActive: document.getElementById('bannerActive').checked,
                    bannerMessage: document.getElementById('bannerMsg').value
                }, { merge: true });
                
                status.style.color = "#10B981";
                status.innerText = "Settings updated live!";
            } catch(e) {
                status.style.color = "#EF4444";
                status.innerText = "Error: " + e.message;
            }
            btn.innerHTML = "<i class='fas fa-save'></i> Save Page Settings";
            setTimeout(() => status.innerText = "", 3000);
        });

        // Verify Donation Action
        window.verifyDonation = async (id, amount) => {
            if (!confirm(`Mark ₹${amount} as verified? This will automatically add ₹${amount} to the progress bar on the live site.`)) return;

            try {
                // 1. Mark as verified
                await updateDoc(doc(db, "donations", id), { status: "Verified" });
                
                // 2. Add to total in settings
                const snap = await getDoc(settingsRef);
                let current = 0;
                if(snap.exists()) current = snap.data().currentAmount || 0;
                
                await updateDoc(settingsRef, { currentAmount: current + amount });

            } catch (e) { alert("Error verifying: " + e.message); }
        };

        // Delete Donation Action
        window.deleteDonation = async (id) => {
            if (!confirm("Permanently delete this record? (Note: This will not deduct from the progress bar automatically. Adjust settings manually if needed).")) return;
            try { await deleteDoc(doc(db, "donations", id)); } 
            catch (e) { alert("Error deleting: " + e.message); }
        };

    </script>
</body>
</html>
