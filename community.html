<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Updates & Alerts - AnyKan</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <style>
        /* =========================================
           1. LIQUID GLASS VARIABLES
        ========================================= */
        :root {
            --primary-color: #8A2BE2;
            --primary-rich: #6a1b9a;
            --primary-glow: rgba(138, 43, 226, 0.4);
            
            --bg-base: #050507; 
            --text-color: #FFFFFF;
            --text-muted: #9CA3AF;
            
            --glass-bg: rgba(20, 20, 25, 0.4);
            --glass-bg-hover: rgba(138, 43, 226, 0.1);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-border-light: rgba(138, 43, 226, 0.2);
            --glass-blur: blur(20px);
            
            --bottom-nav-bg: rgba(20, 20, 25, 0.45);
            --bottom-nav-border: rgba(255, 255, 255, 0.08);
            --bottom-nav-item: rgba(255, 255, 255, 0.5);
            --bottom-nav-item-active: #fff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-base); 
            color: var(--text-color);
            padding-bottom: 120px;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .liquid-orb {
            position: fixed; border-radius: 50%; filter: blur(120px);
            z-index: -1; pointer-events: none;
            animation: floatOrb 25s infinite ease-in-out alternate;
        }
        .orb-1 { width: 50vw; height: 50vw; background: rgba(138, 43, 226, 0.15); top: -10%; left: -10%; }
        .orb-2 { width: 40vw; height: 40vw; background: rgba(138, 43, 226, 0.1); bottom: 10%; right: -10%; animation-delay: -10s; }
        
        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(5%, 10%) scale(1.1); }
            100% { transform: translate(-5%, -5%) scale(0.95); }
        }

        /* =========================================
           2. HEADER & PAGE STRUCTURE
        ========================================= */
        .app-header {
            position: sticky; top: 0; left: 0; width: 100%; z-index: 1000; padding: 15px 5%;
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(5,5,7,0.85); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--glass-border);
        }

        .header-title { font-size: 1.5rem; font-weight: 700; display: flex; align-items: center; gap: 10px; color: #fff;}
        .header-title i { color: var(--primary-color); }
        
        .header-logo { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.5px; color: #fff; text-decoration: none; transition: transform 0.3s; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .header-logo span { color: var(--primary-color); text-shadow: 0 0 10px var(--primary-glow); }
        .header-logo:hover { transform: scale(1.05); }

        .pc-nav { display: flex; gap: 15px; align-items: center; }
        .pc-nav a { color: var(--text-muted); text-decoration: none; font-size: 0.95rem; font-weight: 500; transition: all 0.3s; display: flex; align-items: center; gap: 8px; padding: 8px 16px; border-radius: 50px;}
        .pc-nav a:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .pc-nav a.active { color: #fff; background: rgba(138, 43, 226, 0.15); box-shadow: 0 4px 15px var(--primary-glow); border: 1px solid rgba(138, 43, 226, 0.3); }
        .pc-nav a.active i { color: var(--primary-color); }

        .notif-container { max-width: 850px; margin: 30px auto; padding: 0 5%; }

        @media (min-width: 993px) {
            .mobile-only { display: none !important; }
        }

        /* =========================================
           3. NOTIFICATION CARDS & MODAL
        ========================================= */
        .notif-list { display: flex; flex-direction: column; gap: 15px; }
        
        .notif-card {
            background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border); border-radius: 20px;
            padding: 25px; display: flex; align-items: flex-start; gap: 20px; position: relative;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            animation: slideIn 0.5s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .notif-card:hover { 
            background: var(--glass-bg-hover); border-color: var(--glass-border-light); 
            transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .notif-icon-wrap {
            width: 55px; height: 55px; border-radius: 50%;
            background: rgba(138, 43, 226, 0.15); color: var(--primary-color);
            display: flex; justify-content: center; align-items: center;
            font-size: 1.4rem; flex-shrink: 0; border: 1px solid rgba(138, 43, 226, 0.3);
            box-shadow: inset 0 0 10px rgba(138, 43, 226, 0.2);
        }

        .notif-content { flex: 1; min-width: 0; padding-right: 0; }
        .notif-header-info { display: flex; flex-direction: column; align-items: flex-start; margin-bottom: 8px; gap: 2px;}
        .notif-title { font-size: 1.1rem; font-weight: 600; color: #fff; margin: 0; line-height: 1.3;}
        .notif-time { font-size: 0.8rem; color: #777; white-space: nowrap;}
        
        .notif-msg-snippet { 
            font-size: 0.95rem; color: var(--text-muted); margin: 0 0 12px 0; line-height: 1.5; 
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }

        .btn-read-more {
            background: rgba(138, 43, 226, 0.1); color: var(--primary-color); border: 1px solid rgba(138, 43, 226, 0.3);
            padding: 8px 16px; border-radius: 50px; cursor: pointer; font-family: 'Poppins'; font-size: 0.85rem; 
            font-weight: 600; transition: all 0.3s; display: inline-flex; align-items: center; gap: 8px;
        }
        .btn-read-more:hover { background: var(--primary-color); color: #fff; box-shadow: 0 4px 15px var(--primary-glow); }

        .notif-link { 
            display: inline-flex; align-items: center; gap: 8px;
            color: var(--primary-color); text-decoration: none; 
            font-size: 0.85rem; font-weight: 600; transition: all 0.3s;
            background: rgba(138, 43, 226, 0.1); padding: 8px 16px; border-radius: 50px;
            border: 1px solid rgba(138, 43, 226, 0.2); margin-top: 20px;
        }
        .notif-link:hover { background: var(--primary-color); color: #fff; box-shadow: 0 4px 15px var(--primary-glow); }

        .empty-state {
            text-align: center; padding: 60px 20px; background: var(--glass-bg);
            border: 1px dashed var(--glass-border); border-radius: 20px;
        }
        .empty-state i { font-size: 4rem; color: rgba(255,255,255,0.1); margin-bottom: 20px; }
        .empty-state h3 { font-size: 1.2rem; color: #fff; margin-bottom: 10px; }
        .empty-state p { color: var(--text-muted); font-size: 0.95rem; }

        /* --- UPDATE MODAL STYLES --- */
        .update-modal-overlay {
            position: fixed; inset: 0; background: rgba(5,5,7,0.85); backdrop-filter: blur(5px);
            z-index: 9999; display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .update-modal-card {
            background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px;
            padding: 30px; width: 100%; max-width: 650px; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            backdrop-filter: blur(20px); max-height: 85vh; overflow-y: auto;
        }
        .update-modal-close {
            position: absolute; top: 15px; right: 20px; background: none; border: none; font-size: 1.5rem;
            color: var(--text-muted); cursor: pointer; transition: 0.3s;
        }
        .update-modal-close:hover { color: #fff; }
        
        .update-modal-card::-webkit-scrollbar { width: 6px; }
        .update-modal-card::-webkit-scrollbar-track { background: transparent; }
        .update-modal-card::-webkit-scrollbar-thumb { background: var(--primary-color); border-radius: 10px; }

        /* =========================================
           4. MOBILE NAVIGATION (APP-LIKE)
        ========================================= */
        @media (max-width: 992px) {
            .pc-only { display: none !important; }
            .mobile-only { display: flex !important; }

            .app-header { padding: 15px; }
            .header-title { font-size: 1.3rem; }
            .notif-container { margin: 20px auto; }
            
            .notif-card { padding: 20px; gap: 15px;}
            .notif-icon-wrap { width: 45px; height: 45px; font-size: 1.1rem; }
            .notif-content { padding-right: 0; }
            .notif-title { font-size: 1.05rem; }
            .notif-msg-snippet { font-size: 0.9rem; }

            .bottom-nav { display: flex !important; position: fixed !important; bottom: 15px !important; left: 50% !important; transform: translateX(-50%) !important; width: 90% !important; max-width: 400px !important; background: var(--bottom-nav-bg) !important; backdrop-filter: blur(40px) saturate(180%) !important; -webkit-backdrop-filter: blur(40px) saturate(180%) !important; border: 1px solid var(--bottom-nav-border) !important; border-radius: 50px !important; z-index: 9999 !important; padding: 5px 10px !important; box-shadow: 0 25px 50px rgba(0,0,0,0.5) !important;}
            .bottom-nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 6px 0; color: var(--bottom-nav-item); transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1); position: relative; text-decoration: none;}
            .bottom-nav-item.active { color: var(--bottom-nav-item-active); }
            .nav-icon { font-size: 1.35rem; margin-bottom: 4px; transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1); }
            .bottom-nav-item.active .nav-icon { transform: translateY(-4px) scale(1.15); color: var(--primary-color); filter: drop-shadow(0 0 10px var(--primary-glow));}
            .nav-label { font-size: 0.65rem; font-weight: 500; letter-spacing: 0.3px; transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1); }
            .bottom-nav-item.active .nav-label { font-weight: 700; text-shadow: 0 0 10px rgba(255,255,255,0.5);}
        }
        @media (min-width: 993px) { .bottom-nav { display: none !important; } }
    </style>
</head>
<body>

    <div class="liquid-orb orb-1"></div>
    <div class="liquid-orb orb-2"></div>

    <header class="app-header">
        <div style="display: flex; align-items: center; gap: 40px; width: 100%;">
            <a href="index.html" class="header-logo pc-only">Any<span>Kan</span></a>
            
            <div class="header-title mobile-only"><i class="fas fa-bell"></i> Updates</div>
            
            <nav class="pc-nav pc-only">
                <a href="index.html"><i class="fas fa-home"></i> Home</a>
                <a href="community.html" class="active"><i class="fas fa-bell"></i> Updates</a>
                <a href="mylist.html"><i class="fas fa-bookmark"></i> My List</a>
                <a href="profile.html"><i class="fas fa-user"></i> Profile</a>
            </nav>
        </div>
    </header>

    <main class="notif-container">
        <div id="page-notifications-list" class="notif-list">
            <div style="text-align: center; padding: 50px; color: var(--text-muted);">
                <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: var(--primary-color); margin-bottom: 15px;"></i>
                <p>Fetching latest updates...</p>
            </div>
        </div>
    </main>

    <!-- UPDATE MODAL POPUP -->
    <div class="update-modal-overlay" id="updateModal">
        <div class="update-modal-card">
            <button class="update-modal-close" onclick="closeUpdateModal()"><i class="fas fa-times"></i></button>
            <h2 id="modal-update-title" style="color: #fff; margin-top: 0; font-size: 1.4rem; padding-right: 20px;">Title</h2>
            <div class="notif-time" id="modal-update-time" style="margin-bottom: 20px; font-weight: 500;"><i class="far fa-clock"></i> Time</div>
            
            <!-- white-space: pre-wrap forces HTML to respect newlines/paragraphs from the database -->
            <div id="modal-update-body" style="color: var(--text-muted); font-size: 0.95rem; line-height: 1.7; white-space: pre-wrap;">Body</div>
            
            <a id="modal-update-link" href="#" class="notif-link" style="display: none;">View Details <i class="fas fa-arrow-right"></i></a>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="bottom-nav-item">
            <i class="fa-solid fa-house nav-icon"></i>
            <span class="nav-label">Home</span>
        </a>
        <a href="community.html" class="bottom-nav-item active">
            <i class="fa-solid fa-bell nav-icon"></i>
            <span class="nav-label">Updates</span>
        </a>
        <a href="mylist.html" class="bottom-nav-item">
            <i class="fa-solid fa-bookmark nav-icon"></i>
            <span class="nav-label">My List</span>
        </a>
        <a href="profile.html" class="bottom-nav-item" id="bottomAuthBtn">
            <i class="fa-solid fa-user nav-icon"></i>
            <span class="nav-label">Profile</span>
        </a>
    </nav>

    <script type="module">
        import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB7i67_T7fs87BHIY2Pxs6KRAknhXrowIA",
            authDomain: "dramakan007.firebaseapp.com",
            projectId: "dramakan007"
        };

        const app = !getApps().length ? initializeApp(firebaseConfig) : getApp();
        const db = getFirestore(app);
        const auth = getAuth(app);

        const listEl = document.getElementById('page-notifications-list');
        let activePageNotifs = [];

        function timeAgo(timestamp) {
            if(!timestamp) return "Just now";
            const date = typeof timestamp === 'number' ? new Date(timestamp) : new Date(timestamp.toMillis ? timestamp.toMillis() : timestamp);
            const seconds = Math.floor((new Date() - date) / 1000);
            
            let interval = seconds / 31536000;
            if (interval > 1) return Math.floor(interval) + " years ago";
            interval = seconds / 2592000;
            if (interval > 1) return Math.floor(interval) + " months ago";
            interval = seconds / 86400;
            if (interval > 1) return Math.floor(interval) + " days ago";
            interval = seconds / 3600;
            if (interval > 1) return Math.floor(interval) + " hours ago";
            interval = seconds / 60;
            if (interval > 1) return Math.floor(interval) + " minutes ago";
            return "Just now";
        }

        function renderPageNotifications() {
            if (activePageNotifs.length === 0) {
                listEl.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-newspaper"></i>
                        <h3>No updates yet!</h3>
                        <p>Check back later for news, features, and announcements.</p>
                    </div>
                `;
                return;
            }

            listEl.innerHTML = activePageNotifs.map(n => {
                let iconClass = "fa-bullhorn";
                if(n.title.toLowerCase().includes("vip") || n.title.includes("🎉") || n.title.includes("🎁")) iconClass = "fa-crown";
                if(n.title.toLowerCase().includes("warning") || n.title.includes("⚠️")) iconClass = "fa-exclamation-triangle";
                if(n.title.includes("🚀") || n.title.toLowerCase().includes("patch")) iconClass = "fa-rocket";

                return `
                    <div class="notif-card" id="page-card-${n.id}">
                        <div class="notif-icon-wrap"><i class="fas ${iconClass}"></i></div>
                        <div class="notif-content">
                            <div class="notif-header-info">
                                <h4 class="notif-title">${n.title}</h4>
                                <span class="notif-time"><i class="far fa-clock"></i> ${timeAgo(n.timestamp)}</span>
                            </div>
                            <!-- Minimal Snippet -->
                            <p class="notif-msg-snippet">${n.body}</p>
                            
                            <button class="btn-read-more" onclick="window.openUpdateModal('${n.id}')">Read Details <i class="fas fa-expand-arrows-alt"></i></button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // --- MODAL CONTROLLERS ---
        window.openUpdateModal = (id) => {
            const notif = activePageNotifs.find(n => n.id === id);
            if (!notif) return;
            
            document.getElementById('modal-update-title').innerText = notif.title;
            document.getElementById('modal-update-time').innerHTML = `<i class="far fa-clock"></i> ${timeAgo(notif.timestamp)}`;
            document.getElementById('modal-update-body').innerText = notif.body;
            
            const linkEl = document.getElementById('modal-update-link');
            if (notif.link) {
                linkEl.href = notif.link;
                linkEl.style.display = 'inline-flex';
            } else {
                linkEl.style.display = 'none';
            }
            
            document.getElementById('updateModal').style.display = 'flex';
        };

        window.closeUpdateModal = () => {
            document.getElementById('updateModal').style.display = 'none';
        };
        
        // Close modal on background click
        window.addEventListener('click', (e) => {
            const modal = document.getElementById('updateModal');
            if(e.target === modal) modal.style.display = 'none';
        });

        // --- ONE-TIME FETCH ENGINE (1 HOUR CACHE) ---
        async function fetchUpdates() {
            try {
                const cached = localStorage.getItem('Dramakan_Community_Cache');
                const cacheTime = localStorage.getItem('Dramakan_Community_Time');
                const now = Date.now();

                // Check if cache exists and is younger than 1 hour (3600000 ms)
                if (cached && cacheTime && (now - parseInt(cacheTime) < 3600000)) {
                    activePageNotifs = JSON.parse(cached);
                    renderPageNotifications();
                    return;
                }

                // If cache is missing or expired, fetch freshly from Firestore
                const q = query(collection(db, "notifications"), orderBy("createdAt", "desc"), limit(30));
                const snapshot = await getDocs(q);
                
                activePageNotifs = [];
                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    
                    // STRICT FILTER: Only show global Community Updates, never direct targeted alerts.
                    if (data.target === 'all' || data.target === 'viewers') {
                        const ts = data.createdAt ? (typeof data.createdAt === 'number' ? data.createdAt : (data.createdAt.toMillis ? data.createdAt.toMillis() : Date.now())) : Date.now();
                        
                        activePageNotifs.push({
                            id: docSnap.id,
                            title: data.title || "Update",
                            body: data.message || data.body || "",
                            link: data.link || "",
                            timestamp: ts
                        });
                    }
                });

                // Update Browser Cache
                localStorage.setItem('Dramakan_Community_Cache', JSON.stringify(activePageNotifs));
                localStorage.setItem('Dramakan_Community_Time', now.toString());

                renderPageNotifications();

            } catch (error) {
                console.error("Fetch error:", error);
                listEl.innerHTML = `<div class="empty-state"><h3>Unable to load updates. Check connection.</h3></div>`;
            }
        }

        // Fire fetch instantly regardless of auth state to prevent loading stalls
        fetchUpdates();

        // --- MARK AS READ LOGIC ---
        // Runs passively in the background so the dropdown bell drops its red dot
        onAuthStateChanged(auth, (user) => {
            if (user) {
                try {
                    updateDoc(doc(db, "users", user.uid), { lastReadTime: Date.now() });
                } catch(e) {}
            } else {
                localStorage.setItem('Anykan_Last_Read', Date.now());
            }
        });

    </script>
</body>
</html>
