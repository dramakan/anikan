<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirecting - AnyKan</title>
    <script>
        // 1. Get the broken URL the user tried to visit (e.g., "/BoyfriendOnDemand.html")
        const path = window.location.pathname.replace(/^\/+/, '');
        
        // 2. Check if it looks like one of your old drama files
        if (path.endsWith('.html') && path !== 'index.html') {
            
            // 3. Strip the ".html" to get the exact database ID (e.g., "BoyfriendOnDemand")
            const dramaId = path.replace('.html', '');
            
            // 4. Instantly redirect them to the new dynamic database link!
            window.location.replace('/watch.html?id=' + dramaId);
            
        } else {
            // If it's just a totally random broken link, send them to the homepage
            window.location.replace('/index.html');
        }
    </script>
    <style>
        body { background: #0B0C10; color: #8A2BE2; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
    </style>
<script src="bottom-bar.js" defer></script>
<script src="feedback-popup.js" defer></script><script src="lightmode.js"></script> 
    
    
    <link rel="stylesheet" href="lightmode.css"> 
</head>
<body>
    <h2>Loading your drama...</h2>
</body>
</html>
