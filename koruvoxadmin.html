<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KoruVox x Anykan | Exclusive Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <style>
        /* --- KORUVOX DEDICATED ADMIN THEME --- */
        :root { 
            --koruvox-color: #FF5722; 
            --anykan-color: #8A2BE2;
            --gradient-brand: linear-gradient(135deg, var(--koruvox-color) 0%, var(--anykan-color) 100%);
            
            --bg-base: #08080a; 
            --bg-surface: rgba(26, 26, 29, 0.6); 
            
            --primary: #FF5722; 
            --primary-glow: rgba(255, 87, 34, 0.4); 
            --primary-hover: #E64A19;
            
            --text-main: #F8FAFC; 
            --text-muted: #94A3B8; 
            --border-subtle: rgba(255, 255, 255, 0.08); 
            --border-highlight: rgba(255, 87, 34, 0.3);
            
            --danger: #EF4444; 
            --danger-glow: rgba(239, 68, 68, 0.25);
            --success: #10B981; 
            --success-glow: rgba(16, 185, 129, 0.25);
            
            --glass-blur: blur(20px) saturate(160%);
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg-base); color: var(--text-main); min-height: 100vh; overflow-x: hidden; background-image: radial-gradient(circle at 15% 10%, rgba(255, 87, 34, 0.08), transparent 40%), radial-gradient(circle at 85% 80%, rgba(138, 43, 226, 0.08), transparent 40%); }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* Premium Nav */
        .admin-nav { padding: 16px 5%; background: rgba(8, 8, 10, 0.85); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border-bottom: 1px solid var(--border-subtle); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 30px rgba(0, 0, 0, 0.6); }
        
        .brand-combo { display: flex; align-items: center; gap: 15px; }
        .brand-combo img { height: 35px; object-fit: contain; }
        .brand-combo .divider { width: 1px; height: 20px; background: var(--border-subtle); }
        .brand-combo .logo-text { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.5px; text-decoration: none; color: #fff;}
        .brand-combo .logo-text span { background: var(--gradient-brand); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .nav-actions { display: flex; gap: 12px; }
        .btn-action { background: rgba(255,255,255,0.04); color: var(--text-main); border: 1px solid var(--border-subtle); padding: 8px 16px; border-radius: 12px; cursor: pointer; transition: var(--transition-smooth); text-decoration: none; display: flex; align-items: center; gap: 8px; font-weight: 500; font-size: 0.9rem; }
        .btn-action:hover:not(:disabled) { background: rgba(255,255,255,0.1); border-color: var(--border-highlight); transform: translateY(-2px); }
        .btn-action:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-logout { background: rgba(239, 68, 68, 0.08); color: #FCA5A5; border-color: rgba(239, 68, 68, 0.2); }
        .btn-logout:hover { background: var(--danger); color: #fff; border-color: var(--danger); box-shadow: 0 4px 15px var(--danger-glow); }
        
        .admin-container { max-width: 1200px; margin: 30px auto; padding: 0 4% 80px 4%; animation: fadeIn 0.5s ease; width: 100%; }

        /* Login Screen */
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .login-box { background: var(--bg-surface); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); padding: 50px 40px; border-radius: 24px; border: 1px solid var(--border-subtle); width: 100%; max-width: 420px; box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.05); text-align: center; }
        .login-box h2 { margin-bottom: 30px; color: #fff; font-size: 1.8rem; font-weight: 600; letter-spacing: -0.5px; }
        .login-box h2 i { background: var(--gradient-brand); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 20px var(--primary-glow); display: block; font-size: 3.5rem; margin-bottom: 15px; }

        /* Inputs & Buttons */
        .admin-input, .admin-select { width: 100%; padding: 14px 18px; background: rgba(0,0,0,0.4); border: 1px solid var(--border-subtle); color: #fff; border-radius: 12px; font-family: 'Poppins', sans-serif; font-size: 0.95rem; transition: var(--transition-smooth); outline: none; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); }
        .admin-input::placeholder { color: #64748B; }
        .admin-input:focus, .admin-select:focus { border-color: var(--primary); background: rgba(0,0,0,0.6); box-shadow: 0 0 0 4px rgba(255, 87, 34, 0.15), inset 0 2px 4px rgba(0,0,0,0.2); }
        .admin-select { cursor: pointer; appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23a1a1aa' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 1rem center; background-size: 1.2em; padding-right: 2.5rem; }
        .admin-select option { background: #0f0f13; color: #fff; }
        
        .btn-primary { width: 100%; padding: 14px; background: var(--gradient-brand); color: #fff; border: none; border-radius: 12px; font-weight: 600; font-size: 1rem; cursor: pointer; transition: var(--transition-smooth); box-shadow: 0 6px 20px var(--primary-glow); display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255, 87, 34, 0.5); filter: brightness(1.1); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

        #dashboard-screen { display: none; }
        
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }
        .header-flex h2 { font-size: 1.4rem; font-weight: 600; color: #fff; display: flex; align-items: center; gap: 10px; }
        .header-flex h2 i { background: var(--gradient-brand); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Analytics Grid */
        .analytics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .analytic-card { background: var(--bg-surface); backdrop-filter: var(--glass-blur); border: 1px solid var(--border-subtle); padding: 25px; border-radius: 20px; text-align: left; box-shadow: 0 10px 30px rgba(0,0,0,0.2); transition: var(--transition-smooth); display: flex; flex-direction: column;}
        .analytic-card:hover { transform: translateY(-5px); border-color: var(--border-highlight); box-shadow: 0 15px 40px rgba(0,0,0,0.4); }
        .analytic-card i { font-size: 1.6rem; margin-bottom: 15px; display: inline-flex; align-items: center; justify-content: center; width: 48px; height: 48px; border-radius: 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); }
        .analytic-value { font-size: 2.2rem; font-weight: 700; color: #fff; margin-bottom: 5px; line-height: 1; }
        .analytic-label { font-size: 0.85rem; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }

        /* Glass Tables */
        .table-wrapper { background: var(--bg-surface); backdrop-filter: var(--glass-blur); border: 1px solid var(--border-subtle); border-radius: 20px; overflow-x: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.3); margin-bottom: 40px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 800px; text-align: left; }
        th, td { padding: 18px 24px; border-bottom: 1px solid rgba(255,255,255,0.04); white-space: nowrap; }
        th { background: rgba(0,0,0,0.3); color: var(--text-muted); font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
        td { font-size: 0.95rem; color: #E2E8F0; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(255,255,255,0.03); }
        
        .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 50px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;}
        .status-active { background: rgba(138, 43, 226, 0.15); border: 1px solid rgba(138, 43, 226, 0.4); color: #c488ff; }
        .status-upcoming { background: rgba(255, 87, 34, 0.15); border: 1px solid rgba(255, 87, 34, 0.4); color: #FF5722; }

        /* Action Buttons */
        .action-buttons-cell { display: flex; gap: 10px; align-items: center; }
        .icon-btn { width: 38px; height: 38px; border-radius: 10px; display: inline-flex; justify-content: center; align-items: center; border: 1px solid var(--border-subtle); cursor: pointer; transition: var(--transition-smooth); background: rgba(255,255,255,0.02); color: var(--text-muted); }
        .icon-btn:hover { transform: translateY(-2px); }
        .icon-btn.edit:hover { background: rgba(138, 43, 226, 0.15); color: #c488ff; border-color: rgba(138, 43, 226, 0.4); }
        .icon-btn.delete:hover { background: rgba(239, 68, 68, 0.15); color: #FCA5A5; border-color: rgba(239, 68, 68, 0.4); }

        /* CMS Form Wrapper */
        .cms-form-wrapper { background: var(--bg-surface); backdrop-filter: var(--glass-blur); border: 1px solid var(--border-subtle); border-radius: 24px; padding: 40px; margin-bottom: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.4); }
        .cms-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .cms-group { display: flex; flex-direction: column; gap: 8px; }
        .cms-group label { color: #CBD5E1; font-size: 0.85rem; font-weight: 500; padding-left: 4px; letter-spacing: 0.5px; }
        .cms-group.full-width { grid-column: 1 / -1; }
        
        .section-title { font-size: 1.15rem; color: #fff; margin-top: 10px; margin-bottom: 5px; padding-bottom: 12px; border-bottom: 1px solid var(--border-subtle); grid-column: 1 / -1; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .section-title i { background: var(--gradient-brand); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @media (max-width: 900px) {
            .cms-form-grid { grid-template-columns: 1fr; }
            .header-flex { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2><i class="fas fa-fingerprint"></i> KoruVox Admin</h2>
            <form id="admin-login-form">
                <div class="cms-group" style="margin-bottom: 18px;"><input type="email" id="admin-email" class="admin-input" placeholder="Administrator Email" required></div>
                <div class="cms-group" style="margin-bottom: 24px;"><input type="password" id="admin-password" class="admin-input" placeholder="Security Key" required></div>
                <button type="submit" class="btn-primary" id="login-btn">Authenticate <i class="fas fa-arrow-right"></i></button>
            </form>
        </div>
    </div>

    <div id="dashboard-screen">
        <nav class="admin-nav">
            <div class="brand-combo">
                <img src="klogo.png" alt="KoruVox" onerror="this.src='https://via.placeholder.com/100x35/000000/FFFFFF?text=KORUVOX'">
                <div class="divider"></div>
                <a href="koruvox.html" class="logo-text">Any<span>Kan</span></a>
            </div>
            <div class="nav-actions">
                <a href="koruvox.html" class="btn-action" target="_blank"><i class="fas fa-external-link-alt"></i> <span>View Page</span></a>
                <button class="btn-action btn-logout" id="logout-btn"><i class="fas fa-power-off"></i></button>
            </div>
        </nav>

        <div class="admin-container">
            
            <div class="header-flex">
                <h2><i class="fas fa-chart-pie"></i> KoruVox Telemetry</h2>
            </div>
            
            <div class="analytics-grid">
                <div class="analytic-card">
                    <i class="fas fa-crown" style="color: #c488ff; border-color: rgba(196, 136, 255, 0.3); background: rgba(196, 136, 255, 0.1);"></i>
                    <div class="analytic-value" id="ui-total-exclusives">0</div>
                    <div class="analytic-label">Active Exclusives</div>
                </div>
                <div class="analytic-card">
                    <i class="fas fa-fire" style="color: #FF5722; border-color: rgba(255, 87, 34, 0.3); background: rgba(255, 87, 34, 0.1);"></i>
                    <div class="analytic-value" id="ui-total-upcoming">0</div>
                    <div class="analytic-label">Upcoming Titles</div>
                </div>
            </div>

            <div class="cms-form-wrapper">
                <div class="header-flex" style="margin-bottom: 25px;">
                    <h2 style="font-size: 1.4rem;"><i class="fas fa-plus-circle"></i> <span id="form-title">Inject KoruVox Content</span></h2>
                </div>
                
                <form id="cms-form">
                    <div class="cms-form-grid">
                        
                        <div class="section-title"><i class="fas fa-database"></i> Source Data</div>
                        
                        <div class="cms-group full-width">
                            <label><i class="fas fa-fingerprint"></i> TMDB / IMDb ID (Required for Security Rules)</label>
                            <div style="display: flex; gap: 10px;">
                                <input type="text" id="cms-tmdb" class="admin-input" placeholder="e.g. 12345 or tt1234567" required style="margin-bottom: 0;">
                                <button type="button" id="btn-autofill" class="btn-action" style="background: rgba(138, 43, 226, 0.15); color: #c488ff; border-color: rgba(138, 43, 226, 0.4); white-space: nowrap; padding: 0 24px;">
                                    <i class="fas fa-magic"></i> Auto-Fill
                                </button>
                            </div>
                            <small style="color: var(--text-muted); font-size: 0.8rem; margin-top: 4px;">Provides ID syncing and auto-populates metadata.</small>
                        </div>

                        <div class="section-title"><i class="fas fa-info-circle"></i> Metadata</div>

                        <div class="cms-group full-width"><label>Content Title</label><input type="text" id="cms-title" class="admin-input" placeholder="e.g. Seven Deadly Sins" required></div>
                        <div class="cms-group full-width"><label>Cover Art URL (16:9 Landscape ideal for Upcoming)</label><input type="url" id="cms-img" class="admin-input" placeholder="https://..." required></div>
                        
                        <div class="cms-group"><label>Display Tags (e.g. Anime · Series)</label><input type="text" id="cms-type" class="admin-input" required></div>
                        <div class="cms-group">
                            <label>Placement Status</label>
                            <select id="cms-status" class="admin-select" required>
                                <option value="Exclusive">Active Exclusive (Standard Grid)</option>
                                <option value="Upcoming">Coming Soon (Top Carousel)</option>
                            </select>
                        </div>

                        <div class="cms-group full-width"><label>Synopsis / Description</label><textarea id="cms-synopsis" class="admin-input" rows="3" required></textarea></div>

                        <!-- 🆕 VIDEO SOURCES (EPISODES & SEASONS) -->
                        <div class="section-title"><i class="fas fa-link"></i> Video Sources (Episodes & Movies)</div>
                        <div class="cms-group full-width">
                            <label>Map Direct URLs (.mp4, .m3u8) to specific Seasons & Episodes</label>
                            <div id="episodes-list" style="display: flex; flex-direction: column; gap: 12px; margin-top: 10px;">
                                <!-- Episode rows injected here via JS -->
                            </div>
                            <button type="button" id="btn-add-ep" class="btn-action" style="margin-top: 15px; width: max-content; background: rgba(138, 43, 226, 0.15); color: #c488ff; border-color: rgba(138, 43, 226, 0.4);">
                                <i class="fas fa-plus"></i> Add Video Source
                            </button>
                        </div>

                        <div style="display: flex; gap: 15px; grid-column: 1 / -1; margin-top: 15px;">
                            <button type="submit" id="cms-submit" class="btn-primary" style="flex: 1;"><i class="fas fa-cloud-upload-alt"></i> Deploy Content</button>
                            <button type="button" id="cms-cancel" class="btn-action" style="display: none; border-color: rgba(239, 68, 68, 0.3); color: #FCA5A5; justify-content: center; padding: 0 24px; background: rgba(239, 68, 68, 0.05);"><i class="fas fa-times"></i> Abort</button>
                        </div>
                    </div>
                </form>
            </div>

            <div class="header-flex">
                <h2><i class="fas fa-server"></i> KoruVox Registry</h2>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>Asset</th><th>Title</th><th>Tags</th><th>Placement</th><th>Operations</th></tr></thead>
                    <tbody id="dramas-table-body">
                        <tr><td colspan="5" style="text-align: center; padding: 40px;"><i class="fas fa-circle-notch fa-spin"></i> Loading...</td></tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, getDoc, setDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // IMPORTANT: Uses the exact same Firebase environment
        const firebaseConfig = { apiKey: "AIzaSyB7i67_T7fs87BHIY2Pxs6KRAknhXrowIA", authDomain: "dramakan007.firebaseapp.com", projectId: "dramakan007" };
        const app = initializeApp(firebaseConfig); 
        const auth = getAuth(app); 
        const db = getFirestore(app);

        const OWNER_EMAIL = "zabaazcreations@gmail.com"; 
        
        // UNIQUE COLLECTION FOR KORUVOX ONLY
        const KORU_COLLECTION = "koruvox_content"; 
        let editingDramaId = null;
        
        // TMDB API KEY FOR AUTOFILL
        const TMDB_API_KEY = "014fbdbe962cb38379e09e31d0652459";

        // AUTHENTICATION LOGIC
        onAuthStateChanged(auth, (user) => {
            if (user && user.email.toLowerCase() === OWNER_EMAIL.toLowerCase()) {
                document.getElementById('login-screen').style.display = 'none'; 
                document.getElementById('dashboard-screen').style.display = 'block';
                loadKoruContent(); 
            } else if (user) { 
                alert("Unauthorized Access. You are not the admin."); signOut(auth); 
            } else { 
                document.getElementById('login-screen').style.display = 'flex'; 
                document.getElementById('dashboard-screen').style.display = 'none'; 
            }
        });
        
        document.getElementById('admin-login-form').addEventListener('submit', async (e) => { 
            e.preventDefault(); 
            const email = document.getElementById('admin-email').value; 
            const password = document.getElementById('admin-password').value; 
            const btn = document.getElementById('login-btn');
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Authenticating...';
            if (email.toLowerCase() !== OWNER_EMAIL.toLowerCase()) {
                alert("Only the owner can access this panel.");
                btn.innerHTML = 'Authenticate <i class="fas fa-arrow-right"></i>';
                return;
            }
            try { await signInWithEmailAndPassword(auth, email, password); } 
            catch (error) { 
                alert("Authentication Failed.");
                btn.innerHTML = 'Authenticate <i class="fas fa-arrow-right"></i>';
            } 
        });
        
        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

        // --- EPISODE LINK MANAGER LOGIC ---
        const episodesList = document.getElementById('episodes-list');
        
        function addEpisodeRow(season = 1, episode = 1, url = '') {
            const row = document.createElement('div');
            row.className = 'ep-row';
            row.style = 'display: flex; gap: 10px; align-items: center; width: 100%;';
            row.innerHTML = `
                <input type="number" placeholder="S#" value="${season}" class="admin-input ep-s" style="width: 80px; margin-bottom: 0;" required>
                <input type="number" placeholder="Ep#" value="${episode}" class="admin-input ep-e" style="width: 80px; margin-bottom: 0;" required>
                <input type="url" placeholder="Direct Video URL (.mp4, .m3u8)" value="${url}" class="admin-input ep-url" style="flex: 1; margin-bottom: 0;" required>
                <button type="button" class="icon-btn delete btn-remove-ep" title="Remove Link"><i class="fas fa-times"></i></button>
            `;
            row.querySelector('.btn-remove-ep').addEventListener('click', () => row.remove());
            episodesList.appendChild(row);
        }

        document.getElementById('btn-add-ep').addEventListener('click', () => {
            // Auto-increment episode number based on the last row added
            let lastS = 1;
            let lastE = 0;
            const rows = document.querySelectorAll('.ep-row');
            if (rows.length > 0) {
                const lastRow = rows[rows.length - 1];
                lastS = parseInt(lastRow.querySelector('.ep-s').value) || 1;
                lastE = parseInt(lastRow.querySelector('.ep-e').value) || 0;
            }
            addEpisodeRow(lastS, lastE + 1, '');
        });

        // Initialize with one empty row
        addEpisodeRow(1, 1, '');

        // --- TMDB AUTOFILL LOGIC ---
        document.getElementById('btn-autofill').addEventListener('click', async () => {
            const idInput = document.getElementById('cms-tmdb').value.trim();
            if (!idInput) {
                alert("Please enter a TMDB or IMDb ID first.");
                return;
            }

            const btn = document.getElementById('btn-autofill');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Fetching...';
            btn.disabled = true;

            try {
                let isImdb = idInput.startsWith('tt');
                let data = null;
                let finalTmdbId = idInput;

                if (isImdb) {
                    const res = await fetch(`https://api.themoviedb.org/3/find/${idInput}?api_key=${TMDB_API_KEY}&external_source=imdb_id`);
                    const json = await res.json();
                    data = json.tv_results[0] || json.movie_results[0];
                    if (data) {
                        finalTmdbId = data.id.toString();
                        document.getElementById('cms-tmdb').value = finalTmdbId; 
                    }
                } else {
                    const res = await fetch(`https://api.themoviedb.org/3/tv/${idInput}?api_key=${TMDB_API_KEY}`);
                    data = await res.json();
                    if (data.success === false) {
                        const movieRes = await fetch(`https://api.themoviedb.org/3/movie/${idInput}?api_key=${TMDB_API_KEY}`);
                        data = await movieRes.json();
                    }
                }

                if (!data || data.success === false) throw new Error("Content not found");

                document.getElementById('cms-title').value = data.name || data.title || '';
                document.getElementById('cms-synopsis').value = data.overview || '';
                
                if (data.poster_path) {
                    document.getElementById('cms-img').value = `https://image.tmdb.org/t/p/original${data.poster_path}`;
                }

            } catch (error) {
                console.error("Autofill Error:", error);
                alert("Could not fetch data. Verify the ID.");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });

        // --- CONTENT MANAGER LOGIC ---
        async function loadKoruContent() {
            const tbody = document.getElementById('dramas-table-body');
            try {
                const snap = await getDocs(query(collection(db, KORU_COLLECTION), orderBy("createdAt", "desc"))); 
                tbody.innerHTML = '';
                
                let countExclusives = 0;
                let countUpcoming = 0;

                if (snap.empty) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 40px; color: var(--text-muted);">No KoruVox content found. Add some above.</td></tr>';
                }

                snap.forEach(docSnap => {
                    const data = docSnap.data(); 
                    const id = docSnap.id;
                    
                    if(data.status === 'Upcoming') countUpcoming++;
                    else countExclusives++;

                    const badgeClass = data.status === 'Upcoming' ? 'status-upcoming' : 'status-active';

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><img src="${data.img}" style="width: 80px; height: 45px; border-radius: 6px; object-fit: cover; border: 1px solid var(--border-subtle);"></td>
                        <td><strong style="color: #fff; font-size: 1.05rem;">${data.title}</strong></td>
                        <td><span style="color: var(--text-muted);">${data.type}</span></td>
                        <td><span class="status-badge ${badgeClass}">${data.status}</span></td>
                        <td class="action-buttons-cell">
                            <button class="icon-btn edit" onclick="startEditKoru('${id}')" title="Edit"><i class="fas fa-pen"></i></button>
                            <button class="icon-btn delete" onclick="deleteKoru('${id}')" title="Delete"><i class="fas fa-trash"></i></button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

                document.getElementById('ui-total-exclusives').innerText = countExclusives;
                document.getElementById('ui-total-upcoming').innerText = countUpcoming;

            } catch (err) {
                console.error("Failed to load DB:", err);
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: red;">Database connection failed.</td></tr>';
            }
        }

        window.startEditKoru = async function(id) {
            try {
                const snap = await getDoc(doc(db, KORU_COLLECTION, id));
                if (snap.exists()) {
                    const data = snap.data(); 
                    editingDramaId = id;
                    document.getElementById('form-title').innerText = "Modify Content";
                    
                    // Populate ID so it passes rules on save
                    document.getElementById('cms-tmdb').value = data.tmdbId || id;
                    
                    document.getElementById('cms-title').value = data.title || ''; 
                    document.getElementById('cms-img').value = data.img || ''; 
                    document.getElementById('cms-synopsis').value = data.synopsis || ''; 
                    document.getElementById('cms-type').value = data.type || ''; 
                    document.getElementById('cms-status').value = data.status || 'Exclusive'; 
                    
                    // Populate Episode Links
                    episodesList.innerHTML = '';
                    if (data.episodeLinks && data.episodeLinks.length > 0) {
                        data.episodeLinks.forEach(ep => addEpisodeRow(ep.s, ep.e, ep.url));
                    } else {
                        addEpisodeRow(1, 1, '');
                    }

                    document.getElementById('cms-submit').innerHTML = '<i class="fas fa-save"></i> Commit Changes'; 
                    document.getElementById('cms-cancel').style.display = 'flex';
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            } catch(e) { console.error(e); }
        };

        window.deleteKoru = async function(id) { 
            if (confirm("Permanently delete this KoruVox content?")) { 
                await deleteDoc(doc(db, KORU_COLLECTION, id)); 
                loadKoruContent(); 
            } 
        };

        document.getElementById('cms-cancel').addEventListener('click', () => { 
            document.getElementById('cms-form').reset(); 
            editingDramaId = null; 
            document.getElementById('form-title').innerText = "Inject KoruVox Content"; 
            document.getElementById('cms-submit').innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Deploy Content'; 
            document.getElementById('cms-cancel').style.display = 'none'; 
            
            // Reset Episode Links
            episodesList.innerHTML = '';
            addEpisodeRow(1, 1, '');
        });

        document.getElementById('cms-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('cms-submit'); 
            const isEditing = editingDramaId !== null;
            
            // 🛡️ CRITICAL UPDATE: Extract the TMDB ID from the new input field
            const tmdbIdValue = document.getElementById('cms-tmdb').value.trim();

            if (!tmdbIdValue) {
                alert("TMDB / IMDb ID is mandatory to comply with database security rules.");
                return;
            }

            // Gather Episode Links
            const episodeLinksArray = [];
            document.querySelectorAll('.ep-row').forEach(row => {
                episodeLinksArray.push({
                    s: parseInt(row.querySelector('.ep-s').value) || 1,
                    e: parseInt(row.querySelector('.ep-e').value) || 1,
                    url: row.querySelector('.ep-url').value.trim()
                });
            });

            if (episodeLinksArray.length === 0) {
                alert("You must provide at least one Video Source URL.");
                return;
            }

            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Deploying...'; 
            btn.disabled = true;

            try {
                // 🛡️ CRITICAL UPDATE: Set the Document ID exactly to the TMDB ID to satisfy rules
                let targetRef = isEditing 
                    ? doc(db, KORU_COLLECTION, editingDramaId) 
                    : doc(db, KORU_COLLECTION, tmdbIdValue);
                
                const dramaData = { 
                    tmdbId: tmdbIdValue, // MUST match the Document ID
                    title: document.getElementById('cms-title').value.trim(), 
                    img: document.getElementById('cms-img').value.trim(), 
                    synopsis: document.getElementById('cms-synopsis').value.trim(), 
                    type: document.getElementById('cms-type').value.trim(), 
                    status: document.getElementById('cms-status').value,
                    episodeLinks: episodeLinksArray // Save mapped Video URLs
                };

                if (isEditing) { 
                    await updateDoc(targetRef, dramaData); 
                } else { 
                    dramaData.createdAt = new Date().getTime(); 
                    await setDoc(targetRef, dramaData); 
                }

                document.getElementById('cms-cancel').click(); 
                loadKoruContent();

            } catch (error) { 
                console.error(error);
                alert("Deployment failed. Check console or verify your TMDB ID matches existing data if editing."); 
            } finally { 
                btn.disabled = false; 
            }
        });
    </script>
</body>
</html>
