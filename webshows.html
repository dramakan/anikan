<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Shows & Series - Anykan</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="global.css">
    
    <style>
        /* Sleek Modern UI for Web Shows */
        .page-spacer { height: 120px; }
        
        .web-header {
            position: relative;
            padding: 50px 20px;
            text-align: left;
            background: linear-gradient(135deg, rgba(9, 9, 11, 0.8) 0%, rgba(0, 210, 255, 0.05) 100%);
            border-radius: 24px;
            margin-bottom: 50px;
            border: 1px solid rgba(0, 210, 255, 0.15);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            animation: fadeRight 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            overflow: hidden;
        }

        .web-header::after {
            content: '\f26c'; /* TV icon from FontAwesome */
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            right: -20px;
            top: -20px;
            font-size: 15rem;
            color: rgba(0, 210, 255, 0.03);
            transform: rotate(-15deg);
            pointer-events: none;
        }

        .web-header-content {
            position: relative;
            z-index: 1;
            max-width: 600px;
            padding-left: 20px;
            border-left: 4px solid #00d2ff;
        }

        .web-header h1 {
            font-size: 3.2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #fff;
            margin-bottom: 10px;
            text-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
        }

        .web-header h1 span {
            color: #00d2ff;
        }

        .web-header p {
            color: var(--text-muted-color);
            font-size: 1.05rem;
            line-height: 1.6;
        }

        /* Modern Grid Layout */
        .web-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 25px;
            padding-bottom: 60px;
        }

        .web-card {
            position: relative;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            overflow: hidden;
            text-decoration: none;
            aspect-ratio: 2/3;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            opacity: 0;
            transform: perspective(1000px) rotateX(-10deg) translateY(20px);
            animation: 3dPopIn 0.7s forwards;
        }

        .web-card:hover {
            transform: perspective(1000px) rotateX(0deg) translateY(-10px);
            border-color: rgba(0, 210, 255, 0.5);
            box-shadow: 0 20px 40px rgba(0, 210, 255, 0.15);
            z-index: 5;
        }

        .web-poster {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .web-card:hover .web-poster {
            transform: scale(1.08);
            filter: brightness(0.7) blur(2px);
        }

        .web-info-panel {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(9,9,11,1) 0%, rgba(9,9,11,0.8) 40%, transparent 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
            transform: translateY(30%);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .web-card:hover .web-info-panel {
            transform: translateY(0);
            opacity: 1;
        }

        .web-title {
            color: #fff;
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 8px;
            line-height: 1.2;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        .web-synopsis {
            font-size: 0.8rem;
            color: #d4d4d8;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 12px;
            line-height: 1.5;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease 0.1s;
        }

        .web-card:hover .web-synopsis {
            opacity: 1;
            transform: translateY(0);
        }

        .web-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: #00d2ff;
            font-weight: 500;
        }

        .web-ep-badge {
            background: rgba(0, 210, 255, 0.1);
            border: 1px solid rgba(0, 210, 255, 0.3);
            padding: 4px 10px;
            border-radius: 8px;
            color: #fff;
        }

        @keyframes dPopIn {
            to { opacity: 1; transform: perspective(1000px) rotateX(0deg) translateY(0); }
        }
        @keyframes fadeRight {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @media (max-width: 768px) {
            .web-header { flex-direction: column; text-align: center; padding: 30px 15px; }
            .web-header-content { padding-left: 0; border-left: none; border-top: 4px solid #00d2ff; padding-top: 15px; }
            .web-header h1 { font-size: 2.5rem; }
            .web-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
            .web-title { font-size: 1rem; }
            .web-synopsis { -webkit-line-clamp: 2; font-size: 0.75rem; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="main-header">
        <div class="container">
            <div class="header-top-row">
                <div class="mobile-menu-toggle" id="mobileMenuToggle">
                    <i class="fas fa-bars"></i>
                </div>
                <a href="index.html" class="logo">Any<span>Kan</span></a>
                <div class="header-actions-placeholder">
                    <button id="themeToggle" class="theme-toggle-btn" aria-label="Toggle Theme">
                        <i class="fas fa-sun"></i>
                    </button>
                </div> 
            </div>

            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input id="searchInput" type="text" placeholder="Search web series...">
                <div id="searchResults" class="search-results"></div>
            </div>

            <nav class="nav-links" id="navLinks">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="community.html">Community</a></li>
                    <li><a href="mylist.html">My List</a></li>
                </ul>
            </nav>

            <a href="profile.html" class="header-download-btn" id="topAuthBtn">
                <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Anykan" alt="Profile" style="width: 24px; height: 24px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.8);"> Profile
            </a>
        </div>
    </header>

    <main class="container">
        <div class="page-spacer"></div>

        <div class="web-header">
            <div class="web-header-content">
                <h1>Web Shows & <span>Series</span></h1>
                <p>Binge-worthy English series and premium web shows. Discover your next obsession right here.</p>
            </div>
        </div>

        <div class="web-grid" id="webshows-page-grid">
            <!-- Web Show content injected here via JS -->
        </div>
    </main>

    <!-- Bottom Nav - Pre-logged in configuration -->
    <nav class="bottom-nav">
        <a href="index.html" class="bottom-nav-item">
            <i class="fa-solid fa-house nav-icon"></i>
            <span class="nav-label">Home</span>
        </a>
        <a href="community.html" class="bottom-nav-item">
            <i class="fa-solid fa-users nav-icon"></i>
            <span class="nav-label">Community</span>
        </a>
        <a href="mylist.html" class="bottom-nav-item">
            <i class="fa-solid fa-bookmark nav-icon"></i>
            <span class="nav-label">My List</span>
        </a>
        <a href="profile.html" class="bottom-nav-item" id="bottomAuthBtn">
            <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Anykan" alt="Profile" class="nav-icon" style="width: 24px; height: 24px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary-color); margin-bottom: 4px;">
            <span class="nav-label">Profile</span>
        </a>
    </nav>

    <script src="Anykan-script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('webshows-page-grid');
            
            const dbData = localStorage.getItem('Anykan_master_db');
            if (dbData) {
                const data = JSON.parse(dbData);
                
                // Filter specifically for Web Shows and English Series based on your master DB classification
                const webItems = data.filter(d => d.type === "Web Show" || d.type === "English Series");
                
                // Sort by newest first
                webItems.sort((a, b) => b.createdAt - a.createdAt);
                
                if (webItems.length === 0) {
                    grid.innerHTML = '<p style="text-align: center; color: var(--text-muted-color); grid-column: 1/-1;">No Web Shows found in the database.</p>';
                    return;
                }

                grid.innerHTML = webItems.map((media, index) => {
                    const safeLink = media.link || `watch.html?id=${media.id}`;
                    const delay = (index % 12) * 0.05; // Batch delay animation
                    
                    // Format episodes/seasons nicely
                    let epDisplay = "Series";
                    if (Array.isArray(media.seasons)) {
                        epDisplay = `S${media.seasons.length} • ${media.seasons.reduce((a, b) => a + b, 0)} Eps`;
                    } else if (media.totalEps) {
                        epDisplay = `${media.totalEps} Eps`;
                    }
                    
                    return `
                        <a href="${safeLink}" class="web-card" style="animation-delay: ${delay}s">
                            <img src="${media.img}" alt="${media.title}" class="web-poster" loading="lazy">
                            <div class="web-info-panel">
                                <h3 class="web-title">${media.title}</h3>
                                <p class="web-synopsis">${media.synopsis || 'Explore the full story by diving right into this acclaimed series.'}</p>
                                <div class="web-meta">
                                    <span><i class="fas fa-star" style="color:#f1c40f;"></i> ${media.score || media.imdb || 'N/A'}</span>
                                    <span class="web-ep-badge">${epDisplay}</span>
                                </div>
                            </div>
                        </a>
                    `;
                }).join('');
            } else {
                grid.innerHTML = '<p style="text-align: center; color: var(--text-muted-color); grid-column: 1/-1;">Connecting to Database Engine...</p>';
            }
        });
    </script>
</body>
</html>
