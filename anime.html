<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Universe - Anykan</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="global.css">
    
    <style>
        /* Aesthetic Dark UI for Anime Page */
        .page-spacer { height: 120px; }
        
        .anime-header {
            position: relative;
            padding: 60px 20px;
            text-align: center;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border-radius: 30px;
            margin-bottom: 50px;
            border: 1px solid var(--glass-border);
            overflow: hidden;
            animation: fadeIn 1s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Sakura-inspired soft glow */
        .anime-header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -10%;
            width: 120%;
            height: 200%;
            background: radial-gradient(circle at 50% 0%, rgba(255, 159, 243, 0.15), transparent 60%),
                        radial-gradient(circle at 80% 20%, rgba(157, 78, 221, 0.15), transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .anime-header-content {
            position: relative;
            z-index: 1;
        }

        .anime-header h1 {
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #fff;
            margin-bottom: 12px;
            text-shadow: 0 4px 20px rgba(255, 159, 243, 0.3);
        }

        .anime-header h1 span {
            background: linear-gradient(135deg, #ff9ff3, var(--primary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .anime-header p {
            color: var(--text-muted-color);
            font-size: 1.05rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Bouncy Anime Grid layout */
        .anime-pg-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            padding-bottom: 60px;
        }

        .anime-pg-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 10px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55); /* Cute bounce effect */
            opacity: 0;
            transform: translateY(30px) scale(0.95);
            animation: bounceUp 0.7s forwards;
            position: relative;
        }

        .anime-pg-card:hover {
            transform: translateY(-12px) scale(1.02);
            background: var(--glass-bg-hover);
            border-color: #ff9ff3;
            box-shadow: 0 15px 30px rgba(255, 159, 243, 0.2);
            z-index: 10;
        }

        .anime-pg-img-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 3/4;
            border-radius: 14px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .anime-pg-poster {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .anime-pg-card:hover .anime-pg-poster {
            transform: scale(1.1);
        }

        /* Aesthetic status tags */
        .anime-pg-ep-tag {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(9, 9, 11, 0.7);
            backdrop-filter: blur(8px);
            color: #ff9ff3;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 50px;
            border: 1px solid rgba(255, 159, 243, 0.3);
            z-index: 2;
        }

        .anime-pg-info {
            padding: 0 5px 5px 5px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .anime-pg-title {
            color: #fff;
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 6px;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .anime-pg-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-muted-color);
            margin-top: 5px;
        }

        .anime-pg-status {
            color: #48dbfb;
            font-weight: 500;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        @keyframes bounceUp {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 768px) {
            .anime-header h1 { font-size: 2.5rem; }
            .anime-pg-grid { grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 15px; }
            .anime-pg-title { font-size: 0.95rem; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="main-header">
        <div class="container">
            <div class="header-top-row">
                <div class="mobile-menu-toggle" id="mobileMenuToggle">
                    <i class="fas fa-bars"></i>
                </div>
                <a href="index.html" class="logo">Any<span>Kan</span></a>
                <div class="header-actions-placeholder">
                    <button id="themeToggle" class="theme-toggle-btn" aria-label="Toggle Theme">
                        <i class="fas fa-sun"></i>
                    </button>
                </div> 
            </div>

            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input id="searchInput" type="text" placeholder="Search anime series or movies...">
                <div id="searchResults" class="search-results"></div>
            </div>

            <nav class="nav-links" id="navLinks">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="community.html">Community</a></li>
                    <li><a href="mylist.html">My List</a></li>
                </ul>
            </nav>

            <a href="profile.html" class="header-download-btn" id="topAuthBtn">
                <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Anykan" alt="Profile" style="width: 24px; height: 24px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.8);"> Profile
            </a>
        </div>
    </header>

    <main class="container">
        <div class="page-spacer"></div>

        <div class="anime-header">
            <div class="anime-header-content">
                <h1>Anime <span>Universe</span></h1>
                <p>Explore breathtaking animation, epic storylines, and your favorite characters. From seasonal hits to legendary classics.</p>
            </div>
        </div>

        <div class="anime-pg-grid" id="anime-page-grid">
            <!-- Anime content injected here via JS -->
        </div>
    </main>

    <!-- Bottom Nav - Pre-logged in configuration -->
    <nav class="bottom-nav">
        <a href="index.html" class="bottom-nav-item">
            <i class="fa-solid fa-house nav-icon"></i>
            <span class="nav-label">Home</span>
        </a>
        <a href="community.html" class="bottom-nav-item">
            <i class="fa-solid fa-users nav-icon"></i>
            <span class="nav-label">Community</span>
        </a>
        <a href="mylist.html" class="bottom-nav-item">
            <i class="fa-solid fa-bookmark nav-icon"></i>
            <span class="nav-label">My List</span>
        </a>
        <a href="profile.html" class="bottom-nav-item" id="bottomAuthBtn">
            <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Anykan" alt="Profile" class="nav-icon" style="width: 24px; height: 24px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary-color); margin-bottom: 4px;">
            <span class="nav-label">Profile</span>
        </a>
    </nav>

    <script src="Anykan-script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('anime-page-grid');
            
            const dbData = localStorage.getItem('Anykan_master_db');
            if (dbData) {
                const data = JSON.parse(dbData);
                
                // Filter specifically for Anime based on your master DB classification
                const animeItems = data.filter(d => d.type === "Anime");
                
                // Sort by newest first
                animeItems.sort((a, b) => b.createdAt - a.createdAt);
                
                if (animeItems.length === 0) {
                    grid.innerHTML = '<p style="text-align: center; color: var(--text-muted-color); grid-column: 1/-1;">No Anime found in the database.</p>';
                    return;
                }

                grid.innerHTML = animeItems.map((media, index) => {
                    const safeLink = media.link || `watch.html?id=${media.id}`;
                    const delay = (index % 15) * 0.05; // Batch delay animation
                    
                    // Format episodes nicely
                    let epDisplay = media.totalEps;
                    if (Array.isArray(media.seasons)) {
                        epDisplay = media.seasons.reduce((a, b) => a + b, 0) + ' Eps';
                    } else if (!isNaN(epDisplay) && epDisplay > 1) {
                        epDisplay = epDisplay + ' Eps';
                    } else if (epDisplay == 1) {
                        epDisplay = 'Movie';
                    }
                    
                    return `
                        <a href="${safeLink}" class="anime-pg-card" style="animation-delay: ${delay}s">
                            <div class="anime-pg-img-wrap">
                                <span class="anime-pg-ep-tag">${epDisplay || 'Ongoing'}</span>
                                <img src="${media.img}" alt="${media.title}" class="anime-pg-poster" loading="lazy">
                            </div>
                            <div class="anime-pg-info">
                                <h3 class="anime-pg-title">${media.title}</h3>
                                <div class="anime-pg-meta">
                                    <span><i class="fas fa-star" style="color:#f1c40f;"></i> ${media.score || media.imdb || 'N/A'}</span>
                                    <span class="anime-pg-status">${media.status}</span>
                                </div>
                            </div>
                        </a>
                    `;
                }).join('');
            } else {
                grid.innerHTML = '<p style="text-align: center; color: var(--text-muted-color); grid-column: 1/-1;">Connecting to Database Engine...</p>';
            }
        });
    </script>
</body>
</html>
