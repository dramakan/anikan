<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Movies, Shows & Anime - Anykan</title>
    
    <meta name="title" content="Discover Movies, TV Shows & Anime - Anykan">
    <meta name="description" content="Use advanced filters to discover the best movies, TV shows, anime, and Asian dramas. Filter by genre, release year, language, and rating on Anykan.">
    <meta name="keywords" content="discover movies, find tv shows, filter anime, streaming filters, Anykan, hd streaming, entertainment hub">
    <meta name="theme-color" content="#8A2BE2">
    <meta name="robots" content="index, follow">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Discover Content - Anykan">
    <meta property="og:description" content="Filter and find your next favorite movie, show, or anime instantly.">
    <meta property="og:site_name" content="Anykan">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <script src="bottom-bar.js" defer></script>
    <script src="feedback-popup.js" defer></script>
    <script src="admin_easter_egg.js" defer></script>

    <style>
        /* =========================================
           1. PREMIUM VARIABLES & RESET
        ========================================= */
        :root {
            --primary-color: #8A2BE2;
            --primary-rich: #6a1b9a;
            --primary-glow: rgba(138, 43, 226, 0.4);
            
            --bg-base: #0B0C10; 
            --bg-card: rgba(20, 20, 28, 0.6);
            --bg-sidebar: rgba(15, 15, 21, 0.85);
            
            --text-color: #F8F8F8;
            --text-muted: #9CA3AF;
            
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-border-light: rgba(255, 255, 255, 0.15);
            --glass-blur: blur(20px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-base); 
            color: var(--text-color);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            background-image: radial-gradient(circle at 15% 50%, rgba(138, 43, 226, 0.05), transparent 25%),
                              radial-gradient(circle at 85% 30%, rgba(106, 27, 154, 0.05), transparent 25%);
        }

        a { text-decoration: none; color: inherit; }
        button { border: none; background: transparent; font-family: inherit; cursor: pointer; outline: none; }

        /* =========================================
           2. HEADER
        ========================================= */
        .main-header {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(11, 12, 16, 0.85);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.5px; }
        .logo span { color: var(--primary-color); }
        .back-home { color: var(--text-muted); font-weight: 500; transition: color 0.3s; display: flex; align-items: center; gap: 8px;}
        .back-home:hover { color: #fff; }

        /* =========================================
           3. LAYOUT STRUCTURE
        ========================================= */
        .filter-page-container {
            display: flex; gap: 30px; padding: 40px 5%; max-width: 1600px; margin: 0 auto; min-height: 100vh;
        }

        /* =========================================
           4. SIDEBAR FILTERS (SCROLL FIX APPLIED)
        ========================================= */
        .filter-sidebar {
            width: 280px; flex-shrink: 0; background: var(--bg-sidebar); 
            backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border); border-radius: 20px;
            padding: 25px; 
            
            /* FIXED SCROLL LOGIC */
            position: sticky; top: 100px;
            height: fit-content;
            max-height: calc(100vh - 120px); /* Prevents overflow past the screen bottom */
            overflow-y: auto; /* Enables internal scrolling */
            
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            
            /* Custom Scrollbar for Sidebar */
            scrollbar-width: thin;
            scrollbar-color: var(--primary-color) rgba(255,255,255,0.02);
        }

        .filter-sidebar::-webkit-scrollbar { width: 6px; }
        .filter-sidebar::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); border-radius: 10px; }
        .filter-sidebar::-webkit-scrollbar-thumb { background: var(--primary-color); border-radius: 10px; }

        .filter-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid var(--glass-border); }
        .filter-header h2 { font-size: 1.2rem; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .filter-header h2 i { color: var(--primary-color); }

        .filter-group { margin-bottom: 25px; }
        .filter-group h3 { font-size: 0.95rem; margin-bottom: 15px; color: #fff; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; opacity: 0.9;}

        /* Custom Checkboxes / Radios */
        .checkbox-list { display: flex; flex-direction: column; gap: 12px; }
        .checkbox-list label { display: flex; align-items: center; gap: 12px; font-size: 0.9rem; color: var(--text-muted); cursor: pointer; transition: color 0.3s; }
        .checkbox-list label:hover { color: #fff; }
        
        .checkbox-list input[type="checkbox"], .checkbox-list input[type="radio"] {
            appearance: none; -webkit-appearance: none;
            width: 20px; height: 20px; border: 2px solid var(--glass-border-light);
            border-radius: 6px; background: rgba(0,0,0,0.3);
            display: flex; justify-content: center; align-items: center; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative;
        }
        .checkbox-list input[type="radio"] { border-radius: 50%; }
        
        .checkbox-list input:checked { background: var(--primary-color); border-color: var(--primary-color); box-shadow: 0 0 15px var(--primary-glow); }
        .checkbox-list input[type="checkbox"]:checked::after { content: '\f00c'; font-family: 'Font Awesome 6 Free'; font-weight: 900; font-size: 10px; color: white; }
        .checkbox-list input[type="radio"]:checked::after { content: ''; width: 8px; height: 8px; background: white; border-radius: 50%; }

        /* Custom Select */
        .custom-select {
            width: 100%; padding: 12px 15px; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border-light);
            color: #fff; border-radius: 10px; font-family: inherit; font-size: 0.9rem; outline: none; cursor: pointer;
            transition: border-color 0.3s; appearance: none;
        }
        .custom-select:focus { border-color: var(--primary-color); }
        .select-wrapper { position: relative; }
        .select-wrapper::after { content: '\f107'; font-family: 'Font Awesome 6 Free'; font-weight: 900; position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
        .custom-select option { background: var(--bg-sidebar); color: #fff; }

        .btn-clear {
            width: 100%; padding: 12px; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444; border-radius: 10px; font-weight: 600; cursor: pointer; transition: all 0.3s;
            display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 10px;
        }
        .btn-clear:hover { background: #ef4444; color: #fff; box-shadow: 0 5px 15px rgba(239, 68, 68, 0.4); transform: translateY(-2px); }

        /* =========================================
           5. RESULTS GRID & CARDS
        ========================================= */
        .results-section { flex: 1; min-width: 0; }
        .results-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 25px; }
        .results-title { font-size: 1.8rem; font-weight: 700; line-height: 1; }
        .results-count { color: var(--text-muted); font-size: 0.9rem; }

        .grid-container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px;
        }

        /* Premium Card Design */
        .drama-card {
            position: relative; border-radius: 16px; overflow: hidden; background: #111;
            aspect-ratio: 2/3; cursor: pointer; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid transparent; opacity: 0; transform: translateY(30px);
        }
        .drama-card.loaded { opacity: 1; transform: translateY(0); }
        
        .drama-card:hover { 
            transform: translateY(-8px); border-color: rgba(138, 43, 226, 0.5); 
            box-shadow: 0 15px 30px rgba(0,0,0,0.6), 0 0 20px rgba(138, 43, 226, 0.2);
        }
        
        .drama-card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }
        .drama-card:hover img { transform: scale(1.08); }

        .card-overlay {
            position: absolute; inset: 0; background: linear-gradient(0deg, rgba(10,10,15,0.95) 0%, rgba(10,10,15,0.4) 50%, transparent 100%);
            display: flex; flex-direction: column; justify-content: flex-end; padding: 15px;
            opacity: 1; transition: opacity 0.3s;
        }
        
        .card-meta-top { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; color: #f1c40f; display: flex; align-items: center; gap: 4px; border: 1px solid rgba(255,255,255,0.1); }
        
        .card-title { font-size: 1rem; font-weight: 600; color: #fff; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .card-info { font-size: 0.75rem; color: var(--text-muted); display: flex; gap: 10px; align-items: center; }
        
        .play-overlay-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
            width: 50px; height: 50px; background: var(--primary-color); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: #fff;
            opacity: 0; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px var(--primary-glow); z-index: 2;
        }
        .drama-card:hover .play-overlay-btn { opacity: 1; transform: translate(-50%, -50%) scale(1); }

        /* Load More / States */
        .infinite-spinner { grid-column: 1 / -1; display: flex; justify-content: center; padding: 40px 0; opacity: 0; transition: opacity 0.3s; }
        .infinite-spinner.active { opacity: 1; }
        .infinite-spinner i { font-size: 2rem; color: var(--primary-color); animation: spin 1s linear infinite; }
        
        .empty-state { grid-column: 1 / -1; text-align: center; padding: 60px 20px; background: rgba(255,255,255,0.02); border-radius: 16px; border: 1px dashed var(--glass-border); }
        .empty-state i { font-size: 3rem; color: var(--text-muted); margin-bottom: 15px; opacity: 0.5; }
        .empty-state h3 { font-size: 1.2rem; color: #fff; margin-bottom: 5px; }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* =========================================
           6. MOBILE OVERRIDES
        ========================================= */
        .mobile-filter-btn {
            display: none; position: fixed; bottom: 85px; right: 20px; z-index: 990;
            background: var(--primary-color); color: #fff; padding: 15px 25px; border-radius: 50px;
            font-size: 1rem; font-weight: 600; box-shadow: 0 10px 30px var(--primary-glow);
            align-items: center; gap: 8px; transition: transform 0.3s;
        }
        .close-filter-btn { display: none; background: rgba(255,255,255,0.1); width: 35px; height: 35px; border-radius: 50%; color: #fff; align-items: center; justify-content: center; transition: 0.3s; }

        @media (max-width: 992px) {
            .filter-page-container { flex-direction: column; padding: 20px 4%; gap: 20px;}
            .results-header { flex-direction: column; align-items: flex-start; gap: 5px; }
            .grid-container { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
            .mobile-filter-btn { display: flex; }
            
            /* Sidebar becomes Off-Canvas Menu */
            .filter-sidebar {
                position: fixed; top: 0; left: -110%; width: 85%; max-width: 320px; height: 100vh; max-height: 100vh;
                z-index: 2000; border-radius: 0; border: none; border-right: 1px solid var(--glass-border);
                overflow-y: auto; box-shadow: 20px 0 50px rgba(0,0,0,0.8);
            }
            .filter-sidebar.active { left: 0; }
            .close-filter-btn { display: flex; }
            
            .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 1999; opacity: 0; pointer-events: none; transition: 0.3s; }
            .overlay.active { opacity: 1; pointer-events: auto; }
            
            /* Bottom Nav Compensation */
            body { padding-bottom: 80px; }
            .bottom-nav {
                display: flex; position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(15, 15, 20, 0.95);
                backdrop-filter: blur(20px); border-top: 1px solid var(--glass-border); z-index: 1000; padding: 10px 0 20px 0;
            }
            .bottom-nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; color: var(--text-muted); transition: 0.3s; font-size: 0.65rem;}
            .bottom-nav-item i { font-size: 1.2rem; }
            .bottom-nav-item.active { color: var(--primary-color); }
        }
        @media (min-width: 993px) { .bottom-nav { display: none; } }
    </style>
</head>
<body>

    <header class="main-header">
        <a href="index.html" class="logo">Any<span>Kan</span></a>
        <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </header>

    <div class="overlay" id="mobile-overlay"></div>
    <button class="mobile-filter-btn" id="mobile-filter-btn"><i class="fas fa-filter"></i> Filter</button>

    <main class="filter-page-container">
        
        <aside class="filter-sidebar" id="sidebar">
            <div class="filter-header">
                <h2><i class="fas fa-sliders-h"></i> Filters</h2>
                <button class="close-filter-btn" id="close-sidebar"><i class="fas fa-times"></i></button>
            </div>

            <div class="filter-group">
                <h3>Media Type</h3>
                <div class="checkbox-list">
                    <label><input type="radio" name="media_type" value="tv" checked> TV Shows & Series</label>
                    <label><input type="radio" name="media_type" value="movie"> Movies</label>
                </div>
            </div>

            <div class="filter-group">
                <h3>Region / Origin</h3>
                <div class="checkbox-list">
                    <label><input type="radio" name="lang" value="" checked> Global (All)</label>
                    <label><input type="radio" name="lang" value="en"> English / Western</label>
                    <label><input type="radio" name="lang" value="ko"> Korean</label>
                    <label><input type="radio" name="lang" value="ja"> Japanese</label>
                    <label><input type="radio" name="lang" value="zh"> Chinese</label>
                    <label><input type="radio" name="lang" value="th"> Thai</label>
                </div>
            </div>

            <div class="filter-group">
                <h3>Genres</h3>
                <div class="checkbox-list" id="genre-filters">
                    <label><input type="checkbox" value="10759|28"> Action & Adventure</label>
                    <label><input type="checkbox" value="16"> Animation / Anime</label>
                    <label><input type="checkbox" value="35"> Comedy</label>
                    <label><input type="checkbox" value="18"> Drama</label>
                    <label><input type="checkbox" value="9648|53"> Mystery & Thriller</label>
                    <label><input type="checkbox" value="10765|878"> Sci-Fi & Fantasy</label>
                    <label><input type="checkbox" value="10749|10766"> Romance</label>
                </div>
            </div>

            <div class="filter-group">
                <h3>Release Year</h3>
                <div class="select-wrapper">
                    <select class="custom-select" id="year-select">
                        <option value="">Any Year</option>
                        <option value="2026">2026</option>
                        <option value="2025">2025</option>
                        <option value="2024">2024</option>
                        <option value="2023">2023</option>
                        <option value="2022">2022</option>
                        <option value="2021">2021</option>
                        <option value="2020">2020 & Older</option>
                    </select>
                </div>
            </div>

            <div class="filter-group">
                <h3>Sort By</h3>
                <div class="select-wrapper">
                    <select class="custom-select" id="sort-select">
                        <option value="popularity.desc">Most Popular</option>
                        <option value="vote_average.desc">Highest Rated</option>
                        <option value="first_air_date.desc" id="sort-date-opt">Newest Releases</option>
                    </select>
                </div>
            </div>

            <button class="btn-clear" id="reset-filters"><i class="fas fa-trash-alt"></i> Reset All</button>
        </aside>

        <section class="results-section">
            <div class="results-header">
                <h1 class="results-title">Discover Content</h1>
                <span class="results-count" id="results-count">Loading results...</span>
            </div>
            
            <div class="grid-container" id="results-grid"></div>
            
            <div class="infinite-spinner" id="loading-spinner">
                <i class="fas fa-circle-notch"></i>
            </div>
        </section>

    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="bottom-nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="community.html" class="bottom-nav-item"><i class="fas fa-bell"></i><span>Updates</span></a>
        <a href="#" class="bottom-nav-item active"><i class="fas fa-search"></i><span>Discover</span></a>
        <a href="login.html" class="bottom-nav-item"><i class="fas fa-user"></i><span>Profile</span></a>
    </nav>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const tmdbKey = "014fbdbe962cb38379e09e31d0652459";
            
            // State
            let currentPage = 1;
            let totalPages = 1;
            let isFetching = false;
            let currentResults = 0;

            // DOM Elements
            const grid = document.getElementById('results-grid');
            const spinner = document.getElementById('loading-spinner');
            const countLabel = document.getElementById('results-count');
            
            // Filter Elements
            const mediaTypeRadios = document.querySelectorAll('input[name="media_type"]');
            const sortSelect = document.getElementById('sort-select');
            const sortDateOpt = document.getElementById('sort-date-opt');
            const langRadios = document.querySelectorAll('input[name="lang"]');
            const genreCheckboxes = document.querySelectorAll('#genre-filters input[type="checkbox"]');
            const yearSelect = document.getElementById('year-select');
            const resetBtn = document.getElementById('reset-filters');

            // Mobile Elements
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            const mobileBtn = document.getElementById('mobile-filter-btn');
            const closeBtn = document.getElementById('close-sidebar');

            // Handle Sort Option Text swap based on Media Type
            mediaTypeRadios.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    if(e.target.value === 'movie') {
                        sortDateOpt.value = 'release_date.desc';
                        if(sortSelect.value === 'first_air_date.desc') sortSelect.value = 'release_date.desc';
                    } else {
                        sortDateOpt.value = 'first_air_date.desc';
                        if(sortSelect.value === 'release_date.desc') sortSelect.value = 'first_air_date.desc';
                    }
                });
            });

            // --- 1. TMDB Fetch Engine ---
            async function fetchContent(isLoadMore = false) {
                if (isFetching) return;
                if (!isLoadMore) {
                    currentPage = 1;
                    grid.innerHTML = '';
                    currentResults = 0;
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }

                isFetching = true;
                spinner.classList.add('active');

                // Build Query Parameters
                const mediaType = document.querySelector('input[name="media_type"]:checked').value;
                const sortBy = sortSelect.value;
                const lang = document.querySelector('input[name="lang"]:checked').value;
                const year = yearSelect.value;
                
                // Get checked genres
                const genres = Array.from(genreCheckboxes)
                                    .filter(cb => cb.checked)
                                    .map(cb => cb.value)
                                    .join('|');

                // Base URL
                let url = `https://api.themoviedb.org/3/discover/${mediaType}?api_key=${tmdbKey}&page=${currentPage}&sort_by=${sortBy}`;
                
                // Add conditional filters
                if (lang) url += `&with_original_language=${lang}`;
                if (genres) url += `&with_genres=${genres}`;
                
                // Logic to keep Anime out of general TV searches unless specifically requested
                if (mediaType === 'tv') {
                    const hasAnimation = Array.from(genreCheckboxes).some(cb => cb.checked && cb.value.includes('16'));
                    if (!hasAnimation) {
                        url += `&without_genres=16`;
                    }
                }
                
                // Handle year logic 
                if (year) {
                    const dateField = mediaType === 'movie' ? 'release_date' : 'first_air_date';
                    if (year === '2020') {
                        url += `&${dateField}.lte=2020-12-31`;
                    } else {
                        url += mediaType === 'movie' ? `&primary_release_year=${year}` : `&first_air_date_year=${year}`;
                    }
                }

                try {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error("API Error");
                    const data = await response.json();
                    
                    totalPages = data.total_pages;
                    currentResults += data.results.length;
                    
                    renderCards(data.results, isLoadMore, mediaType);
                    
                    countLabel.innerHTML = `Showing <strong style="color:#fff">${currentResults}</strong> of ${data.total_results.toLocaleString()} titles`;
                    
                    if (data.results.length === 0 && !isLoadMore) {
                        grid.innerHTML = `
                            <div class="empty-state">
                                <i class="fas fa-ghost"></i>
                                <h3>No Content Found</h3>
                                <p style="color: var(--text-muted); font-size: 0.9rem;">Try adjusting your filters to discover more.</p>
                            </div>
                        `;
                    }

                } catch (error) {
                    console.error("Fetch failed:", error);
                    if (!isLoadMore) {
                        grid.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle" style="color:#ef4444"></i><h3>Failed to load</h3><p>Please check your connection and try again.</p></div>`;
                    }
                } finally {
                    isFetching = false;
                    spinner.classList.remove('active');
                }
            }

            // --- 2. Render Cards ---
            function renderCards(items, isAppend, mediaType) {
                let html = '';
                items.forEach((item, index) => {
                    const poster = item.poster_path ? `https://image.tmdb.org/t/p/w500${item.poster_path}` : 'https://via.placeholder.com/500x750/111/444?text=No+Poster';
                    const title = item.name || item.title || item.original_name;
                    const rating = item.vote_average ? item.vote_average.toFixed(1) : 'NR';
                    const year = (item.first_air_date || item.release_date || "").substring(0, 4) || "N/A";
                    const delay = isAppend ? (index * 0.05) : (index * 0.05);

                    let mediaLabel = mediaType === 'movie' ? 'Movie' : 'TV';
                    if (mediaType === 'tv' && item.genre_ids && item.genre_ids.includes(16) && item.original_language === 'ja') mediaLabel = 'Anime';

                    html += `
                        <a href="watch.html?id=${item.id}" class="drama-card" style="transition-delay: ${delay}s">
                            <img src="${poster}" alt="${title}" loading="lazy">
                            <div class="card-meta-top"><i class="fas fa-star"></i> ${rating}</div>
                            <div class="card-overlay">
                                <h3 class="card-title">${title}</h3>
                                <div class="card-info">
                                    <span>${year}</span>
                                    <span style="color:var(--primary-color); font-weight:600; text-transform:uppercase;">${mediaLabel}</span>
                                </div>
                            </div>
                            <div class="play-overlay-btn"><i class="fas fa-play"></i></div>
                        </a>
                    `;
                });

                if (isAppend) {
                    grid.insertAdjacentHTML('beforeend', html);
                } else {
                    grid.innerHTML = html;
                }

                setTimeout(() => {
                    const cards = grid.querySelectorAll('.drama-card:not(.loaded)');
                    cards.forEach(card => card.classList.add('loaded'));
                }, 50);
            }

            // --- 3. Event Listeners for Filters ---
            const inputs = [...mediaTypeRadios, sortSelect, yearSelect, ...langRadios, ...genreCheckboxes];
            inputs.forEach(input => {
                input.addEventListener('change', () => {
                    fetchContent(false);
                });
            });

            resetBtn.addEventListener('click', () => {
                mediaTypeRadios[0].checked = true; // TV Default
                sortSelect.value = 'popularity.desc';
                yearSelect.value = '';
                langRadios[0].checked = true; // Global Default
                genreCheckboxes.forEach(cb => cb.checked = false);
                fetchContent(false);
                if(window.innerWidth <= 992) toggleMobileSidebar(false);
            });

            // --- 4. Infinite Scroll ---
            const observer = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting && !isFetching && currentPage < totalPages) {
                    currentPage++;
                    fetchContent(true);
                }
            }, { rootMargin: "400px" });
            
            observer.observe(spinner);

            // --- 5. Mobile Sidebar Logic ---
            function toggleMobileSidebar(show) {
                if (show) {
                    sidebar.classList.add('active');
                    overlay.classList.add('active');
                    document.body.style.overflow = 'hidden';
                } else {
                    sidebar.classList.remove('active');
                    overlay.classList.remove('active');
                    document.body.style.overflow = '';
                }
            }

            mobileBtn.addEventListener('click', () => toggleMobileSidebar(true));
            closeBtn.addEventListener('click', () => toggleMobileSidebar(false));
            overlay.addEventListener('click', () => toggleMobileSidebar(false));

            // Initial Fetch
            fetchContent(false);
        });
    </script>
</body>
</html>
