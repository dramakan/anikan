    <style>
        :root {

            --primary: #8A2BE2; 
            --text-main: #F5F5F5; 
            --text-muted: #A1A1AA; 
            --glass-bg: rgba(24, 24, 27, 0.45);
            --glass-border: rgba(255, 255, 255, 0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-base); color: var(--text-main); padding: 40px 4%; }
        
        .header { text-align: center; margin-bottom: 50px; }
        .header h1 { font-size: 2.5rem; }
        .header h1 span { color: var(--primary); }
        .header p { color: var(--text-muted); }

        .template-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 40px; max-width: 1400px; margin: 0 auto; }
        
        .template-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px; overflow: hidden; display: flex; flex-direction: column; }
        .template-header { padding: 20px; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); }
        .template-header h3 { font-size: 1.1rem; }
        
        /* Iframe handles the preview safely */
        .preview-container { height: 400px; width: 100%; background: #000; overflow-y: auto; }
        iframe { width: 100%; height: 100%; border: none; }

        .code-container { padding: 20px; flex-grow: 1; background: #000; border-top: 1px solid var(--glass-border); }
        textarea { width: 100%; height: 150px; background: rgba(255,255,255,0.05); color: #A1A1AA; border: 1px solid var(--glass-border); border-radius: 8px; padding: 10px; font-family: monospace; font-size: 0.8rem; resize: vertical; outline: none; }
        
        .btn-copy { margin-top: 10px; width: 100%; padding: 10px; background: rgba(138, 43, 226, 0.1); color: var(--primary); border: 1px solid var(--primary); border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .btn-copy:hover { background: var(--primary); color: #fff; }
    </style>
</head>

    <script>

        document.getElementById('frame-welcome-back').srcdoc = document.getElementById('code-welcome-back').value;
        document.getElementById('frame-broadcast').srcdoc = document.getElementById('code-broadcast').value;
        document.getElementById('frame-alert').srcdoc = document.getElementById('code-alert').value;

        function copyCode(id, btn) {
            const textarea = document.getElementById(id);
            textarea.select();
            document.execCommand('copy');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
            setTimeout(() => { btn.innerHTML = originalText; }, 2000);
        }
