<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication - AnyKan</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        /* DYNAMIC LIQUID COLOR ENGINE */
        :root {
            --bg-deep: #030303;
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.45);
            
            /* Phase 1: Sign In (Original Deep Purple Core) */
            --orb1-color: #8A2BE2; 
            --orb2-color: #0d061f; 
            
            --glass-bg: rgba(13, 13, 13, 0.5);
            --glass-border: rgba(255, 255, 255, 0.06);
            --glass-highlight: rgba(138, 43, 226, 0.2);
        }

        /* Phase 2: Register (Electric Orchid Velvet) */
        body.register-mode {
            --orb1-color: #7209b7;
            --orb2-color: #3f0713;
        }

        /* Phase 3: Forgot Password (Cyber Ultraviolet Void) */
        body.forgot-mode {
            --orb1-color: #3a0ca3;
            --orb2-color: #4cc9f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body { 
            background-color: var(--bg-deep); 
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            transition: --orb1-color 1.2s cubic-bezier(0.25, 1, 0.5, 1), --orb2-color 1.2s cubic-bezier(0.25, 1, 0.5, 1);
            padding: 24px 16px;
        }

        /* --- IMMERSIVE LIQUID AMBIENT ATMOSPHERE --- */
        .ambient-bg {
            position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none;
        }
        .orb {
            position: absolute; border-radius: 50%; filter: blur(140px); opacity: 0.45;
            transition: background-color 1.2s ease-in-out, transform 1s ease;
        }
        .orb-1 {
            top: -15%; left: -10%; width: 55vw; height: 55vw;
            background-color: var(--orb1-color);
            animation: float1 20s infinite alternate ease-in-out;
        }
        .orb-2 {
            bottom: -15%; right: -10%; width: 65vw; height: 65vw;
            background-color: var(--orb2-color);
            animation: float2 25s infinite alternate ease-in-out;
        }

        @keyframes float1 { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(8vw, 6vh) scale(1.15); } }
        @keyframes float2 { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(-8vw, -6vh) scale(1.08); } }

        .btn-back { 
            position: absolute; top: 30px; left: 30px; 
            color: var(--text-muted); font-size: 0.8rem; text-decoration: none;
            transition: 0.3s; z-index: 20; display: flex; align-items: center; gap: 8px;
            text-transform: uppercase; letter-spacing: 2px; font-weight: 500;
        }
        .btn-back:hover { color: var(--text-main); }

        /* --- THE ULTRALIGHT GLASS TERMINAL --- */
        .glass-card {
            position: relative; z-index: 2; width: 100%; max-width: 440px; 
            background: var(--glass-bg);
            backdrop-filter: blur(50px); -webkit-backdrop-filter: blur(50px);
            border: 1px solid var(--glass-border);
            border-radius: 36px;
            display: flex; flex-direction: column; overflow: hidden;
            transition: border-color 0.5s ease;
            /* Adaptive Spotlight Anchors */
            --mouse-x: 50%;
            --mouse-y: 50%;
        }

        /* Continuous Ambient Optical Tracking Overlay */
        .glass-card::after {
            content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 10;
            background: radial-gradient(circle 250px at var(--mouse-x) var(--mouse-y), rgba(255,255,255,0.04), transparent 80%);
        }

        /* CONTAINER HEADERS */
        .card-header {
            padding: 45px 40px 15px 40px; text-align: center; position: relative; z-index: 15;
        }
        .logo { font-size: 2.2rem; font-weight: 300; letter-spacing: -1px; margin-bottom: 25px; display: block; text-decoration: none; color: white;}
        .logo span { font-weight: 700; color: #fff; text-shadow: 0 0 30px var(--orb1-color); transition: 1.2s ease; }

        /* MULTI-PHASE CONTROLLER HEADER ARCHITECTURE */
        .toggle-box {
            display: flex; background: rgba(0,0,0,0.5); border-radius: 20px; padding: 5px;
            position: relative; width: 100%; border: 1px solid var(--glass-border);
            transition: opacity 0.4s cubic-bezier(0.77, 0, 0.175, 1), transform 0.4s cubic-bezier(0.77, 0, 0.175, 1);
        }
        body.forgot-mode .toggle-box {
            opacity: 0; transform: translateY(-10px); pointer-events: none;
        }
        .toggle-btn {
            flex: 1; padding: 13px 0; border: none; background: transparent; color: var(--text-muted);
            font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer; position: relative; z-index: 2; transition: 0.4s;
        }
        .toggle-btn.active { color: var(--text-main); }
        .toggle-highlighter {
            position: absolute; top: 5px; left: 5px; width: calc(50% - 5px); height: calc(100% - 10px);
            background: rgba(255,255,255,0.08); border-radius: 16px;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
            transition: transform 0.6s cubic-bezier(0.77, 0, 0.175, 1);
            z-index: 1; border: 1px solid rgba(255,255,255,0.08);
        }

        /* RECOVERY VIEW BACK-CONTROL PANEL */
        .forgot-header-back {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            opacity: 0; transform: translateY(10px); pointer-events: none; transition: 0.4s ease; padding: 0 40px; margin-top: 55px;
        }
        body.forgot-mode .forgot-header-back {
            opacity: 1; transform: translateY(0); pointer-events: auto;
        }
        .forgot-title-text {
            font-size: 1.1rem; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: var(--text-main);
        }
        .btn-abort-forgot {
            position: absolute; left: 40px; background: transparent; border: none; color: var(--text-muted); font-size: 0.9rem; cursor: pointer; transition: 0.3s;
        }
        .btn-abort-forgot:hover { color: var(--text-main); }

        /* --- THE TRIPLE SLIDING SYSTEM PLATFORM --- */
        .form-track-container {
            position: relative; width: 100%; overflow: hidden; z-index: 15;
        }
        .form-track {
            display: flex; width: 300%; align-items: stretch; /* Absolute uniform responsive sizing */
            transition: transform 0.75s cubic-bezier(0.77, 0, 0.175, 1);
        }
        .form-slide {
            width: 33.33333%; padding: 20px 40px 45px 40px; 
            display: flex; flex-direction: column; justify-content: center;
        }
        form { display: flex; flex-direction: column; width: 100%; }

        /* REFINED LIQUID GLASS INPUT PIPES */
        .input-group { position: relative; margin-bottom: 24px; }
        .auth-input {
            width: 100%; background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border);
            border-radius: 16px; padding: 24px 20px 10px 20px; color: var(--text-main);
            font-size: 1rem; outline: none; transition: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .auth-input:focus { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.25); }
        
        .auth-label {
            position: absolute; left: 20px; top: 18px; color: var(--text-muted); font-size: 1rem;
            pointer-events: none; transition: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .auth-input:focus ~ .auth-label, .auth-input:not(:placeholder-shown) ~ .auth-label {
            top: 7px; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.6);
        }

        /* DYNAMIC SHIFT FORGOT SWITCH LINK */
        .forgot-trigger-link {
            position: absolute; right: 20px; top: 20px; color: var(--text-muted);
            font-size: 0.75rem; text-decoration: none; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; z-index: 12;
        }
        .forgot-trigger-link:hover { color: var(--text-main); }

        /* BRUTALIST STRUCTURAL PILL INTERACTIVE BUTTONS */
        .btn-auth {
            width: 100%; padding: 19px; border-radius: 16px; border: none; font-size: 0.88rem; font-weight: 600; 
            text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex; justify-content: center; align-items: center; gap: 10px; position: relative;
        }
        .btn-main { background: rgba(255,255,255,0.92); color: #000; margin-top: 5px; }
        .btn-main:hover { background: #ffffff; transform: translateY(-1px); }
        
        .btn-google {
            background: rgba(255,255,255,0.03); color: var(--text-main); border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
        }
        .btn-google:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.2); }
        .btn-google img { width: 18px; }

        .divider { display: flex; align-items: center; margin: 24px 0; color: var(--text-muted); font-size: 0.68rem; text-transform: uppercase; letter-spacing: 2px; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--glass-border); }
        .divider::before { margin-right: 15px; } .divider::after { margin-left: 15px; }

        .msg-box { font-size: 0.85rem; padding: 15px; margin-top: 15px; display: none; border-radius: 14px; text-align: center; font-weight: 500; backdrop-filter: blur(10px); border: 1px solid; }
        .error { color: #ff4d4d; border-color: rgba(255, 77, 77, 0.2); background: rgba(255, 77, 77, 0.04); }
        .success { color: #00e676; border-color: rgba(0, 230, 118, 0.2); background: rgba(0, 230, 118, 0.04); }

        /* STRUCTURAL GLASS SECURITY TERMINAL (OTP) */
        .otp-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            z-index: 1000; justify-content: center; align-items: center; padding: 16px;
        }
        .otp-card {
            background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 32px;
            padding: 55px 40px; width: 100%; max-width: 410px; text-align: center; position: relative;
            box-shadow: 0 40px 100px rgba(0,0,0,0.9);
        }
        .otp-card h3 { font-weight: 300; font-size: 1.8rem; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .otp-card p { color: var(--text-muted); margin-bottom: 35px; font-size: 0.9rem; line-height: 1.5;}
        .otp-input {
            width: 100%; letter-spacing: 16px; text-align: center; font-size: 2.2rem; padding: 14px; font-weight: 300;
            background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); border-radius: 16px; color: #fff; outline: none; margin-bottom: 25px; transition: 0.3s;
        }
        .otp-input:focus { border-color: rgba(255,255,255,0.3); }

        /* ADAPTIVE COHESIVE SCALE ARCHITECTURE (PC & Mobile Symmetry) */
        @media (max-width: 600px) {
            body { padding: 12px; }
            .btn-back { top: 25px; left: 25px; }
            .glass-card { border-radius: 28px; }
            .form-slide { padding: 10px 24px 40px 24px; }
            .card-header { padding: 40px 24px 15px 24px; }
            .forgot-header-back { padding: 0 24px; }
            .btn-abort-forgot { left: 24px; }
            .orb-1 { width: 95vw; height: 95vw; }
            .orb-2 { width: 105vw; height: 105vw; }
        }
    </style>
</head>

    <script>
        const card = document.getElementById('interactive-card');
        card.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            card.style.setProperty('--mouse-x', `${x}px`);
            card.style.setProperty('--mouse-y', `${y}px`);
        });

        function switchMode(mode) {
            const track = document.getElementById('form-track');
            const highlighter = document.getElementById('highlighter');
            const btnLogin = document.getElementById('btn-login');
            const btnReg = document.getElementById('btn-register');
            
            document.querySelectorAll('.msg-box').forEach(box => box.style.display = 'none');
            document.body.classList.remove('register-mode', 'forgot-mode');

            if (mode === 'register') {
                track.style.transform = 'translateX(-33.33333%)';
                highlighter.style.transform = 'translateX(100%)';
                btnLogin.classList.remove('active');
                btnReg.classList.add('active');
                document.body.classList.add('register-mode');
            } else if (mode === 'forgot') {
                track.style.transform = 'translateX(-66.66666%)';
                document.body.classList.add('forgot-mode');
            } else {
                track.style.transform = 'translateX(0)';
                highlighter.style.transform = 'translateX(0)';
                btnReg.classList.remove('active');
                btnLogin.classList.add('active');
            }
        }
    </script>

            try { await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ emails: [userEmail], subject: "AnyKan Security Code", html: html }) }); } catch (e) {}
        }

        onAuthStateChanged(auth, (user) => {
            if (user && !isActivelyAuthenticating) {
                document.getElementById('form-track').innerHTML = `
                    <div style="width: 100%; padding: 40px; text-align: center; display: flex; flex-direction: column; justify-content: center;">
                        <h2 style="font-weight: 300; margin-bottom: 10px; font-size: 2rem; letter-spacing:-1px;">Active Session</h2>
                        <p style="color: var(--text-muted); margin-bottom: 40px;">Authenticated as <br><strong style="color: #fff;">${user.email}</strong></p>
                        <a href="profile.html" class="btn-auth btn-main" style="text-decoration:none; margin-bottom: 15px;">Enter Gateway</a>
                        <button id="force-logout" class="btn-auth" style="background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: var(--text-main);">Terminate Session</button>
                    </div>`;
                document.getElementById('navigation-toggles').style.opacity = '0';
                document.getElementById('navigation-toggles').style.pointerEvents = 'none';
                document.getElementById('force-logout').addEventListener('click', () => { signOut(auth).then(() => window.location.reload()); });
            }
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault(); isActivelyAuthenticating = true; 
            const submitBtn = document.getElementById('login-submit-btn');
            submitBtn.innerHTML = 'Authenticating...'; document.getElementById('login-msg').style.display = 'none';

            try {
                const cred = await signInWithEmailAndPassword(auth, document.getElementById('login-email').value.trim(), document.getElementById('login-password').value);
                await sendWelcomeBackEmail(cred.user.email);
                window.location.replace('profile.html');
            } catch (error) { 
                showMessage("Invalid credentials.", "error", "login-msg"); 
                submitBtn.innerHTML = 'Access Gateway'; isActivelyAuthenticating = false; 
            }
        });

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault(); isActivelyAuthenticating = true; 
            const submitBtn = document.getElementById('reg-submit-btn');
            submitBtn.innerHTML = 'Processing...'; document.getElementById('reg-msg').style.display = 'none';

            const username = document.getElementById('reg-username').value.trim(); 
            const email = document.getElementById('reg-email').value.trim(); 
            const password = document.getElementById('reg-password').value;

            try {
                const q = query(collection(db, "users"), where("username", "==", username));
                const querySnapshot = await getDocs(q);
                if (!querySnapshot.empty) { 
                    showMessage("Username unavailable.", "error", "reg-msg"); 
                    submitBtn.innerHTML = 'Create Account'; isActivelyAuthenticating = false; return; 
                }

                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                await setDoc(doc(db, "users", userCredential.user.uid), { username: username, email: email, role: "viewer", createdAt: new Date() });
                
                await sendWelcomeEmail(email); window.location.replace('profile.html');
            } catch (error) { 
                showMessage(error.message.replace('Firebase: ', ''), "error", "reg-msg"); 
                submitBtn.innerHTML = 'Create Account'; isActivelyAuthenticating = false; 
            }
        });

        // PLATFORM MODULE COHESIVE SYSTEM FOR DISPATCHING RECOVERY LINKS
        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('forgot-email').value.trim();
            const submitBtn = document.getElementById('forgot-submit-btn');
            submitBtn.innerHTML = 'Dispatching Link...';
            document.getElementById('forgot-msg').style.display = 'none';

            try {
                await sendPasswordResetEmail(auth, email);
                showMessage("Reset tracking vector dispatched successfully.", "success", "forgot-msg");
                submitBtn.innerHTML = 'Dispatch Reset Link';
            } catch (error) {
                showMessage("Failed to trace recovery vector for this email.", "error", "forgot-msg");
                submitBtn.innerHTML = 'Dispatch Reset Link';
            }
        });

        let pendingGoogleUser = null, generatedOtp = null, pendingGoogleUsername = null;

        document.querySelectorAll('.google-trigger').forEach(btn => {
            btn.addEventListener('click', async () => {
                isActivelyAuthenticating = true; 
                document.querySelectorAll('.msg-box').forEach(b => b.style.display = 'none');
                
                const originalBtnHtml = btn.innerHTML;
                btn.innerHTML = 'Connecting...';
                
                try {
                    const result = await signInWithPopup(auth, googleProvider);
                    const docRef = doc(db, "users", result.user.uid);
                    const docSnap = await getDoc(docRef);
                    
                    if (!docSnap.exists()) {
                        pendingGoogleUser = result.user;
                        let baseName = result.user.displayName ? result.user.displayName.replace(/\s+/g, '') : "DramaFan";
                        pendingGoogleUsername = baseName; let counter = 1;
                        while (true) {
                            const q = query(collection(db, "users"), where("username", "==", pendingGoogleUsername));
                            if ((await getDocs(q)).empty) break; 
                            pendingGoogleUsername = baseName + counter; counter++;
                        }

                        generatedOtp = Math.floor(100000 + Math.random() * 900000).toString();
                        await sendOtpEmailCode(pendingGoogleUser.email, generatedOtp);
                        
                        document.getElementById('otp-target-email').textContent = pendingGoogleUser.email;
                        document.getElementById('otp-modal').style.display = 'flex';
                        btn.innerHTML = originalBtnHtml;
                    } else {
                        await sendWelcomeBackEmail(result.user.email); window.location.replace('profile.html');
                    }
                } catch (error) { 
                    const targetBox = btn.closest('form').id === 'login-form' ? 'login-msg' : 'reg-msg';
                    showMessage("Authentication failed.", "error", targetBox); 
                    btn.innerHTML = originalBtnHtml; isActivelyAuthenticating = false; 
                }
            });
        });

        document.getElementById('verify-otp-btn').addEventListener('click', async () => {
            const enteredOtp = document.getElementById('otp-input').value.trim();
            const verifyBtn = document.getElementById('verify-otp-btn');
            
            if (enteredOtp !== generatedOtp) { showOtpMessage("Invalid sequence."); return; }

            verifyBtn.innerHTML = 'Finalizing...';
            try {
                await setDoc(doc(db, "users", pendingGoogleUser.uid), { username: pendingGoogleUsername, email: pendingGoogleUser.email, role: "viewer", createdAt: new Date() });
                await sendWelcomeEmail(pendingGoogleUser.email); window.location.replace('profile.html');
            } catch (err) { showOtpMessage("Error saving account."); verifyBtn.innerHTML = 'Confirm Identity'; }
        });

        document.getElementById('cancel-otp-btn').addEventListener('click', async () => {
            await pendingGoogleUser.delete(); await signOut(auth);
            document.getElementById('otp-modal').style.display = 'none'; document.getElementById('otp-input').value = '';
            document.getElementById('otp-msg-box').style.display = 'none'; isActivelyAuthenticating = false;
        });
    </script>
</body>
</html>
