<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KoruVox x Anykan | Premium Anime & Drama</title>
    <meta name="theme-color" content="#FF5722">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <style>
        /* --- ANYKAN GLASS ENGINE + COLLAB BRANDING --- */
        :root {
            --koruvox-color: #FF5722; 
            --anykan-color: #8A2BE2;
            --gradient-brand: linear-gradient(135deg, var(--koruvox-color) 0%, var(--anykan-color) 100%);
            
            --bg-rgb: 8, 8, 10;
            --background-color: rgb(var(--bg-rgb));
            --text-color: #f5f5f5;
            --text-muted-color: #9CA3AF;
            
            --glass-bg: rgba(26, 26, 29, 0.45);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-border-active: rgba(255, 87, 34, 0.3);
            --glass-blur: blur(16px);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            background-color: var(--background-color);
            color: var(--text-color);
            padding-bottom: 100px;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        a { text-decoration: none; color: inherit; }

        /* --- HYBRID HEADER --- */
        .main-header {
            position: fixed; top: 0; left: 0; right: 0;
            display: flex; justify-content: center;
            align-items: center;
            padding: 15px 4%;
            background: linear-gradient(to bottom, rgba(var(--bg-rgb), 0.95) 0%, rgba(var(--bg-rgb), 0) 100%);
            z-index: 1000;
            transition: all 0.4s ease;
        }
        .main-header.scrolled {
            background: rgba(8, 8, 10, 0.85);
            backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--glass-border);
        }
        
        .brand-combo { display: flex; align-items: center; gap: 15px; }
        .brand-combo img { height: 35px; object-fit: contain; }
        .brand-combo .divider { width: 1px; height: 20px; background: var(--glass-border); }
        .brand-combo .logo-text { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.5px; }
        
        .brand-combo .logo-text span { 
            background: var(--gradient-brand); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        /* --- LAYOUT CONTAINER --- */
        .container { max-width: 1400px; margin: 90px auto 0; padding: 0 4%; }

        /* --- SECTION HEADERS --- */
        .section-header { display: flex; justify-content: flex-start; align-items: center; margin-bottom: 15px; margin-top: 40px;} 
        .section-title { font-size: 1.25rem; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .section-title i { color: var(--koruvox-color); }

        /* --- ANYKAN CAROUSEL SYSTEM --- */
        .drama-grid { display: flex; overflow-x: auto; padding-bottom: 20px; scroll-behavior: smooth; gap: 15px; scrollbar-width: none; }
        .drama-grid::-webkit-scrollbar { display: none; }

        /* --- CONTINUE WATCHING --- */
        .cw-card {
            display: flex; flex-direction: column; min-width: 280px; width: 280px;
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            border-radius: 12px; overflow: hidden; transition: 0.3s;
            backdrop-filter: var(--glass-blur); flex-shrink: 0;
        }
        .cw-card:hover { border-color: var(--anykan-color); transform: translateY(-4px); box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .cw-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .cw-progress { width: 100%; height: 3px; background: rgba(255,255,255,0.1); }
        .cw-bar { height: 100%; background: var(--gradient-brand); box-shadow: 0 0 8px var(--koruvox-color); }
        .cw-info { padding: 12px; }
        .cw-title { font-size: 0.95rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
        .cw-meta { font-size: 0.8rem; color: var(--text-muted-color); display: flex; justify-content: space-between; }
        .cw-meta i { color: var(--koruvox-color); margin-right: 4px; }

        /* --- KORUVOX FEATURED SHOWCASE --- */
        .featured-showcase {
            background: linear-gradient(145deg, rgba(26,26,29,0.6) 0%, rgba(10,10,12,0.8) 100%);
            border: 1px solid var(--glass-border-active);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: var(--glass-shadow);
            backdrop-filter: var(--glass-blur);
        }
        .coming-soon-badge { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .coming-soon-badge h2 { 
            background: var(--gradient-brand); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            font-size: 1.4rem; font-weight: 700; letter-spacing: 1px; 
        }
        .coming-soon-badge span { color: var(--text-muted-color); font-size: 0.85rem; letter-spacing: 1px; }
        
        .featured-desc { color: var(--text-muted-color); font-size: 0.9rem; margin-bottom: 25px; max-width: 600px; }

        .featured-card {
            min-width: 300px; width: 300px;
            background: rgba(0,0,0,0.4);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            transition: 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex; flex-direction: column; flex-shrink: 0;
        }
        .featured-card:hover { border-color: var(--koruvox-color); box-shadow: 0 0 25px rgba(255, 87, 34, 0.15); transform: translateY(-4px); }
        .featured-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .fc-content { padding: 18px; flex-grow: 1; display: flex; flex-direction: column; }
        .fc-title { font-size: 1.15rem; font-weight: 700; margin-bottom: 6px; }
        .fc-tags { color: var(--text-muted-color); font-size: 0.8rem; margin-bottom: 12px; }
        .fc-tags i { color: var(--koruvox-color); margin-right: 5px; }
        .fc-synopsis { font-size: 0.85rem; color: #bbb; margin-bottom: 20px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        .fc-actions { display: flex; justify-content: flex-end; align-items: center; margin-top: auto; }
        .btn-watch {
            background: var(--gradient-brand); color: white; border: none;
            padding: 8px 20px; border-radius: 50px; font-weight: 600; font-size: 0.85rem;
            cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(255, 87, 34, 0.3); text-decoration: none; display: inline-block;
        }
        .btn-watch:hover { transform: scale(1.05); filter: brightness(1.1); }

        /* --- ANYKAN STANDARD POSTER CARDS --- */
        .poster-card {
            position: relative; min-width: 150px; width: 150px; aspect-ratio: 2/3;
            border-radius: 10px; overflow: hidden; flex-shrink: 0;
            border: 1px solid transparent; transition: 0.4s cubic-bezier(0.25, 1, 0.5, 1); text-decoration: none; display: block;
        }
        .poster-card:hover { transform: translateY(-6px); border-color: var(--anykan-color); box-shadow: 0 10px 20px rgba(0,0,0,0.6); z-index: 10; }
        .poster-card img { width: 100%; height: 100%; object-fit: cover; }
        .poster-info {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
            padding: 25px 10px 10px; opacity: 0; transition: 0.3s; pointer-events: none;
        }
        .poster-card:hover .poster-info { opacity: 1; }
        .poster-info h3 { font-size: 0.85rem; color: #fff; font-weight: 500; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .poster-info p { font-size: 0.7rem; color: var(--koruvox-color); font-weight: 600; }

        /* --- ANYKAN LIQUID GLASS BOTTOM BAR --- */
        .bottom-nav {
            display: flex; position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 500px; 
            background: rgba(20, 20, 25, 0.65); 
            backdrop-filter: blur(40px) saturate(180%); -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--glass-border); border-radius: 50px;
            z-index: 9999; padding: 6px 15px; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            justify-content: space-between; align-items: center;
        }
        .bottom-nav-item {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: rgba(255, 255, 255, 0.5); transition: all 0.4s ease; text-decoration: none;
            padding: 4px 8px; flex: 1;
        }
        .bottom-nav-item.active { color: #fff; }
        .nav-icon { font-size: 1.25rem; margin-bottom: 4px; transition: transform 0.4s ease; }
        
        .bottom-nav-item:hover .nav-icon, .bottom-nav-item.active .nav-icon { 
            transform: translateY(-4px) scale(1.15); 
            background: var(--gradient-brand); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        
        .nav-label { font-size: 0.6rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

        @media (min-width: 992px) {
            .bottom-nav { display: none; }
            body { padding-bottom: 0; }
        }
    </style>
</head>
<body>

    <header class="main-header" id="mainHeader">
        <div class="brand-combo">
            <img src="klogo.png" alt="KoruVox" onerror="this.src='https://via.placeholder.com/100x35/000000/FFFFFF?text=KORUVOX'">
            <div class="divider"></div>
            <a href="koruvox.html" class="logo-text">Any<span>Kan</span></a>
        </div>
    </header>

    <main class="container">
        
        <div class="section-header">
            <h2 class="section-title">KoruVox Exclusives</h2>
        </div>
        <div class="drama-grid" id="exclusive-grid">
            <p style="color:var(--text-muted-color); padding: 20px;"><i class="fas fa-spinner fa-spin"></i> Syncing network...</p>
        </div>

        <div class="featured-showcase" id="featured-showcase" style="display: none;">
            <div class="coming-soon-badge">
                <h2><i class="fas fa-fire" style="color: var(--koruvox-color);"></i> COMING SOON</h2>
                <span>· UPCOMING RELEASES</span>
            </div>
            <p class="featured-desc">Don't miss the next big hits — stay tuned for new arrivals and exclusive content curated just for you.</p>
            
            <div class="drama-grid" id="featured-carousel">
                </div>
        </div>

        <div id="continue-watching-section" style="display: none;">
            <div class="section-header">
                <h2 class="section-title"><i class="fas fa-history"></i> Watch History</h2>
            </div>
            <div class="drama-grid" id="history-grid">
                </div>
        </div>

    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="bottom-nav-item active">
            <i class="fa-solid fa-house nav-icon"></i>
            <span class="nav-label">Home</span>
        </a>
       <a href="community.html" class="bottom-nav-item">
            <i class="fa-solid fa-bell nav-icon"></i>
            <span class="nav-label">Updates</span>
        </a>
        <a href="mylist.html" class="bottom-nav-item">
            <i class="fa-solid fa-bookmark nav-icon"></i>
            <span class="nav-label">My List</span>
        </a>
        <a href="login.html" class="bottom-nav-item" id="bottomAuthBtn">
            <i class="fa-solid fa-user nav-icon"></i>
            <span class="nav-label">Profile</span>
        </a>
    </nav>

    <script type="module">
        // 1. Firebase Initialization
        const firebaseConfig = {
            apiKey: "AIzaSyB7i67_T7fs87BHIY2Pxs6KRAknhXrowIA",
            authDomain: "dramakan007.firebaseapp.com",
            projectId: "dramakan007"
        };

        let db, auth;

        async function initFirebase() {
            try {
                const [appModule, authModule, firestoreModule] = await Promise.all([
                    import("https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js"),
                    import("https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js"),
                    import("https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js")
                ]);
                const app = !appModule.getApps().length ? appModule.initializeApp(firebaseConfig) : appModule.getApp();
                auth = authModule.getAuth(app);
                db = firestoreModule.getFirestore(app);

                // Setup Auth Listener for History Sync
                authModule.onAuthStateChanged(auth, (user) => {
                    if (user) {
                        syncWatchHistory(user.uid, firestoreModule);
                    } else {
                        document.getElementById('continue-watching-section').style.display = 'none';
                    }
                });

                // Fetch Live DB Content Once Connected
                fetchCuratedContent(firestoreModule);

            } catch (err) {
                console.error("Firebase init failed:", err);
                document.getElementById('exclusive-grid').innerHTML = '<p style="color:var(--danger); padding: 20px;">Database connection failed.</p>';
            }
        }

        // 2. Sync History from Subcollection
        function syncWatchHistory(uid, firestoreModule) {
            const { collection, onSnapshot } = firestoreModule;
            const historyRef = collection(db, "users", uid, "history");
            
            onSnapshot(historyRef, (snapshot) => {
                const historyGrid = document.getElementById('history-grid');
                let historyHtml = '';
                let hasHistory = false;

                snapshot.forEach(doc => {
                    hasHistory = true;
                    const data = doc.data();
                    const progress = data.progress || Math.floor(Math.random() * 50 + 20); 
                    
                    historyHtml += `
                        <a href="koruwatch.html?id=${doc.id}" class="cw-card">
                            <img src="${data.imgUrl || 'https://via.placeholder.com/300x170?text=No+Image'}" class="cw-img" alt="${data.title}">
                            <div class="cw-progress">
                                <div class="cw-bar" style="width: ${progress}%;"></div>
                            </div>
                            <div class="cw-info">
                                <h4 class="cw-title">${data.title}</h4>
                                <div class="cw-meta">
                                    <span><i class="fas fa-play"></i> S${data.season || 1} · Ep ${data.episode || 1}</span>
                                    <span>${data.timeLeft ? data.timeLeft + 'm left' : ''}</span>
                                </div>
                            </div>
                        </a>
                    `;
                });

                if (hasHistory) {
                    historyGrid.innerHTML = historyHtml;
                    document.getElementById('continue-watching-section').style.display = 'block';
                }
            });
        }

        // 3. Live DB Fetch from KoruVox Admin
        async function fetchCuratedContent(firestoreModule) {
            const { collection, getDocs } = firestoreModule;
            try {
                // We fetch all records and filter in JS to prevent you from getting Firebase Indexing Errors
                const snap = await getDocs(collection(db, "koruvox_content"));
                
                let allItems = [];
                snap.forEach(doc => {
                    allItems.push({ id: doc.id, ...doc.data() });
                });

                // Sort by newest first
                allItems.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

                const exclusives = allItems.filter(item => item.status === "Exclusive");
                const upcoming = allItems.filter(item => item.status === "Upcoming");

                // --- Render Exclusives ---
                const exclusiveGrid = document.getElementById('exclusive-grid');
                if (exclusives.length > 0) {
                    exclusiveGrid.innerHTML = exclusives.map(item => `
                        <a href="koruwatch.html?id=${item.id}" class="poster-card">
                            <img src="${item.img}" loading="lazy" alt="${item.title}" onerror="this.src='https://via.placeholder.com/150x225?text=No+Image'">
                            <div class="poster-info">
                                <h3>${item.title}</h3>
                                <p>${item.type}</p>
                            </div>
                        </a>
                    `).join('');
                } else {
                    exclusiveGrid.innerHTML = '<p style="color:var(--text-muted-color); padding: 20px;">Stay tuned! More exclusives are being deployed.</p>';
                }

                // --- Render Upcoming ---
                const carousel = document.getElementById('featured-carousel');
                if (upcoming.length > 0) {
                    document.getElementById('featured-showcase').style.display = 'block';
                    carousel.innerHTML = upcoming.map(item => `
                        <div class="featured-card">
                            <img src="${item.img}" alt="${item.title}" onerror="this.src='https://via.placeholder.com/300x168?text=No+Image'">
                            <div class="fc-content">
                                <h3 class="fc-title">${item.title}</h3>
                                <div class="fc-tags"><i class="fas fa-tag"></i> ${item.type}</div>
                                <p class="fc-synopsis">${item.synopsis}</p>
                                <div class="fc-actions">
                                    <a href="koruwatch.html?id=${item.id}" class="btn-watch">WATCH PREVIEW</a>
                                </div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    document.getElementById('featured-showcase').style.display = 'none';
                }

            } catch (e) {
                console.error("Firebase Database Load Error:", e);
                document.getElementById('exclusive-grid').innerHTML = '<p style="color:var(--danger); padding: 20px;">Failed to load server data. Check permissions.</p>';
            }
        }

        // --- UI Interactions ---
        window.addEventListener('scroll', () => {
            const header = document.getElementById('mainHeader');
            if (window.scrollY > 20) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });

        // Start App
        document.addEventListener('DOMContentLoaded', () => {
            initFirebase();
        });
    </script>
</body>
</html>
