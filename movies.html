    <script>
        // Infinite Scroll Engine Variables
        let currentPage = 1;
        let isFetching = false;
        let hasMorePages = true;
        const API_KEY = '014fbdbe962cb38379e09e31d0652459';
        
        const grid = document.getElementById('moviesGrid');
        const loaderTrigger = document.getElementById('load-more-trigger');

        async function fetchMovies(page = 1) {
            if (isFetching || !hasMorePages) return;
            
            isFetching = true;
            loaderTrigger.style.display = 'block';

            // Targeted endpoint for discovering popular movies
            const url = `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&sort_by=popularity.desc&without_genres=16&page=${page}`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.results && data.results.length > 0) {
                    const htmlContent = data.results.map(item => {
                        const poster = item.poster_path ? `https://image.tmdb.org/t/p/w500${item.poster_path}` : 'default-poster.jpg';
                        // Movies primarily use 'title' instead of 'name'
                        const title = item.title || item.original_title || "Unknown Title";
                        const rating = item.vote_average ? item.vote_average.toFixed(1) : "NR";
                        const year = (item.release_date || "N/A").substring(0, 4);

                        return `
                            <a href="watch.html?id=${item.id}" class="drama-card">
                                <div class="drama-card-img">
                                    <img src="${poster}" alt="${title}" loading="lazy" decoding="async" onerror="this.src='default-poster.jpg'">
                                </div>
                                <div class="drama-card-info">
                                    <h3 class="drama-card-title">${title}</h3>
                                    <div class="drama-card-meta">
                                        <span>${year}</span> • 
                                        <span style="color: var(--primary-color, #8A2BE2); font-weight: 500;">Movie</span> • 
                                        <span><i class="fas fa-star" style="color: #fbbf24;"></i> ${rating}</span>
                                    </div>
                                </div>
                            </a>
                        `;
                    }).join('');

                    if (page === 1) {
                        grid.innerHTML = htmlContent;
                    } else {
                        grid.insertAdjacentHTML('beforeend', htmlContent);
                    }

                    if (page >= data.total_pages) {
                        hasMorePages = false;
                        loaderTrigger.innerHTML = '<p>You have reached the end of the movie library!</p>';
                    }
                } else {
                    if (page === 1) {
                        grid.innerHTML = '<p style="text-align:center; grid-column:1/-1; color:var(--text-muted-color);">No movies found.</p>';
                    }
                    hasMorePages = false;
                }
            } catch (err) {
                console.error("Movie fetch error:", err);
                if (page === 1) {
                    grid.innerHTML = '<p style="text-align:center; grid-column:1/-1; color:var(--text-muted-color);">Error loading content from TMDB API.</p>';
                }
            } finally {
                isFetching = false;
                if (!hasMorePages && page > 1) {
                    loaderTrigger.style.display = 'block'; 
                } else if (!hasMorePages) {
                    loaderTrigger.style.display = 'none';
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Initial Load
            fetchMovies(currentPage);

            // Intersection Observer setup for Infinite Scrolling
            const scrollObserver = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting && !isFetching && hasMorePages) {
                    currentPage++;
                    fetchMovies(currentPage);
                }
            }, { 
                root: null,
                rootMargin: '400px',
                threshold: 0.1 
            });

            scrollObserver.observe(loaderTrigger);

            // Dynamic Search Box Syncing (Mobile vs PC)
            const mSearch = document.getElementById('mobileSearchInput');
            const mResults = document.getElementById('mobileSearchResults');
            const pcSearch = document.getElementById('searchInput');
            const pcResults = document.getElementById('searchResults');
            
            if(mSearch && pcSearch) {
                mSearch.addEventListener('input', (e) => {
                    pcSearch.value = e.target.value;
                    pcSearch.dispatchEvent(new Event('input')); 
                });
                const searchObserver = new MutationObserver(() => {
                    mResults.innerHTML = pcResults.innerHTML;
                    mResults.style.display = pcResults.style.display;
                });
                if(pcResults) searchObserver.observe(pcResults, { childList: true, attributes: true, subtree: true });
            }

            // Fire layout ad calls safely
            setTimeout(() => {
                const staticAds = document.querySelectorAll('.adsbygoogle:not([data-adsbygoogle-status="done"])');
                staticAds.forEach(() => {
                    try { (adsbygoogle = window.adsbygoogle || []).push({}); } 
                    catch (e) { console.error("Ad block rendering exception", e); }
                });
            }, 800);
        });
    </script>
