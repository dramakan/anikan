<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AnyKan | Data Correction Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root { 
            --bg-base: #0B0C10; 
            --bg-surface: rgba(26, 26, 29, 0.6); 
            --primary: #8A2BE2; 
            --primary-glow: rgba(138, 43, 226, 0.4); 
            --text-main: #F5F5F5; 
            --text-muted: #a0a0a0; 
            --border-subtle: rgba(255,255,255,0.08); 
            --success: #10b981; 
            --glass-blur: blur(20px);
        }
        
        body { font-family: 'Poppins', sans-serif; background: var(--bg-base); color: var(--text-main); margin: 0; padding: 40px 20px; }
        .container { max-width: 1100px; margin: auto; }
        
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 2rem; letter-spacing: -1px; }
        .header span { color: var(--primary); text-shadow: 0 0 10px var(--primary-glow); }

        /* Auth Lock Overlay */
        .full-overlay { position: fixed; inset: 0; background: rgba(11,12,16,0.98); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; text-align: center; }

        .stats-bar { 
            display: flex; justify-content: space-around; background: var(--bg-surface); 
            backdrop-filter: var(--glass-blur); padding: 20px; border-radius: 20px; 
            border: 1px solid var(--border-subtle); margin-bottom: 30px; 
        }
        .stat-item b { font-size: 1.4rem; color: var(--primary); }

        .deploy-bar { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-bottom: 30px; }
        .btn-group { display: flex; gap: 15px; }
        
        .deploy-btn { background: linear-gradient(135deg, #10b981, #059669); color: white; border: none; padding: 12px 25px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); font-family: 'Poppins'; font-size: 1rem; }
        .deploy-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(16, 185, 129, 0.5); }
        .deploy-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .autofix-btn { background: linear-gradient(135deg, var(--primary), #6a1b9a); color: white; border: none; padding: 12px 25px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px var(--primary-glow); font-family: 'Poppins'; font-size: 1rem; }
        .autofix-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(138, 43, 226, 0.6); }
        .autofix-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .drama-card { 
            background: var(--bg-surface); border: 1px solid var(--border-subtle); 
            padding: 20px; border-radius: 20px; display: grid;
            grid-template-columns: 60px 2fr 3fr 100px; align-items: center; 
            gap: 20px; margin-bottom: 15px; transition: 0.3s;
        }
        .drama-card:hover { border-color: var(--primary); transform: translateY(-2px); }
        .drama-card img { width: 60px; height: 85px; object-fit: cover; border-radius: 10px; border: 1px solid var(--border-subtle); }
        
        .info h4 { margin: 0; font-size: 1.1rem; color: #fff; }
        .info p { margin: 5px 0 0; font-size: 0.8rem; color: var(--text-muted); }

        .inputs { display: flex; flex-direction: column; gap: 8px; }
        .input-row { display: flex; gap: 10px; align-items: center; }
        
        input { 
            background: rgba(0,0,0,0.4); border: 1px solid var(--border-subtle); 
            color: #fff; padding: 12px; border-radius: 12px; font-family: 'Poppins';
            font-size: 0.9rem; transition: 0.3s; width: 100%;
        }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 10px var(--primary-glow); }
        
        .action-btn { background: rgba(138, 43, 226, 0.15); color: var(--primary); border: 1px solid var(--primary); border-radius: 12px; padding: 0 15px; height: 43px; cursor: pointer; transition: 0.3s; }
        .action-btn:hover { background: var(--primary); color: #fff; }

        .save-btn { 
            background: var(--primary); color: white; border: none; 
            height: 50px; border-radius: 12px; cursor: pointer; 
            font-weight: 600; transition: 0.3s; box-shadow: 0 4px 15px var(--primary-glow);
        }
        .save-btn:hover:not(:disabled) { background: #9d4edd; transform: scale(1.05); }
        .save-btn.done { background: var(--success); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); }
        .save-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #loading { text-align: center; padding: 100px; font-size: 1.2rem; color: var(--text-muted); display: none; }
        
        @media (max-width: 900px) {
            .drama-card { grid-template-columns: 1fr; text-align: center; }
            .drama-card img { margin: 0 auto; }
            .btn-group { flex-direction: column; width: 100%; }
        }
    </style>
</head>
<body>

<div id="authLock" class="full-overlay">
    <i class="fas fa-fingerprint" style="font-size: 3rem; color: var(--primary); margin-bottom: 20px;"></i>
    <h2>Verifying Identity...</h2>
    <p style="color: #aaa;">Connecting to secure admin server.</p>
</div>

<div class="container">
    <div class="header">
        <h1>Any<span>Kan</span> Data Fixer</h1>
        <p>Correcting IMDB IDs, TMDB IDs, Seasons, and Episodes</p>
    </div>

    <div class="deploy-bar">
        <div class="btn-group">
            <button id="autoFixBtn" class="autofix-btn" onclick="triggerAutoFixAll()"><i class="fas fa-magic"></i> Auto-Fix All Possible</button>
            <button id="migrateBtn" class="autofix-btn" style="background: linear-gradient(135deg, #f59e0b, #d97706); box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4);" onclick="triggerIDMigration()"><i class="fas fa-exchange-alt"></i> Migrate Docs to TMDB ID</button>
            <button id="deployBtn" class="deploy-btn" onclick="triggerNetlifyBuild()"><i class="fas fa-rocket"></i> Publish Changes to Live Site</button>
        </div>
        <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 8px;">Run "Auto-Fix All" first, then manually correct leftovers, and finally Publish.</p>
    </div>

    <div class="stats-bar">
        <div class="stat-item">Total Titles: <b id="totalCount">0</b></div>
        <div class="stat-item">Needs Fixing: <b id="needFixCount">0</b></div>
    </div>

    <div id="loading"><i class="fas fa-circle-notch fa-spin"></i> Accessing Firestore...</div>
    <div id="dramaList"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, getDocs, updateDoc, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyB7i67_T7fs87BHIY2Pxs6KRAknhXrowIA", 
        authDomain: "dramakan007.firebaseapp.com", 
        projectId: "dramakan007" 
    };
    
    const app = initializeApp(firebaseConfig); 
    const db = getFirestore(app);
    const auth = getAuth(app);

    const dramaListEl = document.getElementById('dramaList');
    const loadingEl = document.getElementById('loading');
    
    // Global cache for broken dramas to power the Auto-Fix loop
    window.brokenDramasCache = [];

    // TMDB API KEY
    const tmdbKey = "hidden_by_proxy";

    // --- Authentication Check ---
    onAuthStateChanged(auth, (user) => {
        const lock = document.getElementById('authLock');
        if (user && user.email === "zabaazcreations@gmail.com") {
            lock.style.display = 'none';
            loadingEl.style.display = 'block';
            loadBrokenDramas();
        } else {
            // If not logged in, prompt for admin password
            lock.innerHTML = `
                <i class="fas fa-lock" style="color: #EF4444; font-size: 3rem; margin-bottom:20px;"></i>
                <h2 style="color:#EF4444;">Admin Access Required</h2>
                <input type="password" id="adminPwd" placeholder="Enter Admin Password" style="margin-top:20px; max-width:300px; text-align:center; padding:15px; border-radius:12px;">
                <button class="save-btn" onclick="window.loginAdmin()" style="margin-top:15px; padding: 0 40px;">Authenticate</button>
            `;
        }
    });

    window.loginAdmin = () => {
        const pwd = document.getElementById('adminPwd').value;
        const btn = document.querySelector('#authLock button');
        btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i>';
        signInWithEmailAndPassword(auth, "zabaazcreations@gmail.com", pwd).catch(e => {
            alert("Authentication Failed: " + e.message);
            btn.innerHTML = 'Authenticate';
        });
    };

    // --- Load Data ---
    async function loadBrokenDramas() {
        try {
            const snap = await getDocs(collection(db, "dramas"));
            const allDramas = [];
            snap.forEach(d => allDramas.push({ id: d.id, ...d.data() }));

            document.getElementById('totalCount').innerText = allDramas.length;
            
            // Filter: Missing IMDB, Missing TMDB, or 0 episodes
            window.brokenDramasCache = allDramas.filter(d => 
                !d.imdbId || d.imdbId === "" || d.imdbId === "N/A" || 
                !d.tmdbId || d.tmdbId === "" || 
                !d.totalEps
            );
            
            document.getElementById('needFixCount').innerText = window.brokenDramasCache.length;

            loadingEl.style.display = 'none';
            dramaListEl.innerHTML = '';

            window.brokenDramasCache.forEach(drama => {
                const seasonString = (drama.seasons || []).join(', ');
                const card = document.createElement('div');
                card.className = 'drama-card';
                card.id = `card-${drama.id}`;
                card.innerHTML = `
                    <img src="${drama.img}" alt="Poster">
                    <div class="info">
                        <h4>${drama.title}</h4>
                        <p>Type: ${drama.type}</p>
                    </div>
                    <div class="inputs">
                        <div class="input-row">
                            <input type="text" placeholder="IMDB ID (e.g. tt1234567)" id="imdb-${drama.id}" value="${drama.imdbId || ''}">
                            <button class="action-btn" onclick="fetchTmdb('${drama.id}')" title="Auto-find TMDB ID using IMDB ID"><i class="fas fa-magic"></i></button>
                        </div>
                        <div class="input-row">
                            <input type="text" placeholder="TMDB ID (e.g. 278573)" id="tmdb-${drama.id}" value="${drama.tmdbId || ''}">
                            <input type="text" placeholder="Seasons (e.g. 16, 12)" id="sea-${drama.id}" value="${seasonString || drama.totalEps || '16'}">
                        </div>
                    </div>
                    <button class="save-btn" onclick="saveData('${drama.id}')" id="btn-${drama.id}">
                        <i class="fas fa-save"></i>
                    </button>
                `;
                dramaListEl.appendChild(card);
            });
        } catch (e) {
            loadingEl.innerHTML = `<span style="color:#ef4444">Error: ${e.message}</span>`;
        }
    }

    // --- Bulk Auto-Fix Logic ---
    window.triggerAutoFixAll = async () => {
        const autoBtn = document.getElementById('autoFixBtn');
        autoBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Processing Collection...';
        autoBtn.disabled = true;

        let successCount = 0;
        let skipCount = 0;

        for (const drama of window.brokenDramasCache) {
            const docId = drama.id;
            const imdbInput = document.getElementById(`imdb-${docId}`);
            const tmdbInput = document.getElementById(`tmdb-${docId}`);
            const btn = document.getElementById(`btn-${docId}`);

            // Skip if the user already saved this one manually during the session
            if (!btn || btn.disabled) continue;

            const imdbId = imdbInput.value.trim();
            
            // If IMDB ID is empty or invalid, we can't search TMDB. Skip it.
            if (!imdbId || imdbId === "N/A") {
                skipCount++;
                continue; 
            }

            try {
                tmdbInput.value = "Fetching API...";
                const res = await fetch(`https://dramakan-tmdb-proxy.zabaazcreations.workers.dev/3/find/${imdbId}?api_key=${tmdbKey}&external_source=imdb_id`);
                const data = await res.json();
                
                let foundId = "";
                if (data.tv_results && data.tv_results.length > 0) {
                    foundId = data.tv_results[0].id;
                } else if (data.movie_results && data.movie_results.length > 0) {
                    foundId = data.movie_results[0].id;
                }

                if (foundId) {
                    tmdbInput.value = foundId;
                    // Trigger the save function directly
                    await window.saveData(docId);
                    successCount++;
                } else {
                    tmdbInput.value = "";
                    skipCount++; 
                }
            } catch (e) {
                tmdbInput.value = "";
                skipCount++;
            }

            // 250ms Delay to prevent TMDB from rate-limiting the API requests
            await new Promise(resolve => setTimeout(resolve, 250));
        }

        alert(`Auto-Fix Complete!\n\nSuccessfully Updated: ${successCount}\nLeft for Manual Entry: ${skipCount}\n\nAny remaining titles require you to manually find their TMDB ID.`);
        
        autoBtn.innerHTML = '<i class="fas fa-check"></i> Auto-Fix Complete';
        setTimeout(() => {
            autoBtn.innerHTML = '<i class="fas fa-magic"></i> Auto-Fix All Possible';
            autoBtn.disabled = false;
        }, 3000);
    };

    // --- Single Auto-Fetch TMDB Logic ---
    window.fetchTmdb = async (docId) => {
        const imdbId = document.getElementById(`imdb-${docId}`).value.trim();
        const tmdbInput = document.getElementById(`tmdb-${docId}`);
        
        if (!imdbId || imdbId === "N/A") return alert("Please enter a valid IMDB ID first!");
        
        tmdbInput.value = "Searching...";
        
        try {
            const res = await fetch(`https://dramakan-tmdb-proxy.zabaazcreations.workers.dev/3/find/${imdbId}?api_key=${tmdbKey}&external_source=imdb_id`);
            const data = await res.json();
            
            let foundId = "";
            if (data.tv_results && data.tv_results.length > 0) {
                foundId = data.tv_results[0].id;
            } else if (data.movie_results && data.movie_results.length > 0) {
                foundId = data.movie_results[0].id;
            }

            if (foundId) {
                tmdbInput.value = foundId;
            } else {
                tmdbInput.value = "";
                alert("Could not find a TMDB ID for that IMDB ID. You may need to find it manually.");
            }
        } catch (e) {
            tmdbInput.value = "";
            alert("API Error: Could not connect to TMDB.");
        }
    };

    // --- Save Data Logic ---
    window.saveData = async (docId) => {
        const btn = document.getElementById(`btn-${docId}`);
        const imdb = document.getElementById(`imdb-${docId}`).value.trim();
        const tmdb = document.getElementById(`tmdb-${docId}`).value.trim();
        const seasonInput = document.getElementById(`sea-${docId}`).value.trim();

        if (!imdb && !tmdb) {
            alert("You must provide at least an IMDB or TMDB ID!");
            return;
        }

        // Convert "16, 12" string into [16, 12] array
        const seasonsArr = seasonInput.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n));
        const total = seasonsArr.reduce((a, b) => a + b, 0);

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

        try {
            await updateDoc(doc(db, "dramas", docId), {
                imdbId: imdb,
                tmdbId: tmdb,
                seasons: seasonsArr,
                totalEps: total
            });
            
            btn.className = 'save-btn done';
            btn.innerHTML = '<i class="fas fa-check"></i>';
            
            // Fade out the fixed item
            const card = document.getElementById(`card-${docId}`);
            if (card) {
                card.style.opacity = '0.3';
                card.style.pointerEvents = 'none';
            }

            // Update Counter
            const counter = document.getElementById('needFixCount');
            const currentCount = parseInt(counter.innerText);
            if(currentCount > 0) counter.innerText = currentCount - 1;

        } catch (err) {
            console.error(err);
            if (!window.autoFixRunning) alert("Update Failed: " + err.message);
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save"></i>';
        }
    };

    // --- Document ID to TMDB ID Migration Logic ---
    window.triggerIDMigration = async () => {
        const btn = document.getElementById('migrateBtn');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Migrating...';
        btn.disabled = true;

        try {
            const snap = await getDocs(collection(db, "dramas"));
            let migratedCount = 0;
            let skippedCount = 0;

            const docsToProcess = [];
            snap.forEach(d => docsToProcess.push({ id: d.id, data: d.data() }));

            for (const item of docsToProcess) {
                const oldId = item.id;
                const data = item.data;
                const tmdbIdStr = data.tmdbId ? String(data.tmdbId).trim() : "";

                // If TMDB ID exists and doesn't already match the current Document ID
                if (tmdbIdStr && tmdbIdStr !== oldId && tmdbIdStr !== "N/A" && tmdbIdStr !== "Fetching API...") {
                    // 1. Create a new document using the TMDB ID as the Document ID
                    await setDoc(doc(db, "dramas", tmdbIdStr), data);
                    // 2. Delete the old document
                    await deleteDoc(doc(db, "dramas", oldId));
                    migratedCount++;
                } else {
                    skippedCount++; // Skips if the ID is already correct or missing
                }
            }

            alert(`Migration Complete!\n\nSuccessfully Migrated: ${migratedCount} titles\nSkipped (Already correct or missing TMDB ID): ${skippedCount}`);
            
            // Reload the broken dramas list to reflect the new database state
            loadBrokenDramas();

        } catch (e) {
            alert("Migration Error: " + e.message);
            console.error("Migration failed:", e);
        }

        btn.innerHTML = '<i class="fas fa-exchange-alt"></i> Migrate Docs to TMDB ID';
        btn.disabled = false;
    };

    // --- Netlify Rebuild Trigger ---
    window.triggerNetlifyBuild = async () => {
        const deployBtn = document.getElementById('deployBtn');
        deployBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Triggering Build...';
        deployBtn.disabled = true;
        
        try {
            await fetch('https://api.netlify.com/build_hooks/69faaba323e4ac38b9e03773', { method: 'POST' });
            deployBtn.innerHTML = '<i class="fas fa-check"></i> Build Started! Check live site in 1-2 mins';
            deployBtn.style.background = '#10b981';
            
            setTimeout(() => {
                deployBtn.innerHTML = '<i class="fas fa-rocket"></i> Publish Changes to Live Site';
                deployBtn.style.background = 'linear-gradient(135deg, #10b981, #059669)';
                deployBtn.disabled = false;
            }, 5000);
        } catch (e) {
            alert("Failed to trigger build.");
            deployBtn.innerHTML = '<i class="fas fa-rocket"></i> Publish Changes to Live Site';
            deployBtn.disabled = false;
        }
    };
</script>

</body>
</html>
