<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhx Beats | Premium Beat Store</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <style>
        /* [COPY ALL CSS FROM audiodiaries.html EXACTLY AS IS] */
        :root {
            --primary: #8A2BE2;
            --primary-glow: rgba(138, 43, 226, 0.4);
            --premium-gold: #f1c40f;
            --bg-dark: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-hover: rgba(255, 255, 255, 0.06);
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg-dark);
            font-family: 'Poppins', sans-serif;
            color: var(--text-main);
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at 50% 30%, rgba(138, 43, 226, 0.12) 0%, transparent 60%);
            z-index: -1;
            pointer-events: none;
        }

        header { padding: 40px 5% 20px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); margin-bottom: 20px; }
        .brand-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .status-dot { height: 8px; width: 8px; background: #00ff88; border-radius: 50%; box-shadow: 0 0 12px #00ff88; }
        .brand-tag { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 3px; color: var(--primary); font-weight: 700; }
        .hero-title { font-size: 2.5rem; font-weight: 700; letter-spacing: -1px; text-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .hero-title span { color: var(--text-dim); font-weight: 300; }
        .controls-row { padding: 0 5% 30px; display: flex; flex-direction: column; gap: 20px; }
        @media (min-width: 768px) { .controls-row { flex-direction: row; justify-content: space-between; align-items: center; } }
        .filter-group { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .filter-group::-webkit-scrollbar { display: none; }
        .filter-chip { padding: 10px 24px; background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 50px; color: var(--text-dim); font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); white-space: nowrap; }
        .filter-chip:hover { background: var(--glass-hover); color: var(--text-main); border-color: rgba(255,255,255,0.15); }
        .filter-chip.active { background: var(--primary); border-color: var(--primary); color: white; box-shadow: 0 8px 25px var(--primary-glow); }
        .view-switch { display: flex; background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); padding: 6px; border-radius: 16px; }
        .view-btn { background: transparent; border: none; color: var(--text-dim); padding: 10px 18px; border-radius: 10px; cursor: pointer; transition: 0.3s; font-family: inherit; font-size: 0.85rem; font-weight: 500; display: flex; align-items: center; gap: 8px; }
        .view-btn:hover { color: var(--text-main); }
        .view-btn.active { background: rgba(255,255,255,0.08); color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .audio-container { padding: 0 5% 100px; display: grid; gap: 30px; transition: opacity 0.3s ease; }
        .audio-container.grid-view { grid-template-columns: 1fr; }
        @media (min-width: 1024px) { .audio-container.grid-view { grid-template-columns: repeat(3, 1fr); } }
        .audio-container.list-view { grid-template-columns: 1fr; gap: 18px; }
        .track-card { text-decoration: none; color: inherit; display: flex; flex-direction: column; background: var(--glass); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 15px; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .track-card:hover { transform: translateY(-8px); background: var(--glass-hover); border-color: rgba(255,255,255,0.15); box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 40px var(--primary-glow); }
        .artwork-wrapper { position: relative; width: 100%; aspect-ratio: 16/9; background: #111; border-radius: 16px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .artwork-wrapper img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1); }
        .track-card:hover img { transform: scale(1.08); }
        .premium-tag { position: absolute; top: 12px; left: 12px; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); padding: 6px 14px; border-radius: 8px; font-size: 0.7rem; font-weight: 700; border: 1px solid rgba(241, 196, 15, 0.3); color: var(--premium-gold); letter-spacing: 1px; display: flex; align-items: center; gap: 6px; }
        .track-info { padding: 18px 8px 5px; }
        .track-title { font-size: 1.15rem; font-weight: 600; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-sub { color: var(--text-dim); font-size: 0.85rem; display: flex; align-items: center; gap: 10px; font-weight: 400; }
        .list-view .track-card { flex-direction: row; padding: 12px 18px 12px 12px; border-radius: 20px; align-items: center; }
        .list-view .artwork-wrapper { width: 90px; aspect-ratio: 16/9; border-radius: 12px; margin-right: 20px; }
        .list-view .track-info { padding: 0; flex-grow: 1; }
        .list-view .premium-tag { display: none; }
        .loader { grid-column: 1/-1; text-align: center; padding: 100px 0; color: var(--primary); }
    </style>
</head>
<body>

    <header>
        <div class="brand-meta">
            <div class="status-dot"></div>
            <span class="brand-tag">Producer | Beat Maker</span>
        </div>
        <h1 class="hero-title">Bhx <span>Beats</span></h1>
    </header>

    <div class="controls-row">
        <div class="filter-group" id="filterGroup">
            <div class="filter-chip active" onclick="filterTracks('All', this)">All Beats</div>
            <div class="filter-chip" onclick="filterTracks('Premium', this)">Exclusive</div>
            <div class="filter-chip" onclick="filterTracks('Free', this)">Free Only</div>
        </div>

        <div class="view-switch">
            <button class="view-btn active" onclick="setView('grid', this)"><i class="fas fa-grid-2"></i> Grid</button>
            <button class="view-btn" onclick="setView('list', this)"><i class="fas fa-list"></i> List</button>
        </div>
    </div>

    <main class="audio-container grid-view" id="audioGrid">
        <div class="loader"><i class="fas fa-spinner fa-spin fa-2x"></i></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

       // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyB8GlFBy3boBwqEDWA625MkWKNM1M7w0O0",
  authDomain: "bhx-beats.firebaseapp.com",
  projectId: "bhx-beats",
  storageBucket: "bhx-beats.firebasestorage.app",
  messagingSenderId: "491393581039",
  appId: "1:491393581039:web:8204fb8753094a64a9401a",
  measurementId: "G-PCV97GFYQ7"
};
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allTracks = [];

        window.setView = (mode, btn) => {
            const grid = document.getElementById('audioGrid');
            document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            grid.className = mode === 'list' ? 'audio-container list-view' : 'audio-container grid-view';
        };

        window.filterTracks = (type, btn) => {
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            const filtered = type === 'All' ? allTracks : allTracks.filter(t => t.type === type);
            renderTracks(filtered);
        };

        async function loadVault() {
            const grid = document.getElementById('audioGrid');
            try {
                // Changed collection to bhx_beats
                const q = query(collection(db, "bhx_beats"), orderBy("timestamp", "desc"));
                const snap = await getDocs(q);
                allTracks = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderTracks(allTracks);
            } catch (e) {
                grid.innerHTML = `<div class="loader">Access Denied: Connection Error</div>`;
            }
        }

        function renderTracks(data) {
            const grid = document.getElementById('audioGrid');
            if (data.length === 0) {
                grid.innerHTML = `<div class="loader">No beats found.</div>`;
                return;
            }
            grid.innerHTML = data.map(track => `
                <a href="track_bhx.html?id=${track.id}" class="track-card">
                    <div class="artwork-wrapper">
                        <img src="${track.thumbnailUrl}" alt="${track.title}">
                        ${track.type === 'Premium' ? `<div class="premium-tag"><i class="fas fa-crown"></i> PREMIUM</div>` : ''}
                    </div>
                    <div class="track-info">
                        <h3 class="track-title">${track.title}</h3>
                        <div class="track-sub">
                            <span>${track.artist}</span>
                            <span>•</span>
                            <span>${track.price || 'Free'}</span>
                        </div>
                    </div>
                </a>
            `).join('');
        }

        document.addEventListener('DOMContentLoaded', loadVault);
    </script>
</body>
</html>
