<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Broadcast</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
  body { margin: 0; padding: 0; background-color: #09090B; font-family: 'Poppins', Arial, sans-serif; color: #F5F5F5; -webkit-font-smoothing: antialiased; }
  table { border-spacing: 0; border-collapse: collapse; width: 100%; }
</style>
</head>
<body style="background-color: #09090B; margin: 0; padding: 0;">

  <table role="presentation" style="width: 100%; background-color: #09090B; padding: 20px 0;">
    <tr>
      <td align="center" style="padding: 40px 10px;">
        
        <table role="presentation" style="max-width: 600px; width: 100%; background-color: #1A1A1D; border: 1px solid #333333; border-radius: 20px; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.9);">
          
          <tr>
            <td style="height: 6px; background: linear-gradient(90deg, #9D4EDD, #3B82F6);"></td>
          </tr>

          <tr>
            <td align="center" style="padding: 30px 20px 10px 20px;">
              <h1 style="margin: 0; font-size: 24px; color: #FFFFFF; font-weight: 700; letter-spacing: -0.5px;">Any<span style="color: #9D4EDD;">Kan</span> <span style="font-size: 16px; color: #A1A1AA; font-weight: 400; vertical-align: middle;">| System Transmission</span></h1>
            </td>
          </tr>

          <tr>
            <td align="center" style="padding: 10px 30px;">
              <table role="presentation" style="background-color: rgba(157, 78, 221, 0.1); border: 1px solid rgba(157, 78, 221, 0.3); border-radius: 12px; width: 100%;">
                <tr>
                  <td align="center" style="padding: 12px;">
                    <strong style="color: #c77dff; font-size: 14px; letter-spacing: 1px;">NEW UPDATE AVAILABLE</strong>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <tr>
            <td style="padding: 30px 40px; text-align: left;">
              <h2 style="margin: 0 0 20px 0; font-size: 22px; color: #FFFFFF;">{{BROADCAST_TITLE}}</h2>
              
              <div style="font-size: 15px; color: #D4D4D8; line-height: 1.7;">
                {{BROADCAST_MESSAGE}}
              </div>
              
              <table role="presentation" style="width: 100%; text-align: left; margin-top: 35px;">
                <tr>
                  <td>
                    <a href="{{BROADCAST_LINK}}" style="display: inline-block; background: #27272A; border: 1px solid #3F3F46; color: #FFFFFF; font-size: 15px; font-weight: 600; text-decoration: none; padding: 12px 25px; border-radius: 10px; transition: background 0.3s;">Explore Update &rarr;</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <tr>
            <td align="center" style="padding: 25px; background-color: #0E0E11; border-top: 1px solid #27272A;">
              <p style="margin: 0; font-size: 12px; color: #71717A;">
                &copy; 2026 Anykan Global Network.<br>
                You are receiving this system broadcast as a registered user.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
