<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trending Now - Anykan</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="global.css">
    
    <style>
        /* Refined Animations & Layout for Trending Page */
        .page-spacer { height: 110px; }
        
        .trending-header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .trending-header h1 {
            font-size: 3rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #fff, var(--primary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px var(--primary-glow);
        }

        .ranked-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            padding-bottom: 40px;
        }

        .rank-card {
            position: relative;
            display: flex;
            align-items: center;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            padding: 15px;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            opacity: 0;
            transform: translateY(30px);
            animation: slideUp 0.6s forwards;
        }

        .rank-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 15px 35px var(--primary-glow);
            border-color: var(--primary-color);
            background: var(--glass-bg-hover);
            z-index: 10;
        }

        /* The massive background number */
        .rank-number {
            font-size: 7.5rem;
            font-weight: 800;
            color: transparent;
            -webkit-text-stroke: 2px var(--glass-border-light);
            position: absolute;
            left: -5px;
            bottom: -25px;
            z-index: 0;
            transition: all 0.5s ease;
            line-height: 1;
        }

        .rank-card:hover .rank-number {
            -webkit-text-stroke: 2px var(--primary-color);
            color: rgba(157, 78, 221, 0.1);
            transform: translateX(10px);
        }

        .rank-poster {
            width: 100px;
            height: 150px;
            object-fit: cover;
            border-radius: 12px;
            z-index: 1;
            margin-left: 55px; /* Offset to overlap the number */
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transition: transform 0.5s ease;
        }

        .rank-card:hover .rank-poster {
            transform: scale(1.05) rotate(2deg);
        }

        .rank-info {
            z-index: 1;
            margin-left: 20px;
            flex-grow: 1;
        }

        .rank-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 5px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .rank-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: var(--text-muted-color);
            margin-bottom: 10px;
        }

        .rank-badge {
            background: rgba(157, 78, 221, 0.15);
            color: #d8b4fe;
            padding: 4px 10px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.75rem;
            border: 1px solid rgba(157, 78, 221, 0.3);
        }

        .play-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        .rank-card:hover .play-circle {
            opacity: 1;
            transform: scale(1);
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .trending-header h1 { font-size: 2.2rem; }
            .ranked-grid { grid-template-columns: 1fr; }
            .rank-poster { width: 85px; height: 125px; margin-left: 45px; }
            .rank-number { font-size: 6rem; bottom: -15px; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="main-header">
        <div class="container">
            <div class="header-top-row">
                <div class="mobile-menu-toggle" id="mobileMenuToggle">
                    <i class="fas fa-bars"></i>
                </div>
                <a href="index.html" class="logo">Any<span>Kan</span></a>
                <div class="header-actions-placeholder">
                    <button id="themeToggle" class="theme-toggle-btn" aria-label="Toggle Theme">
                        <i class="fas fa-sun"></i>
                    </button>
                </div> 
            </div>

            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input id="searchInput" type="text" placeholder="Search movies, shows, anime...">
                <div id="searchResults" class="search-results"></div>
            </div>

            <nav class="nav-links" id="navLinks">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="trending.html" class="active">Trending</a></li>
                    <li><a href="community.html">Community</a></li>
                </ul>
            </nav>

            <a href="profile.html" class="header-download-btn" id="topAuthBtn">
                <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Anykan" alt="Profile" style="width: 24px; height: 24px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.8);"> Profile
            </a>
        </div>
    </header>

    <main class="container">
        <div class="page-spacer"></div>

        <div class="trending-header">
            <h1><i class="fas fa-fire" style="color: #ff4757; text-shadow: 0 0 20px rgba(255, 71, 87, 0.5);"></i> Top 10 Trending</h1>
            <p style="color: var(--text-muted-color);">The most-watched movies, shows, and anime globally right now.</p>
        </div>

        <div class="ranked-grid" id="trending-page-grid">
            <!-- Items will be injected here via JS to show subtle staggered animations -->
        </div>
    </main>

    <!-- Bottom Nav - Pre-logged in configuration -->
    <nav class="bottom-nav">
        <a href="index.html" class="bottom-nav-item">
            <i class="fa-solid fa-house nav-icon"></i>
            <span class="nav-label">Home</span>
        </a>
        <a href="community.html" class="bottom-nav-item">
            <i class="fa-solid fa-users nav-icon"></i>
            <span class="nav-label">Community</span>
        </a>
        <a href="trending.html" class="bottom-nav-item active">
            <i class="fa-solid fa-fire nav-icon"></i>
            <span class="nav-label">Trending</span>
        </a>
        <a href="profile.html" class="bottom-nav-item" id="bottomAuthBtn">
            <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Anykan" alt="Profile" class="nav-icon" style="width: 24px; height: 24px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary-color); margin-bottom: 4px;">
            <span class="nav-label">Profile</span>
        </a>
    </nav>

    <script src="Anykan-script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('trending-page-grid');
            
            // Fetch from local storage cache established by your main script
            const dbData = localStorage.getItem('Anykan_master_db');
            if (dbData) {
                const data = JSON.parse(dbData);
                
                // Filter and sort for trending
                let trendingItems = data.filter(d => d.Trend === "T");
                trendingItems.sort((a, b) => {
                    const orderA = a.trendingOrder ? parseInt(a.trendingOrder) : 9999;
                    const orderB = b.trendingOrder ? parseInt(b.trendingOrder) : 9999;
                    return orderA - orderB;
                });
                
                // Limit to top 10
                trendingItems = trendingItems.slice(0, 10);
                
                grid.innerHTML = trendingItems.map((media, index) => {
                    const safeLink = media.link || `watch.html?id=${media.id}`;
                    // Stagger animation delay
                    const delay = index * 0.1;
                    
                    return `
                        <a href="${safeLink}" class="rank-card" style="animation-delay: ${delay}s">
                            <span class="rank-number">${index + 1}</span>
                            <img src="${media.img}" alt="${media.title}" class="rank-poster" loading="lazy">
                            <div class="rank-info">
                                <h3 class="rank-title">${media.title}</h3>
                                <div class="rank-meta">
                                    <span><i class="fas fa-star" style="color:#f1c40f;"></i> ${media.score || media.imdb || 'N/A'}</span>
                                    <span>•</span>
                                    <span>${media.status}</span>
                                </div>
                                <span class="rank-badge">${media.type}</span>
                            </div>
                            <div class="play-circle">
                                <i class="fas fa-play" style="margin-left: 3px;"></i>
                            </div>
                        </a>
                    `;
                }).join('');
            } else {
                grid.innerHTML = '<p style="text-align: center; color: var(--text-muted-color); grid-column: 1/-1;">Connecting to Database Engine...</p>';
            }
        });
    </script>
</body>
</html>
