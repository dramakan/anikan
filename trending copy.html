<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trending Dramas - DramaKan</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="global.css">
    <script src="bottom-bar.js" defer></script><script src="lightmode.js"></script> 
    
    
    <link rel="stylesheet" href="lightmode.css"> 
</head>
<body>
    <header class="main-header">
        <div class="container">
            <div class="header-top-row">
                <a href="index.html" class="logo">Drama<span>Kan</span></a>
                <a href="login.html" class="header-download-btn" id="topAuthBtn"><i class="fa-solid fa-user-plus"></i> Login</a>
            </div>
        </div>
    </header>

    <main class="container" style="padding-top: 30px; padding-bottom: 80px;">
        <section class="category-header">
            <h1 class="category-title"><span>Trending</span> Dramas</h1>
        </section>
        <div id="category-grid" class="drama-grid">
            <div style="grid-column: 1/-1; text-align: center; padding: 50px 0;"><i class="fas fa-circle-notch fa-spin fa-2x" style="color: var(--primary-color);"></i></div>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="bottom-nav-item"><i class="fa-solid fa-house nav-icon"></i><span class="nav-label">Home</span></a>
        <a href="community.html" class="bottom-nav-item"><i class="fa-solid fa-users nav-icon"></i><span class="nav-label">Community</span></a>
        <a href="mylist.html" class="bottom-nav-item"><i class="fa-solid fa-bookmark nav-icon"></i><span class="nav-label">My List</span></a>
        <a href="login.html" class="bottom-nav-item" id="bottomAuthBtn"><i class="fa-solid fa-user nav-icon"></i><span class="nav-label">Profile</span></a>
    </nav>

    <script type="module">
        const firebaseConfig = { apiKey: "AIzaSyB7i67_T7fs87BHIY2Pxs6KRAknhXrowIA", authDomain: "dramakan007.firebaseapp.com", projectId: "dramakan007" };
        async function loadCategory() {
            const grid = document.getElementById('category-grid'); let data = [];
            const cached = localStorage.getItem('dramakan_master_db');
            if(cached) { data = JSON.parse(cached); } else {
                try {
                    const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js");
                    const { getFirestore, collection, getDocs } = await import("https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js");
                    const app = initializeApp(firebaseConfig); const db = getFirestore(app);
                    const snap = await getDocs(collection(db, "dramas"));
                    snap.forEach(d => data.push(d.data())); localStorage.setItem('dramakan_master_db', JSON.stringify(data));
                } catch(e) {}
            }
            const filtered = data.filter(d => d.Trend === "T"); // Filter by Trend key
            if(filtered.length === 0) { grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px; color:var(--text-muted-color);">No trending dramas right now.</div>'; return; }
            grid.innerHTML = filtered.map(drama => {
                const safeTitle = encodeURIComponent(drama.title); const safeImg = encodeURIComponent(drama.img); const safeLink = encodeURIComponent(drama.link);
                return `<a href="${drama.link}" class="drama-card"><div class="drama-card-img"><img src="${drama.img}" loading="lazy"></div><div class="drama-card-info"><h3 class="drama-card-title">${drama.title}</h3><p class="drama-card-meta">${drama.type}</p></div><button class="bookmark-btn" onclick="event.preventDefault(); window.toggleMyList(this, '${safeTitle}', '${safeImg}', '${safeLink}')"><i class="fas fa-plus"></i></button></a>`;
            }).join('');
        }
        document.addEventListener('DOMContentLoaded', loadCategory);
    </script>
</body>
</html>
