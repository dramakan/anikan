<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Now Playing - Bhx Beats</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <style>
        /* [COPY ALL CSS FROM track.html EXACTLY AS IS] */
        :root { --primary: #8A2BE2; --accent: #00d2ff; --premium-gold: #f1c40f; --success: #10b981; --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.1); --bg-dark: #050505; }
        body { background: var(--bg-dark); color: white; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; overflow-x: hidden; }
        .ambient-bg { position: fixed; inset: 0; z-index: -1; width: 100vw; height: 100vh; object-fit: cover; filter: blur(80px) brightness(0.25); transform: scale(1.1); opacity: 0; transition: opacity 2s ease; }
        header { padding: 20px 5%; display: flex; align-items: center; justify-content: space-between; background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent); }
        .back-btn { display: flex; align-items: center; gap: 10px; color: white; text-decoration: none; font-weight: 500; background: var(--glass); padding: 12px 20px; border-radius: 16px; backdrop-filter: blur(15px); border: 1px solid var(--glass-border); transition: 0.4s; }
        .back-btn:hover { background: rgba(255,255,255,0.1); transform: translateX(-5px); }
        .track-container { max-width: 1300px; margin: 40px auto; padding: 0 5%; }
        .main-grid { display: grid; grid-template-columns: 1fr 400px; gap: 30px; align-items: start; }
        .glass-card { background: var(--glass); backdrop-filter: blur(40px); border: 1px solid var(--glass-border); border-radius: 28px; padding: 30px; }
        .track-title { font-size: 3rem; margin: 0; font-weight: 800; letter-spacing: -1px; }
        .track-artist { color: var(--accent); font-size: 1.1rem; margin-top: 10px; display: flex; align-items: center; gap: 10px; font-weight: 600; opacity: 0.9; }
        .media-wrapper { width: 100%; border-radius: 28px; overflow: hidden; border: 1px solid var(--glass-border); box-shadow: 0 20px 50px rgba(0,0,0,0.5); background: #000; position: relative; }
        .youtube-mode { aspect-ratio: 16/9; }
        .youtube-mode iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .audio-mode { padding: 60px 20px; display: flex; flex-direction: column; align-items: center; }
        .audio-cover { width: 220px; height: 220px; border-radius: 50%; object-fit: cover; border: 6px solid rgba(255,255,255,0.05); animation: spin 15s linear infinite paused; box-shadow: 0 0 60px rgba(138, 43, 226, 0.3); }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .download-section { position: sticky; top: 30px; }
        .download-section h3 { margin-bottom: 20px; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; color: #aaa; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; }
        .download-grid { display: flex; flex-direction: column; gap: 12px; }
        .dl-item { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; background: rgba(255,255,255,0.03); border-radius: 18px; border: 1px solid var(--glass-border); text-decoration: none; color: white; transition: 0.3s; font-size: 0.95rem; }
        .dl-item:hover { border-color: var(--primary); background: rgba(138, 43, 226, 0.1); transform: scale(1.02); }
        .dl-item i { font-size: 1.2rem; color: var(--primary); }
        .premium-btn { background: rgba(241, 196, 15, 0.05); border-color: rgba(241, 196, 15, 0.3); cursor: pointer; }
        .premium-btn:hover { background: rgba(241, 196, 15, 0.15); border-color: var(--premium-gold); }
        .suggestions-container { margin-top: 30px; }
        .suggestions-header { margin: 0 0 15px; display: flex; align-items: center; justify-content: space-between; }
        .suggestions-header h3 { font-weight: 700; font-size: 1.1rem; margin: 0; }
        .suggestions-header a { color: var(--accent); text-decoration: none; font-size: 0.8rem; }
        .suggestions-grid { display: flex; flex-direction: column; gap: 15px; }
        .suggest-card { background: var(--glass); border-radius: 16px; padding: 12px; text-decoration: none; color: white; border: 1px solid var(--glass-border); transition: 0.3s; display: block; }
        .suggest-card:hover { transform: translateY(-4px); background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); }
        .suggest-img { width: 100%; aspect-ratio: 16/9; border-radius: 10px; object-fit: cover; margin-bottom: 10px; }
        .suggest-card h4 { margin: 0 0 4px 0; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .suggest-card p { font-size: 0.8rem; color: #aaa; margin: 0; }
        @media(max-width: 1000px){ .main-grid { grid-template-columns: 1fr; } .track-title { font-size: 2.2rem; } .download-section { position: relative; top: 0; } }
    </style>
</head>
<body>

    <img src="" id="ambientBg" class="ambient-bg" alt="">

    <header>
        <a href="bhx_beats.html" class="back-btn"><i class="fas fa-chevron-left"></i> Gallery</a>
        <div class="logo" style="font-weight: 700; font-size: 1.2rem;">Bhx<span style="color:var(--primary);">Beats</span></div>
    </header>

    <main class="track-container" id="mainContent">
        <div class="main-grid">
            <div class="left-col" style="display: flex; flex-direction: column; gap: 25px;">
                <div class="glass-card">
                    <h1 class="track-title" id="trackTitle">...</h1>
                    <div class="track-artist" id="trackArtist">...</div>
                </div>
                <div class="media-wrapper" id="mediaContainer"></div>
            </div>

            <div class="right-col">
                <div class="glass-card download-section">
                    <h3><i class="fas fa-compact-disc"></i> The Beat Vault</h3>
                    <div class="download-grid" id="actionContainer"></div>

                    <div id="premiumPaymentSection" style="display: none; margin-top: 25px; border-top: 1px dashed var(--glass-border); padding-top: 25px;">
                        <h4 style="color: var(--premium-gold); margin-bottom: 15px; text-align: center; font-size: 1.1rem;">
                            <i class="fas fa-qrcode"></i> Scan to Unlock Premium
                        </h4>
                        
                        <div style="background: white; padding: 15px; border-radius: 16px; margin-bottom: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
                            <img src="https://i.ibb.co/WNV0NTRP/Screenshot-20260414-093008-Fam-App.jpg" alt="Owner QR Code" style="width: 100%; max-width: 180px; height: auto; border-radius: 8px;">
                            <p style="color: black; font-size: 0.8rem; margin-top: 10px; font-weight: 700; opacity: 0.8;">Scan using any UPI App</p>
                        </div>

                        <div style="margin-bottom: 15px; position: relative;">
                            <i class="fas fa-envelope" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--premium-gold);"></i>
                            <input type="email" id="userEmailForPremium" placeholder="Enter Gmail to receive audio..." style="width: 100%; box-sizing: border-box; padding: 15px 15px 15px 45px; border-radius: 12px; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); color: white; font-family: inherit; outline: none; transition: 0.3s;">
                        </div>
                        
                        <div style="margin-bottom: 15px; position: relative;">
                            <i class="fas fa-hashtag" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--premium-gold);"></i>
                            <input type="text" id="upiTransactionId" placeholder="Enter UPI Transaction ID..." style="width: 100%; box-sizing: border-box; padding: 15px 15px 15px 45px; border-radius: 12px; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); color: white; font-family: inherit; outline: none; transition: 0.3s;">
                        </div>

                        <button id="confirmPaymentBtn" style="width: 100%; padding: 16px; background: linear-gradient(135deg, var(--premium-gold), #d4ac0d); color: black; font-weight: 800; border: none; border-radius: 12px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; box-shadow: 0 5px 15px rgba(241, 196, 15, 0.2);">
                            Verify & Send File
                        </button>
                        
                        <div id="paymentNotification" style="display:none; color: var(--success); font-size: 0.85rem; margin-top: 20px; text-align: center; background: rgba(16, 185, 129, 0.1); padding: 15px; border-radius: 12px; border: 1px solid rgba(16, 185, 129, 0.3); line-height: 1.6;">
                            <i class="fas fa-check-circle" style="margin-bottom: 8px; font-size: 1.5rem; display: block;"></i>
                            Success! You will get the premium beat through your Gmail once the payment is confirmed.
                        </div>
                    </div>
                </div>

                <div class="suggestions-container">
                    <div class="suggestions-header">
                        <h3>More for you</h3>
                        <a href="bhx_beats.html">View All</a>
                    </div>
                    <div class="suggestions-grid" id="suggestionsGrid"></div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, query, limit, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

       // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyB8GlFBy3boBwqEDWA625MkWKNM1M7w0O0",
  authDomain: "bhx-beats.firebaseapp.com",
  projectId: "bhx-beats",
  storageBucket: "bhx-beats.firebasestorage.app",
  messagingSenderId: "491393581039",
  appId: "1:491393581039:web:8204fb8753094a64a9401a",
  measurementId: "G-PCV97GFYQ7"
};
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        function getPlayableDriveUrl(url) {
    if (url && url.includes('drive.google.com')) {
        let fileId = "";
        if (url.includes('/file/d/')) {
            fileId = url.split('/d/')[1].split('/')[0];
        } else if (url.includes('id=')) {
            fileId = url.split('id=')[1].split('&')[0];
        }

        if (fileId) {
            // Using &confirm=t bypasses the virus scan warning for small files 
            // and helps trigger the download header from Google's side.
            return `https://docs.google.com/uc?export=download&id=${fileId}&confirm=t`;
        }
    }
    return url;
}
        async function loadTrack() {
            const urlParams = new URLSearchParams(window.location.search);
            const trackId = urlParams.get('id');
            if (!trackId) return;

            try {
                // Changed to bhx_beats
                const trackRef = doc(db, "bhx_beats", trackId);
                const trackSnap = await getDoc(trackRef);

                if (trackSnap.exists()) {
                    const data = trackSnap.data();
                    document.getElementById('trackTitle').innerText = data.title;
                    document.getElementById('trackArtist').innerHTML = `<i class="fas fa-certificate"></i> ${data.artist}`;
                    
                    const bg = document.getElementById('ambientBg');
                    bg.src = data.thumbnailUrl;
                    bg.style.opacity = '1';

                    const mediaContainer = document.getElementById('mediaContainer');
                    if (data.youtubeUrl) {
                        mediaContainer.classList.add('youtube-mode');
                        const ytId = data.youtubeUrl.split('v=')[1]?.split('&')[0] || data.youtubeUrl.split('/').pop();
                        mediaContainer.innerHTML = `<iframe src="https://www.youtube.com/embed/${ytId}" frameborder="0" allowfullscreen></iframe>`;
                    } else {
                        mediaContainer.classList.add('audio-mode');
                        const playableAudio = data.linkFree || data.linkPremium || data.linkMaster;
                        mediaContainer.innerHTML = `
                            <img src="${data.thumbnailUrl}" class="audio-cover" id="spinCover">
                            <audio src="${getPlayableDriveUrl(playableAudio)}" controls style="margin-top:40px; width:80%; max-width:500px;"></audio>
                        `;
                    }

                    const actionContainer = document.getElementById('actionContainer');
                    let dlHTML = '';

if (data.linkFree) {
    const playableUrl = getPlayableDriveUrl(data.linkFree);
    dlHTML += `
        <a href="${playableUrl}" target="_self" class="dl-item">
            <span><i class="fas fa-file-audio" style="margin-right:8px;"></i> Free Version (MP3)</span> 
            <i class="fas fa-download"></i>
        </a>
    `;
}

                    dlHTML += `
                        <button class="dl-item premium-btn" id="btnUnlockPremium" style="width:100%; border-width: 1px;">
                            <span><i class="fas fa-crown" style="color:var(--premium-gold); margin-right:8px;"></i> Get Premium Quality</span> 
                            <span style="color:var(--premium-gold); font-weight:700;">${data.price || 'Paid'}</span>
                        </button>
                    `;
                    actionContainer.innerHTML = dlHTML;

                    document.getElementById('btnUnlockPremium').addEventListener('click', () => {
                        const qrSection = document.getElementById('premiumPaymentSection');
                        qrSection.style.display = 'block';
                        if(window.innerWidth <= 1000) qrSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    });

                    document.getElementById('confirmPaymentBtn').addEventListener('click', async function() {
                        const emailInput = document.getElementById('userEmailForPremium');
                        const upiInput = document.getElementById('upiTransactionId');

                        if(!emailInput.value || !emailInput.value.includes('@')) { alert("Please enter a valid Gmail."); return; }
                        if(!upiInput.value || upiInput.value.trim() === '') { alert("Please enter your UPI Transaction ID."); return; }

                        const originalText = this.innerText;
                        this.innerText = "Submitting...";
                        this.disabled = true;

                        try {
                            // Changed to bhx_payment_requests
                            await addDoc(collection(db, "bhx_payment_requests"), {
                                trackId: trackId,
                                trackTitle: data.title,
                                userEmail: emailInput.value,
                                upiTransactionId: upiInput.value,
                                timestamp: Date.now(),
                                status: "Pending"
                            });

                            this.innerText = "Confirmed";
                            this.style.background = "var(--success)";
                            document.getElementById('paymentNotification').style.display = 'block';
                        } catch (error) {
                            alert("An error occurred. Please try again.");
                            this.innerText = originalText;
                            this.disabled = false;
                        }
                    });

                    fetchSuggestions(trackId);
                }
            } catch (err) { console.error(err); }
        }

        async function fetchSuggestions(currentId) {
            // Changed to bhx_beats
            const q = query(collection(db, "bhx_beats"), limit(3));
            const querySnapshot = await getDocs(q);
            const grid = document.getElementById('suggestionsGrid');
            
            let count = 0;
            querySnapshot.forEach((doc) => {
                if(doc.id !== currentId && count < 2) {
                    const d = doc.data();
                    grid.innerHTML += `
                        <a href="track_bhx.html?id=${doc.id}" class="suggest-card">
                            <img src="${d.thumbnailUrl}" class="suggest-img">
                            <h4>${d.title}</h4>
                            <p>${d.artist}</p>
                        </a>
                    `;
                    count++;
                }
            });
        }

        loadTrack();
    </script>
</body>
</html>
