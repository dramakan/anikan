<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Premium - AnyKan</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        :root {
            --bg-dark: #050505;
            --bg-panel: #0f0f11;
            --primary: #9333ea;
            --primary-hover: #a855f7;
            --primary-glow: rgba(147, 51, 234, 0.4);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            min-height: 100vh;
        }

        body::before {
            content: ''; position: fixed; inset: 0;
            background: radial-gradient(circle at 50% 0%, rgba(147, 51, 234, 0.03) 0%, transparent 70%);
            z-index: -1; pointer-events: none;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        header {
            padding: 24px 5%; display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(to bottom, rgba(5,5,5,0.9), transparent);
            position: absolute; width: 100%; top: 0; z-index: 100;
        }
        .logo { font-family: 'Outfit', sans-serif; font-size: 1.7rem; font-weight: 800; color: #fff; text-decoration: none; }
        .logo span { color: var(--primary); }

        .container {
            max-width: 1500px; margin: 0 auto; padding: 100px 3% 40px;
            display: grid; grid-template-columns: 1fr 380px; gap: 28px;
        }
        main { display: flex; flex-direction: column; gap: 24px; }

        .player-wrapper {
            position: relative; width: 100%; border-radius: 16px; overflow: hidden;
            background: #000; border: 1px solid var(--border-color); aspect-ratio: 16 / 9;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        #video-player, #iframe-player { width: 100%; height: 100%; border: none; outline: none; display: none; background: #000; }
        #player-loader { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; z-index: 5; }
        
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.05); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .matte-panel { background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 16px; padding: 24px; }

        .ep-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 16px; }
        .ep-title { font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 600; }
        
        .nav-btns { display: flex; gap: 10px; }
        .nav-btn { background: rgba(255,255,255,0.03); color: var(--text-main); border: 1px solid var(--border-color); padding: 10px 18px; border-radius: 10px; cursor: pointer; transition: var(--transition); font-weight: 500; font-size: 0.85rem; }
        .nav-btn:hover:not(:disabled) { background: #fff; color: #000; border-color: #fff; }
        .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Provider & Server Selectors */
        .controls-row { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-color); padding-top: 20px; margin-top: 20px; flex-wrap: wrap; gap: 15px; }
        .provider-select { background: rgba(0,0,0,0.6); color: #fff; border: 1px solid rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 500; outline: none; cursor: pointer; transition: var(--transition); }
        .provider-select:hover { border-color: var(--primary); box-shadow: 0 0 10px var(--primary-glow); }
        .provider-select option { background: #0f0f11; color: #fff; }
        
        .server-list { display: flex; gap: 10px; flex-wrap: wrap; }
        .server-btn { background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); padding: 8px 16px; border-radius: 50px; font-size: 0.8rem; font-weight: 500; cursor: pointer; transition: var(--transition); }
        .server-btn:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .server-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }

        /* Episodes Grid */
        .panel-title { font-family: 'Outfit'; font-size: 1.2rem; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .episodes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(65px, 1fr)); gap: 10px; max-height: 300px; overflow-y: auto; padding-right: 6px; }
        .ep-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border-color); border-radius: 10px; padding: 12px 8px; text-align: center; cursor: pointer; transition: var(--transition); }
        .ep-card:hover { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.04); }
        .ep-card.active { background: #fff; border-color: #fff; color: #000; font-weight: 600; }
        .ep-num { font-size: 0.95rem; font-weight: 500; }

        /* Sidebar & Poster */
        .sidebar { display: flex; flex-direction: column; gap: 24px; }
        .info-card { overflow: hidden; padding: 0; }
        .poster-container { position: relative; width: 100%; aspect-ratio: 16/9; overflow: hidden; }
        .poster-container img { width: 100%; height: 100%; object-fit: cover; }
        .poster-overlay { position: absolute; inset: 0; background: linear-gradient(transparent, var(--bg-panel)); }
        
        .bookmark-btn { position: absolute; top: 15px; right: 15px; z-index: 10; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.15); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; transition: var(--transition); font-size: 1.1rem; }
        .bookmark-btn:hover { background: var(--primary); border-color: var(--primary); box-shadow: 0 4px 15px var(--primary-glow); transform: scale(1.1); }
        .bookmark-btn.active-list { color: var(--primary); }
        
        .info-content { padding: 20px; margin-top: -40px; position: relative; z-index: 2; }
        .drama-title { font-family: 'Outfit'; font-size: 1.6rem; font-weight: 700; margin-bottom: 12px; }
        .synopsis { font-size: 0.85rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 24px; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
        .meta-row { display: flex; justify-content: space-between; font-size: 0.85rem; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; margin-bottom: 12px;}
        .meta-row span:first-child { color: var(--text-muted); }
        .status-badge { background: rgba(147, 51, 234, 0.15); color: #d8b4fe; padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; border: 1px solid rgba(147, 51, 234, 0.3); font-weight: 600; }

        /* Suggestions */
        .suggestions-list { display: flex; flex-direction: column; gap: 12px; }
        .suggest-item { display: flex; gap: 16px; text-decoration: none; color: inherit; background: rgba(255,255,255,0.01); border: 1px solid transparent; border-radius: 12px; padding: 10px; transition: var(--transition); }
        .suggest-item:hover { background: rgba(255,255,255,0.03); border-color: var(--border-color); }
        .suggest-item img { width: 55px; height: 80px; object-fit: cover; border-radius: 8px; }
        .suggest-meta { display: flex; flex-direction: column; justify-content: center; gap: 6px; }
        .suggest-title { font-size: 0.9rem; font-weight: 500; color: var(--text-main); }
        
        /* Firebase Comments Styling */
        .comment-form-container { display: flex; gap: 15px; align-items: flex-start; margin-bottom: 24px; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 16px; border: 1px solid var(--border-color); }
        .user-avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); box-shadow: 0 0 12px var(--primary-glow); flex-shrink: 0; }
        .comment-input-wrapper { display: flex; flex-direction: column; gap: 12px; width: 100%; flex: 1; }
        .comment-input-wrapper textarea { width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); border-radius: 12px; padding: 15px; color: #fff; font-family: inherit; font-size: 0.9rem; resize: vertical; min-height: 80px; outline: none; }
        .comment-input-wrapper textarea:focus { border-color: var(--primary); }
        .comment-actions { display: flex; justify-content: flex-end; }
        .comment-actions button { background: var(--primary); color: #fff; border: none; padding: 10px 24px; border-radius: 50px; font-weight: 500; cursor: pointer; transition: var(--transition); }
        .comment-actions button:hover:not(:disabled) { background: var(--primary-hover); transform: translateY(-2px); }
        .comments-list { display: flex; flex-direction: column; gap: 15px; max-height: 500px; overflow-y: auto; padding-right: 5px;}
        .comment-item { background: rgba(255,255,255,0.02); padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); display: flex; gap: 15px;}

        .global-loader { position: fixed; inset: 0; background: var(--bg-dark); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.4s ease; }
        
        @media (max-width: 950px) {
            .container { grid-template-columns: 1fr; padding-top: 85px; }
            .sidebar { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: start; }
        }
        @media (max-width: 680px) { .sidebar { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="global-loader" id="main-loader">
        <div class="spinner"></div>
        <p id="loader-text" style="color:var(--text-muted); font-size:0.9rem;">Fetching API Streams...</p>

    <header>
        <a href="index.html" class="logo">Any<span>Kan</span></a>

    <div class="container" id="content-container" style="display: none;">
        
        <main>
            <div class="player-wrapper">
    <!-- The Smart Interceptor Cover -->

    <div id="player-loader"><div class="spinner"></div></div>

            <div class="matte-panel">
                <div class="ep-header">
                    <div>
                        <p style="color: var(--primary); font-size: 0.8rem; font-weight: 600; text-transform: uppercase; margin-bottom: 6px;" id="ui-show-name">—</p>

                    <div class="nav-btns">

<script type="module">
    // --- FIREBASE IMPORTS (From details.html) ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB7i67_T7fs87BHIY2Pxs6KRAknhXrowIA",
        authDomain: "dramakan007.firebaseapp.com",
        projectId: "dramakan007"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app); 

    // --- API & GLOBALS ---
    const API_DOMAIN = "http://127.0.0.1:8788/v1";
    const API_KEY = "key1"; 
    
    const urlParams = new URLSearchParams(window.location.search);
    const rawId = urlParams.get('id');
    
    let currentProvider = urlParams.get('provider') || 'dramacool9'; 
    document.getElementById('provider-selector').value = currentProvider;

    let dramaData = null;
    let episodesList = [];
    let currentEpIndex = 0;
    let hlsInstance = null;

    const elVideo = document.getElementById('video-player');
    const elIframe = document.getElementById('iframe-player');
    const elLoader = document.getElementById('player-loader');
    const serverContainer = document.getElementById('server-container');

   function cleanSlug(str) {
        if(!str) return '';
        let slug = str.split('/').filter(Boolean).pop();
        
        if (typeof currentProvider !== 'undefined' && currentProvider !== 'dramacool9') {
            slug = slug.replace(/-(hd|sd|fhd|kdd|khh)$/i, '');
        }
        
        return slug;
    }

    async function makeAPIRequest(endpoint, params = {}) {
        params.api_key = API_KEY;
        const qs = new URLSearchParams(params).toString();
        try {
            const response = await fetch(`${API_DOMAIN}/${currentProvider}${endpoint}?${qs}`);
            const payload = await response.json();
            return payload.success ? payload.data : null;
        } catch(e) {
            console.error(`Error loading API path /${currentProvider}${endpoint}:`, e);
            return null;
        }
    }

    function extractEpNum(titleStr) {
        if(!titleStr) return 0;
        const matched = titleStr.match(/Episode\s+(\d+(\.\d+)?)/i) || titleStr.match(/Ep\s+(\d+(\.\d+)?)/i);
        return matched ? parseFloat(matched[1]) : 0;
    }

    document.addEventListener('DOMContentLoaded', async () => {
        if (!rawId) {
            alert("No data parameters found.");
            window.location.href = 'index.html';
            return;
        }

        const dramaId = cleanSlug(decodeURIComponent(rawId));

        document.getElementById('provider-selector').addEventListener('change', (e) => {
            const newProvider = e.target.value;
            window.location.href = `watchapi.html?id=${encodeURIComponent(rawId)}&provider=${newProvider}`;
        });

        let info = await makeAPIRequest('/info', { id: dramaId });
        
        if(!info) {
            const queryClean = dramaId.replace(/-/g, ' ');
            const matchedSearch = await makeAPIRequest('/search', { query: queryClean, page: 1 });
            if(matchedSearch && matchedSearch.length > 0) {
                const fallbackId = cleanSlug(matchedSearch[0].id || matchedSearch[0].dramaId);
                info = await makeAPIRequest('/info', { id: fallbackId });
            }
        }

        if(!info) {
            document.getElementById('loader-text').innerHTML = `<span style="color:#ef4444; font-weight:600;">Unable to fetch drama data from ${currentProvider}.</span><br>Try selecting a different API Source above.`;
            document.querySelector('.spinner').style.display = 'none';
            document.getElementById('main-loader').style.display = 'none';
            document.getElementById('content-container').style.display = 'grid';
            return;
        }

        dramaData = info;

        // --- NEW HINDI DUB LOGIC ---
        const hindiContainer = document.getElementById('hindi-dub-container');
        const hindiBtn = document.getElementById('hindi-dub-btn');
        const episodesPanel = document.getElementById('episodes-panel');
        const uiEpTitle = document.getElementById('ui-ep-title');
        
        const targetImdbId = info.imdbId || info.imdb_id || info.tmdb_id;

        if (targetImdbId) {
            hindiContainer.style.display = 'block';
            
            hindiBtn.addEventListener('click', () => {
                episodesPanel.style.display = 'none';
                document.getElementById('server-container').style.display = 'none';
                
                if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
                elVideo.style.display = 'none';
                elVideo.pause();
                
                elLoader.style.display = 'none';
                elIframe.style.display = 'block';
                elIframe.src = `https://loffe414wil.com/play/${targetImdbId}`;
                
                uiEpTitle.textContent = "Hindi Dub (Full)";
                hindiBtn.innerHTML = '<i class="fas fa-play-circle" style="margin-right: 8px;"></i> Playing Hindi Dub';
                hindiBtn.style.opacity = '0.7';
                hindiBtn.style.cursor = 'default';
            });
        } else {
            hindiContainer.style.display = 'none';
        }
        // --- END HINDI DUB LOGIC ---

        document.title = `${info.title} - AnyKan`;
        document.getElementById('ui-show-name').textContent = info.title;
        document.getElementById('ui-title').textContent = info.title;
        const safeImg = info.thumbnail || info.image || info.poster || 'https://via.placeholder.com/400x225?text=No+Image';
        document.getElementById('ui-poster').src = safeImg;
        document.getElementById('ui-synopsis').textContent = info.synopsis || info.description || 'No synopsis available.';
        document.getElementById('ui-status').textContent = info.status || 'Ongoing';
        document.getElementById('ui-year').textContent = info.release_year || info.year || 'N/A';
        document.getElementById('ui-country').textContent = info.country || 'Asian';
        document.getElementById('ui-genres').textContent = (info.genres || []).join(', ') || 'Drama';

        if(info.episodes && info.episodes.length > 0) {
            episodesList = info.episodes.map((ep, idx) => ({
                id: ep.episode_id || ep.id,
                title: ep.title,
                epNum: extractEpNum(ep.title) || (info.episodes.length - idx)
            })).sort((a, b) => a.epNum - b.epNum);

            buildEpisodesGrid();
            
            const watchHistory = JSON.parse(localStorage.getItem('dramakan_history') || '{}');
            const historicalPlaybackToken = localStorage.getItem(`dramakan_ep_${dramaId}`);
            let initialLoadIndex = 0;
            
            if(historicalPlaybackToken) {
                const searchIdx = episodesList.findIndex(e => e.id === historicalPlaybackToken);
                if(searchIdx > -1) initialLoadIndex = searchIdx;
            } else if (watchHistory[dramaId]) {
                const searchIdx = episodesList.findIndex(e => e.epNum === watchHistory[dramaId].episode);
                if(searchIdx > -1) initialLoadIndex = searchIdx;
            }
            
            window.loadEpisodeTrack(initialLoadIndex);
        } else {
            document.getElementById('episodes-grid').innerHTML = '<p style="color:var(--text-muted); font-size:0.85rem; padding:10px;">No episodes found in this provider.</p>';
            elLoader.innerHTML = '<p style="font-size:0.85rem; color:var(--text-muted);">No stream data available.</p>';
        }

        renderSuggestions(dramaId);
        setupBookmarkSync(dramaId, info.title, safeImg);
        initFirebaseComments(dramaId);

        document.getElementById('main-loader').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('main-loader').style.display = 'none';
            document.getElementById('content-container').style.display = 'grid';
        }, 400);

        document.getElementById('btn-prev').addEventListener('click', () => { if(currentEpIndex > 0) window.loadEpisodeTrack(currentEpIndex - 1); });
        document.getElementById('btn-next').addEventListener('click', () => { if(currentEpIndex < episodesList.length - 1) window.loadEpisodeTrack(currentEpIndex + 1); });
    });

    function buildEpisodesGrid() {
        const grid = document.getElementById('episodes-grid');
        grid.innerHTML = episodesList.map((ep, index) => `
            <div class="ep-card" id="ep-node-${index}" data-index="${index}">
                <div class="ep-num">${ep.epNum}</div>
            </div>
        `).join('');
        
        document.querySelectorAll('.ep-card').forEach(card => {
            card.addEventListener('click', (e) => {
                const idx = parseInt(e.currentTarget.getAttribute('data-index'));
                window.loadEpisodeTrack(idx);
            });
        });
    }

    window.loadEpisodeTrack = async function(index) {
        if(index < 0 || index >= episodesList.length) return;
        currentEpIndex = index;
        const targetEp = episodesList[index];
        const dramaId = cleanSlug(decodeURIComponent(rawId));

        document.querySelectorAll('.ep-card').forEach(c => c.classList.remove('active'));
        const activeCard = document.getElementById(`ep-node-${index}`);
        if(activeCard) activeCard.classList.add('active');
        
        document.getElementById('ui-ep-title').textContent = `Episode ${targetEp.epNum}`;
        document.getElementById('btn-prev').disabled = index === 0;
        document.getElementById('btn-next').disabled = index === episodesList.length - 1;

        localStorage.setItem(`dramakan_ep_${dramaId}`, targetEp.id);
        let globalHistory = JSON.parse(localStorage.getItem('dramakan_history') || '{}');
        globalHistory[dramaId] = {
            id: dramaId,
            title: dramaData.title,
            img: dramaData.thumbnail || dramaData.image || '',
            episode: targetEp.epNum,
            timestamp: Date.now(),
            progress: 0 
        };
        localStorage.setItem('dramakan_history', JSON.stringify(globalHistory));
        window.dispatchEvent(new Event('historySynced'));

        elLoader.style.display = 'flex'; elVideo.style.display = 'none'; elIframe.style.display = 'none';
        if(hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
        elVideo.pause(); elIframe.src = ''; serverContainer.innerHTML = '';

        const trackingPayload = await makeAPIRequest('/stream', { episode_id: targetEp.id });
        const rawServers = trackingPayload ? (trackingPayload.servers || trackingPayload.sources || trackingPayload) : null;

        if(!rawServers || typeof rawServers !== 'object' || Object.keys(rawServers).length === 0) {
            elLoader.innerHTML = '<p style="font-size:0.85rem; color:#ef4444;">Servers offline for this episode.</p>';
            return;
        }

        const computationalServers = [];
        
        if (Array.isArray(rawServers)) {
            rawServers.forEach((s, idx) => {
                computationalServers.push({ label: `Server ${idx+1}`, type: s.file?.includes('m3u8') ? 'm3u8' : 'iframe', path: s.file || s.url || s.stream });
            });
        } else {
            for (const [key, value] of Object.entries(rawServers)) {
                if (value.stream) computationalServers.push({ label: `${key} (HD Direct)`, type: 'm3u8', path: value.stream });
                if (value.embeded_link || value.iframe) computationalServers.push({ label: `${key} (Embed)`, type: 'iframe', path: value.embeded_link || value.iframe });
            }
        }

        if(computationalServers.length === 0) {
            elLoader.innerHTML = '<p style="font-size:0.85rem; color:var(--text-muted);">No valid server links found.</p>';
            return;
        }

        computationalServers.forEach((server) => {
            const btn = document.createElement('button');
            btn.className = 'server-btn';
            btn.innerHTML = `<i class="fas ${server.type === 'm3u8' ? 'fa-play-circle' : 'fa-external-link-alt'}" style="margin-right:6px;"></i> ${server.label}`;
            btn.onclick = () => {
                document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                engagePlaybackStream(server);
            };
            serverContainer.appendChild(btn);
        });

        const optimalOption = computationalServers.find(s => s.type === 'm3u8') || computationalServers[0];
        const initialActiveIndex = computationalServers.indexOf(optimalOption);
        if(serverContainer.children[initialActiveIndex]) serverContainer.children[initialActiveIndex].classList.add('active');
        engagePlaybackStream(optimalOption);
    }

    function engagePlaybackStream(serverObj) {
        elLoader.style.display = 'none';
        let directUrl = serverObj.path;
        if(directUrl && directUrl.startsWith('//')) directUrl = 'https:' + directUrl;
        
        const adShield = document.getElementById('ad-shield'); // Get the shield

        // Inside your engagePlaybackStream function's else block:
if (serverObj.type === 'm3u8') {
    // ... your standard M3U8 player code
} else {
    if(hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
    elVideo.style.display = 'none'; elVideo.pause();
    
    const adShield = document.getElementById('ad-shield');
    adShield.style.display = 'block'; 
    elIframe.style.display = 'block'; 
    elIframe.src = directUrl;
    
    // Intercept clicks continuously until a threshold or player load
    let clickCounter = 0;
    adShield.onclick = function(e) {
        e.preventDefault();
        e.stopPropagation();
        clickCounter++;
        
        console.log(`Intercepted third-party ad attempt #${clickCounter}`);
        
        // Let the shield drop on the 3rd click so they can hit the genuine play button
        if (clickCounter >= 2) {
            adShield.style.display = 'none';
            
            // Automatically bring the shield back after 5 seconds if the video hasn't played
            // This catches "fake play buttons" that trigger secondary ads
            setTimeout(() => {
                if (elIframe.style.display === 'block') {
                    adShield.style.display = 'block';
                    clickCounter = 0; // Reset counter for the next wave
                }
            }, 5000);
        }
    };
}
    }

    async function renderSuggestions(slug) {
        const panel = document.getElementById('suggestions-box');
        let recommendationList = await makeAPIRequest('/popular', { page: 1 });
        
        if(!recommendationList) {
             const keywords = slug.replace(/-/g, ' ').split(' ')[0] || "drama";
             recommendationList = await makeAPIRequest('/search', { query: keywords, page: 1 });
        }
        
        if (recommendationList && recommendationList.length > 0) {
            const validSet = recommendationList.filter(item => cleanSlug(item.id || item.dramaId) !== slug).slice(0, 5);
            panel.innerHTML = validSet.map(item => `
                <a href="watchapi.html?id=${encodeURIComponent(cleanSlug(item.id || item.dramaId))}&provider=${currentProvider}" class="suggest-item">
                    <img src="${item.image || item.thumbnail || 'https://via.placeholder.com/55x80'}" alt="Cover">
                    <div class="suggest-meta">
                        <div class="suggest-title">${item.title || item.name || 'Ongoing Series'}</div>
                        <div style="font-size:0.75rem; color:var(--text-muted);">${item.episode || item.time || 'Drama Series'}</div>
                    </div>
                </a>
            `).join('');
        }
    }

    function setupBookmarkSync(id, title, img) {
        const bookmarkBtn = document.getElementById('poster-bookmark-btn');
        const safeLink = `watchapi.html?id=${encodeURIComponent(id)}&provider=${currentProvider}`;

        const updateUI = () => {
            let list = JSON.parse(localStorage.getItem('dramakan_mylist') || '[]');
            if(list.some(i => i.id === id || i.link.includes(id))) {
                bookmarkBtn.innerHTML = '<i class="fas fa-bookmark"></i>';
                bookmarkBtn.classList.add('active-list');
            } else {
                bookmarkBtn.innerHTML = '<i class="far fa-bookmark"></i>';
                bookmarkBtn.classList.remove('active-list');
            }
        };

        bookmarkBtn.addEventListener('click', (e) => {
            e.preventDefault();
            let list = JSON.parse(localStorage.getItem('dramakan_mylist') || '[]');
            const existsIndex = list.findIndex(i => i.id === id || i.link.includes(id));
            if(existsIndex > -1) {
                list.splice(existsIndex, 1);
            } else {
                list.push({ id, title, img, link: safeLink });
            }
            localStorage.setItem('dramakan_mylist', JSON.stringify(list));
            updateUI();
            window.dispatchEvent(new Event('myListUpdated'));
        });
        updateUI();
    }

    function initFirebaseComments(dramaId) {
        const commentsListEl = document.getElementById('comments-list');
        const commentInput = document.getElementById('comment-text-input');
        let submitBtn = document.getElementById('submit-comment-btn');
        const avatarEl = document.getElementById('current-user-avatar');
        const commentForm = document.getElementById('comment-form');
        
        let activeUserName = null;
        let activeUserAvatar = null;
        const defaultAvatar = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23a1a1aa'><path d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z'/></svg>";

        const applyAuthState = (isLoggedIn, name, avatarUrl) => {
            if (isLoggedIn) {
                activeUserName = name;
                activeUserAvatar = avatarUrl;
                if (avatarEl) avatarEl.src = avatarUrl;
                commentInput.placeholder = "Join the discussion...";
                commentInput.disabled = false;
                submitBtn.disabled = false;
                submitBtn.type = "submit";
                submitBtn.innerHTML = '<span>Post</span> <i class="fas fa-paper-plane" style="margin-left:5px;"></i>';
                const newBtn = submitBtn.cloneNode(true);
                submitBtn.parentNode.replaceChild(newBtn, submitBtn);
                submitBtn = document.getElementById('submit-comment-btn');
            } else {
                activeUserName = null;
                commentInput.placeholder = "Please log in to join the discussion...";
                commentInput.disabled = true;
                submitBtn.disabled = false;
                submitBtn.type = "button";
                submitBtn.innerHTML = '<i class="fas fa-lock" style="margin-right:5px;"></i> <span>Login</span>';
                const newBtn = submitBtn.cloneNode(true);
                submitBtn.parentNode.replaceChild(newBtn, submitBtn);
                submitBtn = document.getElementById('submit-comment-btn');
                submitBtn.addEventListener('click', () => { window.location.href = 'login.html'; });
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const name = user.displayName || (user.email ? user.email.split('@')[0] : "User");
                let avatar = user.photoURL || defaultAvatar;
                try {
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists() && userDoc.data().avatarUrl) avatar = userDoc.data().avatarUrl;
                } catch (err) {}
                applyAuthState(true, name, avatar);
            } else {
                const sessionAuth = localStorage.getItem('dramakan_user');
                if (sessionAuth) {
                    try {
                        const parsed = JSON.parse(sessionAuth);
                        applyAuthState(true, parsed.name || parsed.username || "User", parsed.avatarUrl || parsed.profilePic || defaultAvatar);
                    } catch(err) {
                        applyAuthState(true, sessionAuth, defaultAvatar);
                    }
                } else {
                    applyAuthState(false);
                }
            }
        });

        commentForm.onsubmit = async (e) => {
            e.preventDefault();
            if (!activeUserName) return;
            const text = commentInput.value.trim();
            if (!text) return;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            try {
                await addDoc(collection(db, "comments"), {
                    dramaId: dramaId,
                    text: text,
                    user: activeUserName,
                    userImg: activeUserAvatar,
                    timestamp: serverTimestamp()
                });
                commentInput.value = ''; 
            } catch (err) {
                console.error("Error posting comment:", err);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>Post</span> <i class="fas fa-paper-plane" style="margin-left:5px;"></i>';
            }
        };

        const q = query(collection(db, "comments"), where("dramaId", "==", dramaId));
        onSnapshot(q, (snapshot) => {
            if (snapshot.empty) {
                commentsListEl.innerHTML = `<div style="text-align:center; padding:25px 0;"><p style="color:var(--text-muted); font-size:0.9rem;">No comments yet. Be the first to start the discussion!</p></div>`;
                return;
            }
            let commentsArr = [];
            snapshot.forEach(docSnap => { commentsArr.push({ id: docSnap.id, ...docSnap.data() }); });
            commentsArr.sort((a, b) => (b.timestamp?.toMillis() || Date.now()) - (a.timestamp?.toMillis() || Date.now()));
            
            commentsListEl.innerHTML = commentsArr.map(c => `
                <div class="comment-item">
                    <img src="${c.userImg || defaultAvatar}" style="width:40px; height:40px; border-radius:50%; object-fit:cover; flex-shrink:0;">
                    <div>
                        <div style="display:flex; align-items:baseline; gap:8px; margin-bottom:4px;">
                            <h4 style="margin:0; font-size:0.95rem; color:#fff; font-weight:600;">${c.user}</h4>
                            <span style="font-size:0.75rem; color:var(--primary); font-weight:500;">${c.timestamp ? new Date(c.timestamp.toDate()).toLocaleDateString() : 'Just now'}</span>
                        </div>
                        <p style="margin:0; font-size:0.9rem; color:#d4d4d8; line-height:1.5;">${c.text}</p>
                    </div>
                </div>
            `).join('');
        });
    }
</script>
